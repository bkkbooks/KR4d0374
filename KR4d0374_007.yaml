body:
  text: 須溪集卷七宋劉辰翁撰墓志銘黃純父墓志銘歲庚辰子初與純父遇風雪東湖之上驚相弔曰賈鹿泉見君文問古人耶今人耶或者亦以君為古矣君在此耶語雜悲喜至甚夜不絶未眀復撼豫語拊髀浩然曰吾平生慕湯東澗近年慕君亦欲從君後耳君豈從古心公致誤耶識君慷慨敘寄不淺因擁衾而起以所聞於江先生者為君言之如東澗何可及也未第時與其兄客徐景説標致已不相合既第待信州户闕一日有趙尚書出參贊督府視事首見簿姓名歎曰余識之真西山時湯某乃猶為此官哉即拜疏薦之代主象山從是隱然出徐徑畈上自端平至景定三年出入諸老皆成履歷即小人扳引及當國所忌惡皆不足為全名之纍不待辨某事忤某人而大節自不可及此如陳太丘黃叔度公論常身為之地故樹立矯矯不肯為人稱門生也亦各其時命也言未既君淚沾余衾獨舉往年麻姑山夢夢一籍題忠孝二字而某在焉孝不敢言也忠特若此豫亦喟然于少年州縣不自試一二因舉子房天授沛公他多疑拒獨縣悟如子房意此所謂漢事將成也誦出師表至引喻失義以垂忠諌想見庸人自用故傷心元德之不見身世何長今人喜言四方上下孰知言不見竒竒而不用不用而驗驗而悔悔而恨恨且見禍其進退逼仄復非前古君臣之比哉君曰世事勿復言即文字何等不足存而魏鄭公以此楊大年以此憾至死因泛論鄴侯山人髙致魏延與淮隂膽略相似李伯紀張魏公成敗天意語不必有出出不必有謂未嘗及心事彼此直歔欷往復不知出於君之口與余口也於是相知深矣復欲與君談不可得矣前年猶寄余詩去年有持書來視緘題若不可識則君死矣余以嵗初謝客嗚咽而入問耿蘭以故至舉扶病中相屬語腸痛欲絶海內人物風流略盡託君筆墨相蔭映後死猶有講學之望顧不樂人間世如此念前冬有沅湘老人以君文求余記曰黃先生雖不能飲尚健坐余謂純父長七尺年五十生世大有事在迄如此而止造物復何以我輩為哉讀門人狀君行豈不整密婉至然不如君前夕劇談盡豫著君語語而俯仰浩蕩人物著微心迹纒綿功名蹉跌後有君子可以想見而歎若狀所難言又有人不及知者江閫貴人與邊守將不相接君代書密付語見赤心指授得宜又多軍情所鬱不得達者繇是感泣思效倉猝用意勝謝東山自異顧內幕所左右能此而已其苦言節費見于賞募得淮卒三千備逰擊為淮捷營改鐵鷂小船為艨艟大艦取勝議諸郡閉絶流民如他盜請城外築堡居老弱而各選其壯者從軍便為閫帥釋當路之怨馳從約之書共圖國憂胸懷磊磊出於人所不望而人亦知惟君所為嗟乎使君得乘一障亦當逺勝一閫雖九江事去相府逋虛諸司蒙茸君猶力勉以私財招軍撫溪洞為用至獨松失守庚牌暮下速援行者議饒信道梗盍徑崇安繞出三衢兵夜發君與家人不相顧至石門遇長幼相泣君曰國事至此暇顧爾輩耶自是言之有傷心者矣國家養兵三百年體羣臣子庶民三宫仁儉一朝有難人懷顧望徒擁烏合盜府庫君以書生志氣感動言必稱君父乃爾然至盱而盱閉入閩而閩潰盱城閉有投擊城下至斃者諸將欲屠之君正色不可曰我輩以路梗假道致疑耳若屠一城三宫聞必震駭諸將已瞋目謀不利君不為動既又具軍行宿次啓奏有笑者曰君猶謂有通進所耶君慨然泣下曰誠不忍以為無也聞者始掩涕歎息及入閩有狠將以衣糧乏咄咄謀劫主帥以出語已逼君又不動一日坐水閣有飛矢掠項過著柱迹所由來忌君者出此明日君行軍亦潰生亂世無及於救又不自為政故所就止爾然積誠所至在建而勸分分建昌而祈雨雨皆以客館係人望得天意亦何嘗有一日得行其志而惜之者如已試世自有盡君名方興有西園八十之老傅太史自得以君來為賦詩喜曰碑無龎老名又曰能威兵處在真誠其志慮風采何如也自咸渟第授靜江府臨桂簿嘗辟泗州淮平尉不就後五年辟建康府鳯臺酒庫自是始與幕議又五年辟臨安府德清酒庫德祐初差幹辦江西制司復帶行禮兵架閣未幾復帶行國子正眀年除宗正簿督機特改宣教郎初筮交代違年不願上仍待闕淮平界北得遙授曰不敢欺及登畿有銜命鈎致者自免徑歸諸司舉削常片紙書所聞亷介有政聲者請以已所應得者舉之受舉者不知也或知而謝輒避去此事亦近年所罕見余出仕十五年未嘗受人一削君自謂出處與余同謂此自其父得聞象山之學於其諸大父益貫徹朱陸授學者懇惻窮至所至老成欽動諸所識豫不能盡知而尤於丹徒陸君實秀夫耿耿焉君實大節可哀君實文不多見見君文識君實宜君實之所納贄也君文不蹈襲諸作不為時文議論講義注疏而辭事義理俱至清整酣暢足自為家詩亦有思致竭目前意朴厚雅馴視他人能此復少彼至於家庭講授人物大意倫紀親切廪廪見之千峰陳公宗禮嘗對人云吾欲得一客如黃純父清苦不可得其文之有本又如此士常患不第一第足自致誼能以去就易民命爭國事彼權幸險姦貪懦狠僣辭能闢意能誠也世狹道迂而環轍如陪臣坐臏如車中及其窮蹙無能有甚於魯男子之不得去而南霽雲之不能食也嗚呼微斯人斯世之不幸斯言也亦孰知其可悲君臨川黃氏居崇仁東里諱丙炎初字文炳晚更字漢翁豫誄之曰純父其鄉稱之曰思梅先生生丙申卒丙戌曽祖儼祖邦基父應辰梅窗公也思梅思公也妣陳夫人娶陳氏子男六慶孫興孫鳯孫翼孫暉孫慈老翼孫繼姻黨陳慈老以治命後鳯孫慶孫筆墨可愛皆如思梅復生壻趙次愚孫男五女二葬崇仁鄉西隱里雷公山實丁亥三月丙午君厚重不妄語疏闊無餘懷及所委曲傾盡若自營收致後進有豪氣乙丑自京歸安仁道中有盜殺人逸纍居者既誣服君以過客得盜名告使者使者得實謝曰君乍脫場屋洗寃如此可量哉其後避難得便舟出溪洞各護送皆所嘗盡力有恩意者亦若有助焉乃銘曰嗚呼國之初也材不必其如君世之甚也憂不必其如臣莫不幸於以身從人又不幸而以文致身故雖有孔眀公瑾而用之如陳琳阮瑀又如溫石二子而不得為許逺與張巡豈非命云丁守亷墓志銘士不幸而用所學於科舉其得失飢渴升沉勝敗曽不如庶人之常業雖有寬易靜篤之君子十上五黜幸不黜愈恨恨乃甚于黜使夫憐傷太息者猶惑于其命則所以煩瞀摧廢當何如而益退然確然死而浩然蓋奪精失營者莫科舉之為纍而其厄窮不悶者必學道之有得也余於記禮家老儒丁守亷之葬若不知時世之已易慨然道之如新亦士之不幸舍此無可言者復於斯墓也不知何云吾猶獨為斯墓恨也嗚呼科目之負人也多矣由今言之亦何恨于科目哉口授之徒心相似之友今年某某薦眀年某某第又眀年如某年或喜曰桷榱收梁棟宜有待或喟曰廣豈不當侯不侯君曰不然吾先鞭為有人矣當丙午猶朝日也揭焉而首選不及送戊午且四十矣再選輒再屈已而甲子復然甲子至癸酉復然問誰貢貢二人止往往門弟子而止也吾州多士貢額多臨江數倍每榜後考者為言某卷得復失能使人出狂况一經屢試白首洴澼學雖吾事而世貌譁名殉者成路觀其死之前日猶眀窗就曉抄書自課如兒子死之日復大書示其子云死非所畏何必張皇學問不衰死生不變又實有得如此其視往年場屋間夢不類芥雞之相踐而木雞之微視耶然昔之憐傷太息者至是猶不置則書生之清論世道之遺思也君之子敬直修謹有禮稱其家聲屢至請銘凡求銘其先者茍不得志於利達必鄙絶科目自附前輩余嘉敬直用意真取名淺又見髙安辛拱辰敘其同門受業身通者以十數且云先生貧而介視富貴人無足動其意無妄言笑鄉黨穆然敬之其自敘殖禮齋則云先大父潛山先生出蜀載書數千卷曰使吾子孫免為俗子之歸亦免為勢家所奪繇是自號殖禮以學殖易貨殖懲訓嚴甚潛山事慶元諸老猶及章雲山葉水心劉後溪如楊西巖恢項雲叟寅孫輩又其徒也義理浸淫有自來矣近見其禮記集解三十卷手藁如蟲蝕葉蓋老是經者初名里字守亷晚猶稱守亷世居西江新喻曽祖公逸祖居易紹熙進士奉議郎宰宜春潛山先生也父昱生嘉定庚辰年六十七娶歐陽氏子四人敬直行直養直友直養直以丙子走間道省親遇兵死孫男二本度復春社山其祖墓也距家二里祔焉其卒以丙戌二月葬以十二月丙申銘曰貢不貢為槐夢丘蓋多於謳誦羿之彀而不中名淹中何必用涕斯沾安致鳯蕭夀甫墓志銘曩學禁時海內名號未起吾廬陵之南須山之北有大儒先生曰黃宗魯其子為叔豹吾先人師宗魯而友叔豹叔豹以文名六館接慶元諸老自是從吾先人遊者彬彬如二黃間而朱氏甥父子實先後諸生復轉授為資余七八歲時表氏抱余學稱堯章先生後改名埴字聖陶號古平官至太學博士倅袁州如西昌蕭夀父大德少聖陶一歲耳於時事聖陶如弟子又以弟子俱見吾先人先人厚之如厚吾出先人死吾十歲概未嘗知其人也晚而聖陶以賦奏南宫第一又甲科其名位之興赫然欲揭當年叔豹上士爭相藉寄自謂出朱氏門下師其父者亦詭得師其子矣乃夀父則未嘗知其人而其人亦莫之知也此布衣師友之略也日夀父死而其子來泣曰芳春之登門晚若吾父之登門則不可謂不早也今吾子愷又館於朱教古平子之子是斯文四世之澤如泉脈脈往往自公家始也幸存弟子世家示萬世子孫母忘其初豫以其言篤厚繫流風又知夀父朴茂似前輩雖其存若不願人知者不當為衆人道乃其所以可稱者亦不能不為衆人道也嗚呼其忍不銘余以德祐歲逃空虛干戈反覆之交望蕭氏秋嶺如一葉凡流離接境者必此焉依而後得寧宇已而盜四起已而官軍北方且為風林為疑幟然盜過之曰母犯官倚之掎而角喜之者以為造物之報而君子則歸之德言之著云鄉人之至於鬬者重其言如季路季布或陷於義衆推戶削迹甚者希購市雍容親黨之間無怨無怵勉其子盡力友賴以完此其事在近年耳目者平生執贄如其邑之溫帥幹英臣鄉先達敖適軒陳念齋陳靜齋所交楊景堯蔡濟父陳鳴道蕭清父康行可或得之隱約或託之歲寒相敬愛終其身非以其六七貴人也嘗試場屋不大效即棄去所校讐把玩愈老愈篤子孫多所嚴事而自教者居多襟懷春意見於日涉嗜酒好客力有不足而性嘗有餘吾雖不及識如見其人如聞其語况以吾童子時先人之好徴吾言千載而吾於古平復自有兄弟師友之誼於古平之所教如古平焉故曰如見其人夀父號靜安其死以丙戌十月十九日曰雞鳴吾行矣雞鳴而逝年七十三曾祖某祖某父某娶某子孫壻某是年某月甲子葬某鄉銘曰有冠而後有緌有苓而後有絲孰謝其藍箕以傳箕繄教父誰父父是思式榖爾孫稷而食之鞠華巖墓志銘去年春客有自東來者以取得書籍相問遺中有華巖講義一編視其篇質而辨攻其理法而不爭考其人鞠氏本吾鄉人也豫於是心識之矣居數月豫章鞠升孫求銘其先人甚懇余固昧其由來取行狀讀之華巖也前客殆非適為之地耶然升孫橐其遺文乃無講義者而客并隊其吟藁數篇因得信其壯遊至老與所嘗贄謝知已異哉鞠氏多吉人永豐有華巖諱巖字驤父永豐西門里人也去吉留洪少慕師友母死葬洪為洪人倚墓築廬種鞠繞巖曰吾姓吾味也號鞠花巖俾巖我如呼名異日履齋吳丞相字之然學者喜稱華巖逮事包宏齋之先人克堂而宏齋又謂其從象山之子薦堂久説經極自得而不為新巧以亂至當故愈近不厭程訥齋嘗稱其律已嚴事親孝二三公非往往諛布衣者至吳丞相尤厚嘗受白金買木即以嫁葛氏孤女二官之校尉以覔舉幾得而失者四暨吳丞相當國始得舉亦不第繇其所棄以得舉若第者不必其報晚得山地百畝而食之髙松萬株耕雲種雨自謂樵蘇織絍盤飣粗備門徑鬱盤栽花補空家臨孔道飯芻送日山人夫婦豁如也子娶陳遂初姪女遂初其門弟子咸淳德祐之間遂初之名節髙世隱然有相髙者其平生言論於朋友講踐猶多不滿倦窗談枕教人以治生用智風流疏伉海內知名者無不愛而與曽蒼山為詩多鄉校前席縶維不聽去者先後帥漕逾十年起東湖植門徑最後理學租犯風雪出歲晚扺巖邑不數宿而返當科舉未廢之前年也猶惓惓請貢額三學有研知狀其出語不欺世空意足自達強公議展故素有山林處士之風嘗愛昌黎志王適翁壻媒媪間意意是翁迂闊必多談笑可畫恨升孫不及而謹飭過之亦佳子也其為書援三代之毁譽以求問其先人又何其獨行有家法翁配田氏亦洪人本葛氏婦前甲子卒翁自志始娶田年四十華巖加三老成相遇未嘗反目即少忤彼此一笑其真如此冠昏用古禮家祭以季月曰吾庶人也於書至隂陽地理無不習葬兆皆自卜曽祖某妣某氏葬東門坪頭祖某妣某氏葬東門雙橋英潭皆永豐父某妣某氏洪人也葬洪之新建曰榮岡生慶元戊午年八十四以某年月葬馬耳山田夫人左去家三里子升孫孫某曾孫某姬有鞠陶名從手文轉名為氏華巖譜鞠始燕丹師傅復不通鞠允輩似遺論入宋祖天章待制詠則然其後又有先整仲謀登科未必非族出惜未考也銘曰蘇翁種菜東湖之上儻無幣聘卒以傭葬是翁言耄偃蹇數相淒其黃花是亦相望陳禮部墓志銘寶祐丙辰之䇿士也既日昃再駕臨軒有少年首上對徹親覽卷首有臨御以來如日正中語及唱第進呈次第七上手擢易首唱第七既又不滿置首唱第四第四則三山陳俞也于是寶慶三十又三年矣特諱言久前别院命賦題久于道以忤聞故草茅附會如再中然前徹覽後易置皆命也而俞䇿亦實有及霅丘者舜卿嘗語余考官不能使俞第一天子不能使俞第七其自信無怨如此而亦從是退飛矣初君授靜江軍節度推官開慶與吉州推兩易故君以已未東至廬陵辦守禦眀年江上清軍間得余詩于它許疑不屬余為舉子美丸藥流鶯囀君瞿然曰是在俞術中而不悟自是莫逆于心每坐尚友齋倚梧竹極談世事成壞即使長急召不顧幕辨粲然無所回屈其辭可著為令李肯齋芾健吏事稱不及不及去之日有誓心録三卷取歐公夷陵語也人生至今德之而媢者謗者為不少矣有以科斗竹書獻當國者喜且驚曰彼白屋安得此必平園公家物也詎止此獻者懼詭曰我出陳推官後矣語由是喧不辨遲歲年得監庫稍遷太學録咸淳除博士竟坐前語逐不辨它日謝丞相啓云人之云云謂盜周公之寶玉蕭然坦迤玩世無悶如此而亦從是老矣又四年而差充福建帥幹闕至此鄉嫌改添差不釐務久之又改添差福建運幹待次于是咸淳八年矣復除太博十月免乃德祐前豫湖州别駕德祐改建寧于是國事非矣肯齋李公之為湖南也強起君君亦浩然以身許之會文丞相脫身渡淮歸行都建督景炎以大著除君督機君請據汀搖贑出江西毋緩君本赴湖南至是哭湖南歲盡以所部福安軍發谷口道病至汀卒有趙同舍文自君歸能言巷居人夢綘紗籠甚盛迎陳禮部去旦果然文公哭之慟葬伏虎山題曰草亭先生之墓君年二十九出文榜至是四十九又眀年文公北日門人林達可始以行狀來請銘則君死十九年矣其言正羽檄徴兵時居蕭夫人憂苫塊寱語于用武之無地最後作蒼雪林辭二疊不可忍聞李公期君以管葛之事君亦贊文公以張李之功其反覆䇿軍事謀家基語如史驗如卜當未行夢丞相豫黑筆視黑籍如軍書少焉登一舟若之貶所風月凄冷殆非人世境也吾死已夫親友共留其行不可曰士為知已死茍利社稷何恨吾登草亭望風雨欲一人共死不可得嗚呼我知舜卿使朝坐燕與誼肯棄老母弱子遁荒在人間哉星言赴難縞素為資得君軍師尚不甚敗臨河救溺不卜命之短長每誦郭元瑜此語悲之其乘飛至屋天也傷哉吾友生不得志于前死無知已於後其心之所樂直文字耳而文史亦絶嗚呼吾欲觀乎九京也其有恨乎無恨乎以君自言其死為不恨則知如余者不死而恨也悲夫景定末余留建君留京君畫二龍寄余題曰甲子上元日并贊每展誦後死何為吾所知所厚離合何限求仙才與靈氣惟舜卿古心江公嘗薦君館職不合黃華甫國云臺中日月論公客添一客耶十五年間夷溷跖亷衣冠道盡君不惟少合亦少可間居日長奪虎豅起草亭俯晴晦其在下種梅數百長歌入雲俗子無足還顧頽然自愛韻度乃出蘇子美上為文達大家數四六尤髙宕詩本荆公而每見每進雖在怨誹有桞州南澗之風初學六一公帖卒自為體如間花異草風日清美皆余所不及嘗手寫楞嚴圓覺金剛三經去廬陵日棄之先死七年葬其妻鄭氏般若山面草亭中為夀藏君死子弱不克歸葬每歲寒食馳僕裹飯灑伏虎丘而已既十五年辛邜乃啓而合諸鄭宜人之兆陳氏長樂世次見石室翁碑二子瑒環環為族父企後君兄會弟籥皆同舍會先二年卒籥後六年卒瑒謀銘于達可達可曰有先生之友會孟顧道逺日迫請刻之墓上其可由是林君之請勤矣林君之誼髙矣吾銘成則葬後之五年乙未四月也君著述多壙志傳之矣此不載銘曰長歌兮莽蒼青松關兮白玉堂奄塵昏兮夕陽我不起兮不如彼童汪君墨縗兮何壯操余彗兮彗霣光忽反顧兮魁淪降君不歸兮猶葬湖山兮朝行蘭萎蕙絶兮諂子浪浪信終古兮誰芳君余銘兮宰上余麟兮不祥行倀倀兮不得四方蹇思君兮天望君為龍兮奚傷樂丘處士墓志銘安成古長沙郡吾廬陵之劉未嘗不本長沙也而譜多不可考多故不可考也按唐思禪師塔碑思劉氏長沙定王後是為七祖而龍須山擔嶺二塔化身相望皆其家兄弟他日見石勳石材石礱三廟亦兄弟思同祖云而安成有興泰劉氏神者又長沙來也荒山野水之間時時出於殘碑斷系如此吾故家在須山之陽而祖墓在擔嶺之下嘗欲考而同之嫌其特出於往往不可知今安成西四十五里曰湯市有何年處士墓由湖南徙家焉自處士失其名以下至可仕字達仲凡十世皆可考則廬陵自漢以來為一劉益信達仲有子翼甫嘗銘同姓之墓曰郡士族半劉宜劉吾鄉而歐吾鄉者俗也其論可謂偉異然不知長沙一本其流溢於東南者皆非某氏比也雖後來濶逺有他賜姓亦如士范蔡墨所言然終不得與安成比安成古長沙為近達仲樂丘翁也余嘗記樂丘知其賢且達已記之後三年而樂丘翁死年七十鄉人士惜之是年翼甫又死其中子應登將以丁亥某月日葬樂丘請曰應登與弟及門舊也而弟已矣知樂丘者記也葬樂丘以此記可也顧家庭庸行有記所不及而宜書者願并志而銘之則幽明之望也余惟是父是子今人間所少其所言槩常事而得古人史傳語意此自可傳吾傳之以其子應登之言曰吾翁庶祖母羅氏出也而後嫡兄暨祖父死父死而庶弟怨翁曰吾惟不能逃祖父命以及此今遜可也舉惟其弟所欲而興受其所不取間者愧焉先墓之葬舍南且嵗久相者曰水啓視之不驗卒改葬三十里而近然終其身以為恨每對客持杯呼孫溫卷偶語及此則澘然不可仰視生母再殯病不能送慟為絶凡當祭與適墓嗚咽如新藏先世故書敝履謹逺親執友下至閽僕異視之有加割産為衆祀嵗興發捐直籍貧者賦與之或籍而不至莫夜歉焉不能食以為怪甃夷道焚負劵即郡有守望阡陌之事必翁也乃可保故開慶移民咸淳核賦公私無後患餘責尤多材略屢興作所指畫必不可改應變尤審憂世若已責教其子有身法毋以竒險擅鳴曰為文不當爾也應鳳甲戌條對第五得建昌判官馳書預戒以姑取教官母未習與人郡事雖書至已授選而言不可廢故傳閲世俯仰尤戒逺葬僻葬險葬利葬訟葬樂丘其所自卜癸未春亷使滏陽馬德昌以鄉飲召應登應鳳問翁日用大書樂丘二字寄亡恙豫讀應登行述至須髯音吐左顧稍下樂丘抱合狀髙下茅屋皆夕陽人影如見其人踐其處歎曰是能言者復何以余銘記為應登之從曽祖通直公夢才字乘可嘉熙戊戌第力學博文清若有志行號巢林先生暮年無子在側惟達仲能左右無細大謀焉作本亭於八世祖墓下買田立石皆其餘事湯村古安復城水北城隍廟故在劉氏墓號五處士處士生珫珫生讚讚生繼文繼文生臻臻生士昌士昌生師望師望生繼繼生克正克正生三德三德生有俊有俊生可仕是為樂丘一號桂林生嘉定丙子十一月二十八娶羅氏三子應牛應登應鳳登江西漕進士翼甫鳳也見别志二女六孫十二孫女樂丘在其鄉永福里銘曰斯丘之上兮拱木皆春斯丘之下兮樂友古人不仰愧而俯怍兮初返乎吾貞百世之下猶百世之上兮其復得為晉無懷葛天氏之民古愚銘世道交喪謂古人愚首陽事拙金谷名俱離黍何求懷沙惑志自傷為傳以至憔悴結纓而進執簡為三程嬰誰報黑子誰慙哀哉古人寧不見與其戅其蠢孰通孰魯九京可作我則誰歸逺矣姚公于訓有遺凡今之人曰詐而已色莊吐訥形垢文泚咨爾後嗣母愧前人欲知生直尤貴情真如愚不愚不愚何罪母以其如而示其外雜著祭師江丞相古心先生文嗚呼自詔勤王豫心獨苦平生師友嵗晚伊阻人之訛言訛言不祥厥或告我主番陽湯居然傳聞百不一實何獨於公如見隕越晝思難平夜夢屢驚猶聞靈光乃卒奠楹蒼天蒼天夫子何罪死何倉卒誰斂誰襚體膚如何如何血枯我欲見公淚洗糢糊公非無子有子有弟其存其亡訊莫豫寄疇昔之言歷歷托孤門生滿眼責獨在豫念公守吉豫甫十嵗焉知其後十五年事上書窮途祭酒諸生欣然起我文特峻清公闈來朝或獻宿士公迎謂曰此必劉子相期第一策及兵謀掃除學步摸索暗投太學半年受知再面公歸同野實始往見攜提反覆於建於閩我如處女公我父兄公寧少豫曰我畏友每書渠渠君母豫母修門出走風雨對牀執手奈何别淚浪浪逝將棄官終老黃石豈畏簡書聊永今夕江東辟召實匪前期暨還初服不從衮歸位置稱觴亦豈公意遭罹酷罰公撰銘志八年出處於志有之斯文大老寧為爾私外人不知公以我纍公曰不然我實子愧哀哉已矣明不負幽七年又見無約不酬昨秋三宿言餞江畔怪公異遇後約春半風塵渺迷共擬迎公孰知昔别三至愈凶玉色金聲光風霽月峩峩千仭柱折維絶我有死母公實葬之我有稚子公實奬之身後之盟可質九地挂劍心存蓋棺事異悠悠穹壤渺渺八紘公非無往死不離城曰我重臣無所逃死生而被執為國之恥亭名止水左手擕孫白刃紛紜哭入九泉人言全歸顧得死所死而若此尚庶無負使公守土使公柄朝堂堂守節魂不待招公母棄我我公慕子魂而可招於我歸只丞相莽哈岱美棠碑文至元二十七年秋九月丞相莽哈岱以江西省治廬陵凡四十日薨於位又二日喪行居民望過車罷市長慟至不可忍聞闔城士大夫哭於野者不約而集無不相嚮而弔依依憔悴無聊之色田野聞之驚頓踊絶至有負販之人不自知棄其所求望廬垂涕而返既數月有自北方來者號於馬上兒童父老聞其聲者喟然而哀痛之如新今期年矣省還迹逺燧改情遷而語及當日猶為之飲泣而悲哽咽而歎也方公之未至也揭竿滿野環贑及汀歷歷無墟煙吾郊關之禦奪者混相濁如市公之來也悄乎其容肅然而無聲不惟貪夫股戰軍伍旗幟改觀而盜賊望風禠魄凜焉以消者復不知其幾不惟城無囂塵里無夜驚而昔之門扃戶棘者蟄見天日熙然其如初不惟長亭短堠行歌逆旅而深山長谷婦人孺子與荷戈之士雜踵而無何近邑近州行者達曙皆曠十數年所未見雖太平全盛不過如此也或謂公之在事四十日止耳即四十日間有所誅罰聳動亦何能家至戶到未嘗按一貪吏也又未嘗殺一無道也而民之畏之愛之如將見之赤眉黃巾之不可勝殄雖血之於此猶懼其復生於彼從古然也乃不待草芟獸獮不用三令五申不必形格勢禁而威信之如此民之思斁朝暮四三使公猶存飢食渴飲政未必人人而濟也前乎公者有矣後乎公者亦未必不尤賢於公也而推論斯人有一日生聚之安若浮若沉以至今此譬諸荒墾實自公始獨吾儕小人竊欲求公之所以致此者而不可得也或者其福也嗟乎余讀坡公所為溫國文正公碑中言何自知之何自知之極古人詞辨反覆形容之盛徴今日之事則亦不以為過耳所謂立之斯立道之斯行綏之斯來動之斯和非七日司冦見之行事雖夫子猶疑之因是使人思前史區區必有不盡得於言者余以憂患餘生延喘民間親見甘棠角弓之誦欲備言其美則不可盡欲參論其事乃無一有蓋矯然為之躊躇逺想若尹長安之桓東虎穴朱子元之奮髯抵几李臨淮之斬將立威此人皆疾聲厲色以勝之僅濟公於斯民有百年之愛而無一日之功雖善論者莫能述也茲非古之君子不言而信不怒而民威於鈇鉞者與桞子厚謂吕衡州之死哭之者逾月哀聲交於北南舟船之上下必呱呱然又有謂化光何以得此者以今揆昔容復過之哭死而哀非為生者也我觀九京而譽武子百世而下故當識其何心晉人望羊叔子之碑而墮淚則叔子自為也公之沒也若士若民請於省府祠之省曰吾責也府亦曰吾責也其門生故吏則又曰吾責也民士因不敢為至二十九年春復請府經厯濟南孫某以其俸獨倡成之孫蓋公所辟以自輔者民士共髙其誼曰我則何力於斯則相與植碑於學以其詩來請嗚呼後之人有讀是碑而不墮淚者乎余亦何足以發之系之以詩曰衮衣繡斧來旬來撫里門晝開官路夜旅繡斧衮衣今以喪歸置豫中道卒誤疇依悠悠行舟慘慘四野亡羊不知狹路悲啞鼎叨釋懼林嘯伏興山哀浦思虎逝龍升蜀懷孔眀寒食祭路魏感梁公聚哭碑下誰歟祠者公有門生我往營之衆志乃平甘棠憩只杕杜逝只峩峩此碑亦墮淚只答劉英伯書辱贄書卷卷自清溪陳君來自是每見清溪輒愧愧不能報于是踰年又二月矣非獨藥冗客冗顧亦欲致君一來或勝報書云云耳而聞諭教興國恐愈久不復可望清溪歸亟草草圖之英伯髙才妙年又雅致絶俗嗜好不倦不惟文古字又古蓋得書三過讀讀罷急欲識英伯極談而異邑相望懷抱如塞非甚相愛則不敢言凡文必成章自孟子莊子皆成章之文也故其辨博反覆必自極其意不極亦不容釋然每章干纍百而止而力常有餘若大篇江河雜以風波起伏竭人情之所欲言窮事勢之所必至則秦漢與諸名家合辨賦而為一人又非區區之辭令應對敘述間比也如此而又不達則不達矣今人髙韓文亦其自稱道特甚在唐人衆多中最甚達若循其意之所欲言言適盡意亦不過如時文止耳間有數字數句費人講説及得其用意槩不得不爾又非如子雲輩數數可厭為遁辭為蔽意終亦不得為竒耳然亦未得如歐蘇歐蘇坦然如肺肝相示其極無不可誦回思宋初時用意為古文者與同時負學問自為家者欲一篇想像不可得近耳如葉水心洪容齋愈榛塞矣文猶樂也若纍句換字讀之如斷弦失譜或急不暇舂容或緩不復收拾胸中嘗有咽咽不自宣者何為聽之哉栁子厚黃魯直説文最上行文最澀三百篇情性皆得之容易如駕言出逰以寫我憂知我如此不如無生道之云逺曷云能來雖婦人自道亦能此而不朽亦以此若皆如懰兮燎兮實所未喻况首尾聫復不自厭如左傳所謂艱難其心而有名章徹豈不悲哉願英伯從是一掃削去若百行中有十行是能自喻處快讀一過亦足以不負白日矣曩在場屋時欲令考官憒憒中警發况千載而下求其文者知其心非眀白痛快何以哉此自英伯所易直過之耳尚有一恨恨英伯好竒字六經自劉歆傳寫外無一難字豈可謂無竒哉舊見魏鶴山取篆字施之行書常笑其自苦無益近年如楊慈湖畫心字文本心畫雲字在邯鄲匍匐中曲折愈不相似自書學以來鍾王眉目可喜何嘗顛倒橫竪自不可及若如彼所自為于字體則謬于經傳則乖不知何所取也三十前見文宋瑞取古文集墓志行狀當時雖不能讀心甚異之後見石經本方悟何物杜撰而朝公武輩不知也必欲字字為異亦難必欲字字篆就亦難仿篆文作今體為古書易不易于竹簡乎科斗乎秦𨽻人無識不至此也蓋世有狂道人喜為左字彼見篆體一二如秋如和遂欲一施之使見者駭以為異甚可笑也聞北方蒙古寫通鑑儻識之乎即用此古六經何不可者作文作字皆一種意見諒好古甚以為賢于不好者然不若不好也豈有英伯記問洋溢竒字填胸顧能彼不能此每有來者皆俗子得清溪又得英伯誠所願以老者故復復出此欲言豈此而止短紙行筆素不喜作小字牽強殊未傾倒便舟過我作數日客并進所聞唐突見絶未可知惟卷卷如此不宣備乞致仕牒代盧摯當職伏自去嵗到任未幾感觸風寒宿疾發動病態叢集實慮難勝職任具呈江南諸道行御史臺及移文貴司備申憲臺以求醫歸田為請者屢矣亦已疊奉臺檄不蒙準申自惟選耎闒葺重以疾病支離猥荷眷存揣已揆分何以得此慙悚之餘徒有䇿勵疲駑黽勉朝夕顧雖涓流塵坌無益崇深而庶幾圖報萬分之一者似亦不可棲遲冥默寂然遂已也自爾以來力疾治事又經八九箇月終見大病之後精力難於平復飲啖無味不食自飽皮膚皴慢不能充實兀坐少頃已復昏睡今方首夏尚未炎熱腠理不密動輒自汗南土氣候不常時或風雨稍覺涼冷衆皆絺綌已獨衣夾衆皆衣夾已獨挾纊但遇隂晦腿膝注膇步履蹣跚目視昏近兩耳重聽心思憒憒事多遺忘當職年雖未及六十其衰瘁癃老之狀雖年踰七十者未必至此欲望憲臺許準致仕養疴山藪别選賢能以代其處公私之間俱為便益雖古者大夫七十致政郤緣禮經所載四十始仕摯在稚幼特蒙世祖皇帝天地大造教育作成年及弱冠疵賤姓名已登仕版今上皇帝嗣登寶位圖任舊人以摯遭際先朝服勤帷幄多歷年所擢置侍從居無幾何選任方嶽敡歷中外垂四十年儒者之榮至是極矣由是而言較之古四十始仕七十致仕者從政之年已過禮經所言者已數年矣又近代熙豐間范蜀公鎮年六十四遂致仕而歸援以為例彼以論事不合而歸摯以謝病得請而歸酌古凖今何不可者雖摯於范鎮無能為役欽惟主上聖神武文逺追勛華尚何區區宋氏熙豐之君所敢擬倫而豈可使宋獨有六十四致仕之鎮而吾堂堂聖元獨無五十餘致仕之摯也又緣御史肅政俱為風憲之司肅清風俗條格具在即允所請其為風俗之助誠於大體有所關繫當職陳乞之言初非好竒矯俗蓋古有以退為進飾讓釣名者當職涉閲載籍凡有此類每撫卷嗤笑以為可恥今兹移文求醫致仕既無規避又有故常欲望憲臺鑒其悃欵雖年未及因病有請懸車之典得從摯始實為榮幸至聖像贊四則六經未足孰為夫子天尊地卑乾坤定矣如嶽之隆如日之威如川之不測周公未衰曷不觀此司冦衮衣國不用儒以儒目之岐山鳳逝西極麟來在陳去齊失鯉慟回匡人陽虎武叔桓魋轍環迹削木壞山頽生懷殷奠沒悼秦灰論其衰暮不見榮哀孰知萬世國祀家陪孔林草木鬱鬱佳哉六經萬世如日在天四時行焉百物生焉孰云軻死不得其傳老子像贊孔德之容惟道之從坦坦施施溫溫恭恭萬世之下復有一夫子而後識其猶龍病維摩贊衆生皆病安得不病更欲何言視我麈柄莊子像贊無他變化有語皆囁何日花間作兩蝴蝶古心文山贊此宋二忠如國亡何開卷熟視龍泉太阿塵蛻六合浴于天河下視萬鬼腐為蟻窠千秋遺像涕泗滂沱空餘後死作尹公他滕玉霄贊似不似在阿堵同不同在裏許其落筆也如箕其出神也如杵其得於酒狂也為劍俠而得於獨醒也為處女固不得與二陸三豈不可與四夔五嗟乎使吾得而客之亦何至嘲子雲而責子羽也文文山先生像贊間居忽忽萬古咄咄天風慘然如動生髮如何尋約亦念續芻豈可英爽猶纍形軀同時之人能不顙泚昔忌其生今妬其死焉有如此而在人下焉有如此而獲令終其像不下欽若其量不及魏公所以為世之重者為宋五忠鳴乎此廬陵之風隆興路學題書籍聖人經綸天下不越詩書六藝之文君子教育英才蓋為宇宙千載之計自家孰黨庠術序國學之制不如古惟經義治事計算水利之科得其宜凡異時棟梁榱桷之資皆前日燈火簡編之士蓋材者德者私淑艾者落落如霜木辰星彼挑兮闥兮在城闕兮駸駸為潢汙行潦今六龍御極一札成文取德行道藝而賔興之則山林巖穴自此升矣伊欲侈大絲綸之寵當為作新規矩之圖願分善和五千卷之藏以備圜橋億萬人之選公卿適子衆子皆得覽觀春秋大書特書必無靳惜謝有山黃提舉啓公卿久不下士可謂輕先才能不逮中人顧堪聞上獨安取此亦使知之公求士甚於士求公上援下不以下援上何汙而為之洗耳何嫌而至于絶交彼將不屑以為名我乃無言而不報但存交際亦是風流如某者枯木朽株死灰復溺文好文景好老已不如人公不公孔不丘又何有我同年四海足下家君相結淺而相知深其身死而其言立父為九州伯兒為五湖長光逺有它上有百尺絲下有千嵗苓夤緣無路建臺三四月薦士第一人豈曰秦無特從隗始棲輪生角固知推挽之不前繫帶還珠愈覺綢繆之無益茲蓋伏遇某官英才妙選雅望髙情不倒屣於雁門守而倒屣于王潛夫激揚甚逺未下車則荀慈明既下車則孔文舉講貫已多肆先鶚表之翔又重鶴書之墮然而近觀所主稱匪其人雖大夫薦不聞與之大夫自無過慮國士遇則當報以國士未知所為回劉守招啓伏承張燈元夕領客公堂民樂遨頭願聽春氷之鐵馬坐招續尾共看火樹之銀花某夙戴二天欣陪午夜豫想妙曲笙歌之外得聞豐年語笑之觀有懷謝私尚容稟控贈王國鈞歸燕啓馬周獨酌一斗八升誰識翹林之貴孟子不受兼金百鎰若為旅瑣之供愛之能勿勞乎兆也足以行矣憭栗兮登山臨水胡能無情富貴者送人以財請以為贈贈滕玉霄入京啓有一男子長歌楚澤之中乘萬里風自致燕臺之上蹇十年不調逾三月聚糧何衆口誦佳句喧而萬言不一杯直阮籍駕車窮途哭而返豈達者哉王郎拔劍斫地歌莫哀有知我者方今官無買價賢有聘書行而過東馬嚴徐之間亦不在秦黃朝張之下騎將軍馬已看當路之同升愛文人烏更在諸賢之樂與贈士人入京干飬親啓三釡及親人生之至願五十當貴世俗之美談聊行黃塵烏帽一作紗之間期遂縢簥繡簾之樂時哉不可失聿觀衣錦之榮敝豫又改為請致黃金之贈使題椽筆高揭氷銜贈蜀人陳定叟赴學官選啓風簷卧雪久如鄭老之冷官春水濯纓忽報山公之啓事自古京塵化衣不得者一日唐肆建鼓以來之我後子先時難機易鳥有飛而六翮亦在毳毛骨而買之千金况其生馬使冉子與之粟即祖生著我鞭善孺子為宰平久知其器大丈夫志天下何愛吾言贈劉恭叔問屋啓南村羣兒欺子美何可復言東頭一間著士龍亦云不惡去女去女莫顧違之違之何如居然卜三兩作鄰亦或笑五十步止剝牀闕足移具借車是雖彈鋏而得廬也須束縕而請火溫公若干省宣微若干省少者數千伯通第幾橋丁卯第幾橋存之異日贈家古劉教干米啓擔簦負笈共知古學之入官毁瓦畫墁自愧童蒙之求我弟子笑妻啼之在列從者愠糧絶而莫興長此安窮薄言往訴雖三年不至于榖但當求干祿之書然三日弗食則飢殆見索枯魚之肆乃為乞米之帖以代采薇之歌令壺齟伊優亞尚亡恙者訥籠那鉢剌薩惟所與之贈同舍水後聚糧啓蓬居及溺幾為東海之浮漚秋至啼飢又見西江之涸轍蕭然瓶粟已罄意者褁糧而來種豆豆為萁何以卒嵗采薇薇亦暮不如無生苐欲一囊之如侏儒遂以三餐而適莽蒼舊時指廩與之與之辭今日叩門嗟來嗟來食士而至此誰不慨然賀參政入新府啓潭府新成上公卜宅黃河帶泰山礪一朝柱石之尊安新甫柏徂來松千載棟梁之負荷樂衆人之同樂居天下之廣居履此髙華伏惟慶懌某叨承一障政切萬間祝君子之攸寧與皇家而有永祥開朱芾豈帷占夢於熊羆恩捲珠簾更喜棲身於燕雀賀遷入山居啓聒耳市㕓每恨入山之晚藏身林壑要為避地之謀相望無頃步之遙回視有塵囂之隔松下不妨喝道花前自可啜茶幽興相關雜聲不到我輩忝友朋之舊今朝逢好事之新倍裒阮杖之錢大作漢脯之會賀造竹亭啓開洲栽竹恍如淇澳之風肆筵創亭隱若渭川之勝蓋有此則門清可欵若無此則人俗可憎故子猷不可一日無此君而蔣詡所以三徑待良友顧我賢主人之氣習而有古君子之風期亭已落成竹增觀美亟馳草檄以約良朋倍裒阮杖之錢滿置孔樽之酒春風共往可人參玉版禪秋月偕遊滿地看金鎖碎賀造花庵啓深巖絶洞曽聞竹徑之通小圃層坡近有花庵之創何心機之巧運與智匠以精營春則桃李覆簷夏則楦榴映室秋則芙蕖繞徑冬則梅竹橫窗其餘百卉之駢羅未可一名而槩盡燕逰其下滿身紅影交加髙卧其中撲鼻清香旖旎是為樂事可乏慶儀約詩友以攜壺期心朋之覽勝座間行令任情摘取以傳枚月下醉歸乘興折來而簮帽時不可失檄以偕行賀造水閣啓畫棟朱簾不羡滕王之西捲翠簷碧瓦未饒漢相之東開况此中有緑沼之回環更向上接紅樓之縹眇規模壯麗輪奐鼎新信經營不日而成必富足多財乃就賢者亦有此樂君子不可虛拘是用醵金少伸賀禮賀造船亭啓昔有隱君曽造射齋而燕處今聞長者亦為船閣以居遊蓋以世路險若驚濤人情激於駭浪每切臨淵之懼時興泛海之思曩逐浮沉左右若亡維之楫近方勇退安間如不繫之舟乃創小亭深求此義既畢工而就搆須澆酒以落成用斂芳樽以成樂事酒罏茶竈不妨為鷗侣之盟釣具漁蓑可以效魚鄉之態二月請人啓九十春光已入平分之景二三公子可無半餉之娛與歡伯以共謀屈賢人而同集雖非勝賞聊可清談間日樽前欲相從於竹葉春風洞口莫見笑於桃花甚愧坐邀専容侍謝答赴啓坐看斗柄春移二月之辰笑捧雲箋日有羣賢之集方欲長夀千金於此際乃命抗塵一介於其間鐘鼓園林幸得歡娛於暇日門牆桃李何慙依倚於春風略具稟酬即容會晤花朝請人啓親朋落落慨今雨之不來節序匆匆撫良辰而孤往輒修小酌敬屈大賢固知治具之荒涼所願専車之焜耀春光九十又看二月之平分人生幾何莫惜千金之一笑引領以俟原心是祈答赴啓燕語春光半老東風之景蟻浮臘味特開北海之尊紀樂事於花前置陳人於席上相從痛飲但慙口腹之纍人不醉無歸幸勿形骸而索我社日請人啓自同田父日逢五戊之期乃命麴生時復一中之意可無名勝相與笑談請篤敘於久要望過從於半餉春風花栁與鶯燕以何關新雨桑麻話雞豚而具樂率然申稟幸甚丙原答赴啓駒隂過隙甚嗟浮世之流光燕子來時又是去年之風物吾聾政甚佳召賁然感軫念之良勤敬奔趨而敢後邀我賞春酒况當花栁之辰願為同社人長共枌榆之樂上已請人啓光景長虛擲上已甫臨人生能幾何良辰難再敢屈羣賢之雲集共娛三月之春和鳥羽飛觴猶紀蘭亭之舊金環壓轡願為蓬舍之光答赴啓三月三日清明天氣之新一咏一觴少長風流之舊極知厚意以及陳人蘭亭賢咸集之時賔酬主唱金谷詩不成之罰吾戴頭來清明請人啓清明節物之來春光欲老榖雨茶香之嫩風味方新欲為欵教之圗敢致屈尊之請梨花闌外恐空負此良辰蓬蓽門前敬肅迎於明日仰祈惠顧容罄謝言答赴啓無花無酒方歎興味之蕭然一咏一觴逺想幽情之暢敘忽承雲翰如對風儀且過辱乎寵招敢敬承茲佳惠杏花村裏何須更指於牧童竹葉尊中行即相從乎歡伯遊春請人啓問栁尋花又動少年之興提壺挈榼擬為明日之遊可惜歡娛幸承間暇願竊有請寵為賔席之光寧適不來苐發春風之笑答赴啓岸花汀草無限風流春樹暮雲有懷故舊忽拜瑶箋之貺許從金谷之遊召命有嚴會言敢後每蒙一笑知與物以為春如有隱憂豈微我之無酒不幾屑屑更復云云送春請人啓緑暗紅稀春色已隨流水去黃封清酌風光宜作掃花遊篤敘蘭金屈臨蔥玉人生行樂為仰天拊缶之歌酒債尋常盡每日典衣之興答赴啓風雨閉門想落紅之狼藉雲煙滿紙來翰墨之淋漓且蒙燕集之招敢後鳬趨之至浮仍臘味故知緑蟻之相親作送春詩但愧吟貂之難續初夏請人啓摘青梅而薦酒日切懷人撫緑樹以成帷春歸如客公等一笑人生幾何野蔌山肴願無嫌於蕝禮緑隂幽草更當勝於花時答赴啓午隂嘉樹政荏苒以驚心秋月華箋忽嬋娟而在手且承寵命猶及良辰願偷一日之間來共羣賢之集枇杷初薦恰當首夏之清和楊栁新條更向餘春而擾亂端午請人啓五日甫臨誰復有獨醒之趣諸賢咸集可能無一笑之歡輒開桑落之尊少屈蔥裾之佩甚相思之如渴政重綢繆共痛飲以讀騷何妨酩酊答赴啓葛含風羅疊雪不到間人蒲切玉黍包金有來雅命既蒙呼召敢不共承試浴蘭湯况是金蘭之同氣仰看艾虎也隨蒿艾以上門三伏請人啓坐甑蒸炊難消長夏解衣盤礴得及間時聊為浮瓜沉李之歡非有烹羊炮羔之具相與共此尚望惠然清風來故人掃我一涼之地濁醪有妙理問渠隔壁之家答赴啓政愁炎熱撫長日以蒸人忽有清涼挹好風而在手且承河朔之飲以及山中之逰擁篲及門當不嫌於褦襶脫帽露頂幸勿責其疏狂七夕請人啓跂晥女牛又是雙星之遇灑掃斗室輒謀一夕之歡嘉與英標共談靈匹亦一年而一會曽幾見而幾回固知乞巧之兒癡未能免俗將以屬饜於情話寧適不來答赴啓瓜果盈庭想見西樓之樂梧桐落葉自憐南阮之貧以斗杓七夕之時乃爼豆諸賢之後七襄為報愧無織女之章一笑相歡敬佩主人之意秋社請人啓節物匆匆八月之五戊朋遊落落一代不數人聊因分胙之餘香輒欲屬饜於情話牽率鄭重慙愧蕭條燕去雁來能幾堪於離别雞肥酒熟且相與以從容答赴啓鴻雁秋風久疏芳訊雞豚社日忽辱佳招感主禮之殷勤念田翁之牢落即容趨赴拱侍笑談孺子無能不是陳平之意氣細君可惠無嫌方朔之滑稽中秋請人啓千里共明月起故人何處之思幾日又中秋動老子南樓之興有懷數友還酬一尊欲買桂華撫少年兮不再庶幾如願共此夜以相歡答赴啓今夕秋期正羡十分之明月可人風度忽來五朵之祥雲甚感故情不忘俗客南樓之興非淺既辱相招北海之尊不空願同一醉五言古詩初晴初日入髙樓歸雲雜江樹魚逰新雨晴鳥語晨光吐天容朗復清煙色轉輕素墻草麗車前巷溝映泥路窗明祛宿潤礎泫滑微步會朝有宿客過午無來屨沿砌上蠙衣虛庭竿犢袴人生足無事世故非所慮彼語吾不聞清風有時度山中雨行雨行如漏蓬側身半車中風翻荷葉白難可為芙蓉向來三重茅仰屋嘆穿空已經亂離苦志念常從容入城過新雨路靜市人稀吾家林塘間水鴨狂欲飛門闌稚子笑隔樹見翁歸何人無此樂頽暮樂知希七言古詩沙苑箭道人不在無人茶空房惟有菖蒲花偶留壁上一枝箭熟視恍惚令人嗟箭頭年月去如電吹向空中再相見亦知近事不偶然汝亦當時負吾箭神仙一劍在吾手萬事空驚一搔首馬嵬重過雨淋鈴異日臨卭是君否月下月色為酒吾為壺仰天吸盡欲更沽世界如入流離珠東南大半江海湖微風白浪如搖鬚子從我也有意無跳身作勢與泪俱嘗試入此觀何如惜哉畏死非吾徒嘔出還爾桑田枯仙人嗔我涴六銖醉中無力能分疏汝自失腳如逃逋彈指咄咄汝負吾題墨竹長卷與汪遂良摩訶池上龍千年化為匹練橫曳煙拔石數莖衝蒼天我見其面何必全送李鶴田遊古杭天下南北車書通行人點點過汴宫空餘艮嶽一拳土黯慘如雪吹不融平乘樓上王夷甫一灑中州淚如雨西風羽扇不障塵更自蓮子隨根去政事堂上三相公往往退食如夔龍少年慟哭不見用一語不合面發紅八年流落無處所合眼當朝遽如許忠魂不到海門潮别殿芙蓉廢為圃茫茫古路日平西不信金銅不淚垂浮沉親故懶相問白髮惟有春風知李侯髀肉堪流涕同谷哀吟越州第買絲刺繡刺未成公子翩翩雁書至飄飄起望白雲間裘雪牛山度赤山亂餘七十能幾見我且欲往窮當還平生髙李經行處寂寞斷橋漂落絮不知到日似枯魚淚入黃河别魴鱮當空殿閣密雲團曽和薰絃接羽翰至今尚留花石否杜鵑再賦長恨端蘇州正念東鄰女傷心更遇楊開府憔悴語言敢分明買酒行澆茂陵土寄别孫潛齋嘗笑唐衢生一慟可以死焉能流涕被面日日别知己又嘗笑朝鮮無淚可霑巾悲歌兩語為我異婦人平生鍾情重離别一聽陽關腸一絶銅駝陌上會逢君誰料相忘如永訣憶昔攜手青青春水邊一笑禊吏塵醉能狂歌醒能賦滿座惟有孫堯文酒闌歌斷如轉燭寒食纍纍新鬼哭丞相書桐異烏巢曽園仙市芳郊緑海棠三徑無根株敗瓦頽垣亦已鋤舊遊多感有至此獨為吾黨懷區區我欲與君重一到化為長瓶酹荒草早知世事去如風只合黃公壚下倒當時一醉鍤埋我不見興亡應更好且復止此休云云我有陳子髙能文令其讀罷日就君就君歸日誦所聞吾貧吾老不足念君鬚君髮何年變幼安九十愁更愁空羡一生長樂傳嗚呼斯人斯世不相見緑樹鶯啼淚如霰五言律詩夜雨夜半起雷車天門報曉衙何消如此雨又有未開花繡被人中酒茅簷客夢家一晴天地濶稽首見重華留京逺夢孤難到憑髙煙景微重留山僕怨數别里人稀病用寒衣盡書無定日歸十年行役事俯首輒歔欷挽劉明國死於寇浮丘成一夢如此哭斯人宇宙真如醉風霆若有神涅槃空萬劫懸解總微塵有子承千載堂堂麟筆新挽朱文公皇天開太極庚戌聖人生六籍文將絶千年道復明淵源羅仲素師友李延平繞舍閩溪急潺湲洛水聲挽蔡西山四海朱夫子徴君獨典刑青雲伯夷傳白首太玄經有客憐孤憤無人問獨醒瑶琴空寶匣絃誦不堪聽七言律詩錢秀才要社日呈漢宰詩書以豫之錢以長句為謝饒秀才又用社日韻作詩見投復用韻并答二君知津積雨坡云爾故並培翁快閣晴投贈更欣佳士識眵昏寧待好山眀浩然放逐緣多病東野窮愁坐不平萬歲千秋有何得一杯斷勿換浮名餘興江國遲歸二十年十年兩繫峽江船身如梅子半晴雨路入栁花相後先堠短堠長春繫馬江南江北夜聞鵑人生老大空無用寄語羣兒早著鞭咏西湖偉觀樓舉目看來皆畫屏只因闌檻接蒼冥江湖二水一般白吳越兩山相對青雲北雲南何處沒潮生潮落幾時停西偏不被斜陽礙直見家山與洞庭重陽風流九日勝前期誰把茱萸壓桂枝天地盡從騷國老風煙何似蔣陵時故人四海知誰健白髮黃花總奈吹滿座衣冠陳迹逺明年復憶去年詩周耐軒見訪麥徑紆斜縮寄蝸傳呼驚倒望前牙能忘特進羣公表來訪尋常百姓家草市波喧騰竹馬柴門路隘簇鞍花屏窺不信雌同甲為倍髙明兩鬢華夀段知事曉立斕斒拜二親擁門賀客半詩人月三十斛菊花水秋八千年椿樹春每有傳聞須説項明當召入定留恂南來北去多陳迹惟有聲名日日新夀城山六十五留得八千唐刺史看成百億宰官身不爭一月大小閏猶是兩朝耆俊人今嵗兩翻初度日明年三十六宫春近來化得鄉君子為報麻姑不更塵夀周耐軒府尹時方歸自燕去日江南梅未花歸來芳草漲天涯驅馳斥堠八千里夢寐青原十萬家白叟倚門清燕寢黃童騎馬學胡笳八陵盡是燕京路想為孤楸訊暮鴉夀王按察試手東風第一杯江南知已是寒梅山中四老衣冠起野外諸生爼豆開天運又從今日始江空如見古翁來清平笑語皆文物早起書雲認魯臺五言絶句戲題無人知坦腹水影半簾苔驚謂青蟲墮垂絲忽上來六言詩春歸留春一日不可種樹十年未成芳草斷腸花落緑窗擕手鶯聲梅花前速到速到月下一杯一杯好語被人道盡簮花步月歸來七言絶句許煉師擕手求題飬就金童姹女精松風蘿月寄間情廣寒桂樹商飈起咫尺浮黎白玉京春晴江栁長天草色齊新晴何物不芳菲無因化作千蝴蝶西蜀東吳欵欵歸新燕池塘緑雨肥初晴未暖日光微角巾猶帶花梢濕才倚闌干見絮飛夀王太守鱗鱗鴛瓦試新霜斗帳寒輕夜漏長天上玉麟來瑞世夢餘奎壁燦星光韶華瑞籥應黃鐘六葉階蓂舞舜風袖有西山童子藥清霜夜映玉顔紅龍飛天子禹湯明收拾英才共太平寄語吳興賢太守亟將霖雨濟蒼生八千秋與八千春此語繇來未識真曽共麻姑劈麟脯笑看滄海幾揚塵月中桂斫夜琅琅搗就瓊花絶粒方繇是蟾宫折雲路願持雲粉薦霞觴
