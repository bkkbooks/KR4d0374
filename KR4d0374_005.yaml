body:
  text: 須溪集巻五宋劉辰翁撰記鳳鳴山記通城湯侯謂予所居鄉梓里雋溪之上有妙因寺焉其側有山曰雞鳴如翔如翥諸山莫髙焉隠然四面而望徳人君子之容也是宜為鳳鳴倘以是聞於圖志可乎願記之余曰山素封者也孰非人之所命一匡廬也匡去而廬存曰廬政亦何謂之有今之雞鳴者本蜀之羣羊山也金陵牛頭王茂𢎞目之曰天闕則天闕矣況有道之世四靈畜於郊藪則丹穴之雝雝者安在其非尸鄉之祝祝者邪事固有可疑而人不疑者且以為簫韶之音揖遜之舞初作於朝廷之上而翩翩者聞聲而感自天而下不憚萬里而來儀於頃刻者乎其或者此鳳之在人間覽徳輝如虞賔者非一日矣故後世之所以為祥者乃當日之所以為常者也是聞鳳猶聞雞也聞鳳猶聞雞也雖謂兹山為鳳鳴可也山之形也形非聲也孰能聞無聲之聲故坡公謂世未嘗一日無韶吾以世外之耳聞韶雖謂兹山鳳鳴可也夫山則何擇於斯在鍾猶蒋在結為峿屬有名人生之隠者居之是代未嘗無鳳也昌黎以一何堅為鳳鳴之國兹山宇宙人物如林復有遇昌黎公而為鳳者焉未可知也復有為鳳而不止於為堅者焉未可知也地靈獻兆嗜慾有開前乎千載者非惡聲也而昂昂而藏藏尚未得為嵇中散耳後乎千載名聲變化其獨無與卧龍同稱並起共事業者乎則跂而待之矣君侯身行南北史所不到處意象偉然能為太平者而巻巻後進為山川改觀如聞鳴聲盛心復不可多得而望當世抑又至矣歐公喜梅聖俞蘇老泉客我為之賦云二物非能致太平須時太平然後生夫鳳必待太平而後出者也豪傑驅馳於横犇而使後來者為鳳吾黨之願也兹山之望也復有狂歌而過者必後世之如予者乎而予亦從是逺矣作鳳鳴山記晚圃堂記晩圃魏國韓公詩語也道師熊氏藏室名焉吾因子有所感矣士大夫困州縣老塞下勞侍從倦台鼎懐淵明之髙風念伏波之苦語常已晩而不歸或不知其已晩故有托魂夢於枌榆委芳馨於蕭艾自其悔痛言之先一日亦為早自旁觀者太息則未有不晚者也今子之涉世也其能幾何盛年髙舉待詔金門八駿如風再往返猶泠然善也雖故山見志嵗晚浩然即五六十又八九十未晚何早計如之於是師聞吾言啞然笑曰未嘗晚也未嘗非晚也前所言者直一世之晚耳一日之間以桑榆為晚一歳之間以摇落為晚以摇落為晚則桑榆非晚也若代之二叔則摇落又非晚也是以今觀昔無往非晚也予歴廢興玩倒影處西山而賔餞存夜氣於燕息寂然若羣動之俱冺頽乎若松柏之方獨彼血氣衰者類三十年為一候吾清浄寂寞者則雖百年一日也荒吾圃於未央何朝華與夕秀有抱甕老人傴且憊甚過之而嘆曰吾惟早種以及此也吾日入而息未日入而息為怠安知夫怠者不樂吾圃也夫大塊勞我者也而大塊亦圃也因負鋤而立見月而笑湖山記淨信大師行成自燕歸豫章為吾州僧録然士大夫不稱淨信而稱湖山其徒不稱僧録而稱湖山以至四方之客問訊焉曰湖山湖山蓋叢林之詩友方外之義俠也而亦不知其湖山者何謂一日出其鄉章丞相題字云云則山西山湖東湖也凡浮屠氏四出以遊乎空中視戀著故俗如未出家可鄙師獨馳萬里外國不忘其本本儒氏故歐公從石曼卿識僧演慨然以為承平四十年磊落竒士幽憤沒溺於此況南北横潰聲實陸沉師能進退自守騰變踔絶恨無以曼卿之交交之也而皆其外也吾且指山河大地言之自岷山積石以來茍無洞庭彭蠡具區鉅野從容磅礴之以入於海則雖龍門伊闕廬山衡岳天台雁蕩其頽然𣺌然汨於鴻水者皆不可得而見也今人不能於千古之上六合之外具大知識則有以山之髙下為踴躍奮迅千轉萬變而如龍者求其所以為龍而不可得則又以為輕清既上𤣥黄者一旋一轉澄湛而下漸積汚濁以及此也則雖天地之愚不至是矣當其未為海也出於東南而始有湖則山之牛尾而聳者已六七及其洋洋而並於海也而向之牛尾者如象而為島以千數又行九萬餘里而得於歸墟也則蜿蜒斷續而如龍者見矣如龍者見而髙者或如天矣其不能如龍者亦且坦然偃然名為大塊而不可紀極矣自其下而觀之則亦山也蓋東南之為湖山者若此用此觀之則通達之中其為雲夢也復何止八九而彭澤之濵西山之下有東湖之勺水焉夫何足以與於大澤之礨孔而睠焉言之若畏壘而止豈其不自廣若此抑此吾初也繇湖之初而有山由山之初而有形由形之初而有我由我而卒歸之無為佛自其有形者與我無盡則山之來者皆西而水之行者必東也亦安往而不得吾土自其無形者為我則今之巍然者雖數百千丈乃與放焉而溢忽焉而涸者同一起滅即海之所謂東者又未必非天之所謂西也而何懐乎故宇之有吾嘗植杖於笠澤之中洞庭之野而後知宇宙之四遊也皆若此是蓬萊之清淺也未嘗不為陸而員方之遷流猶覆却也而況於歴陽之故愚公之役又有出於人事之未可知者乎則今之湖山其非昔之湖山矣嗟乎湖有幾而言湖山者必向西而笑嘗試與師誦東坡天竺靈隠諸詩喟然想見孤山風雪之外又如坐飛來而飲龍井則師之為吾故人也不已久乎豈畦記天地間無息壤矣南湖朱氏子得其一丘以為畦東至於鄆讙龜隂西至於虞芮南至鄔劉蒍于北至蘇忿生有橰焉灌之不受有桑於此遜又遜之而莫知其何人也則相視而笑曰子豈畦者耶遂自號豈畦吾闢之曰子以不畦之畦畦人於無所可畦而立乎其中中者圭也圭者二土也自南北觀之其何畦何不畦之有開阡囊括以來宋之揠楚之蹊嵒戈錫之荒不論論其譬於道者區以别矣髙者為麻麥下者為蔬芋數之不能終其物而陳者皆迹也變者皆道也此不足而彼有餘則吾亦無不足矣善種者不穫善取者常無窮焉蓋無適而非吾畦也人之言曰䑕壤有餘蔬而棄妹釋者至曲為之説不知至人者自藏於畔側遺秉滯穗皆寡婦之利䑕有餘則妹在其中矣妹吾妹則愛之愛焉而不獲者衆此望人之腹所以覯而多責也可不謂哀邪古之夏畦者吾得數人焉子產以蕞爾鄭為一畦而人謗之有莘之野啓七十里為一畦而匹夫匹婦皆已責禹貢周官至以九州之内則壤經埜為一大畦故胼胝吐握者終其身畦復畦之不足雖天雨猶有憾也若乘雨之雲負月之露以出乎壙垠之野則青青陵陂纍纍古冶吾庸知其初芊綿者春也采采者人也大以畦大小以畦小亦無人焉而不我彼以無我為無畦者正累我也我則異於是無我無不我王佐名鉉天資近道學焉問焉非無志於用者吾故擴而闢之可以觀世可以處世吾須溪農也第五十八雨水中華山書古山樓記長沙朱君佐過予於廬陵相視各壯歳也已矣年近五十書來語我古青之樓將棲隠焉求文以為記余為記之曰青者何山也請更之古山如何山在天地間幾千萬年而未化如駢枝疣贅而莫之勝説豈惟人病是將隂陽者厭之矣吾亦不知其初髙下磊落變化何以至此也以為大塊之所壅而洪水之所決邪其髙且數百千丈為日月相避隠處殆造物之所不能去也意者其亦有杞國之故且墜且積以及此邪求之六合之内而不得雖神州赤縣吾不信也異乎此者其當何如何厚何髙何頡何頏於是有共工者觸之於是有五丁者鑿之於是有愚公者移之觸之鑿之移之之不可則鞭之以秦皇拔之以項羽蹴之以夸父而不勝而衡守而擅鑄而媚之以封禪而阨之以兵革其窮人力若此而謂天地欲無意焉不可也謂天地有意乎後之人益不可也而後之人若有力焉方其自恃也有過此焉而卒不可恃也彼其有助於人也亦多矣其助之不可而因以敝之與其敝者自敝而獨與天地者相終始也悲哉乎所謂古山者如此吾與君登樓而望君所居嶽麓循嶽而南為蒼梧之野二妃之所霣淚南至於羅浮望三山者或彷彿焉今其人逺矣少西為洞庭又西為峩眉之雪蠶叢魚鳬者不可得而道已毎聞子規喟然而起起而望曰望帝今其人逺矣自江入於海則東也其山曰塗山玉帛萬國専車藏焉又東為滄海安期徐生自是而不返今其人逺矣言未既君振袖而起曰荒哉萬古濶乎其四方也吾樓於是間也何居其曠然若古今之塗乎其亦他有所可隠乎子盍為我言之子不為我言之曠也奈何余仰而噫俯而笑曰今猶古也今之古者其猶有存乎則余不得與於斯也子又以今之今者為足存乎夜以思之其知之矣其自明日以往抑不可知余以斯樓為不足樂邪四方若此君樓居而我記之其復何憾井幹麗譙臨春結綺盛時鉅麗者安在下至齊雲豐樂岳陽黄鶴騷人疇昔徘徊落日又焉知其至此則夫斯樓者其不足記邪其不謂之隠耶夫四方而不足以為隠則隠此足矣隠而謂吾山則吾山矣山在天地間誰能主之四嶽三塗是不一姓以吾隠此而山亦吾則山與君俱不可得而見矣不能不在人間而藏於人間異時欲知君者求之樓欲知君樓者求之記記成於已卯庚辰之春日是日也霧漫天自子規南二妃西青青者如失惟朱氏樓獨存戒岡重興院記天下名山必歸禪林如封建大國鐘聞數里僧徒千百㑹食一處髙下萬間王侯貴人賜金上腴奔走飾奉香霏設浴南北宗枝縱横訶詆見稱冡嗣枕經而卧名滿京浙荒州僻壤誅鋤苫蓋羣居鹿豕羸垢雜翳身兼土木霜朝露夕堅苦誦習小心戒行節食賦工髙像出簷亦極一時之力迺有隙光破陋觸礙成機超然獨悟更在諸方之外無聞之表任心直致囬視叢林堕落髙座刮席然後知燕姬趙女不必勝於浣溪孫畧齊韜不能名於背水又未可以地望尊語録惑也二十年前西湖鄉僧盧求吾志三塔笑不與復不自意為安成西戒岡山重興律院發其狂言至此院淳熈間有瀘溪王氏僧道清以醫名有艮齋謝公諤書重興而莫知其所起無圖牒無碑志清以嘉定賜號慈濟大師大師傳獻可可傳志寧寧傳師聖聖傳徳顯顯傳幼聰聰傳復濟皆名醫而顯近年重建法堂與聖所為門廡殿閣稱求予書慈濟堂且記慈濟著清也佛為大醫王方便救世醫能得其慈心何所不濟是間七世専門名科四望迎致不知愈所常苦淳熈至今當復幾千百人大者施田小者獻供從食得衣以儉至餘日興歳造如負急償積久同新愧後揜前第如所就亦自難事施益廣醫益聖又寧止此予因記是本末喟然而嘆曰賈夫販子千金小腆有不肥嗜其欲取饜其事者乎同居圮半坐傲風雨劵分庶孽臨終執手猶有平生辛苦之恨而況醫之為得比於計功受賞孰非已自能致雖僧俗誓異福報事長非其自請亦復誰能勸是彼所謂當然者且奈何哉王孫虜寧棄其女而不分富長者必求其子而後與未必非夫世之所謂當然者也人何能七世一心七世一心而日入於盛難也七世一心而不忘其所本始又難也平居誦習師説不惑異端宫之所以北面而不耗而不蠧而不困以為禽犢則幸甚尚望其日闢歳種禄且庇於雲來抑彼佛有言兎不興角哉嗚呼吾為是屢嘆矣吾為吾教罪人矣然使是醫也返而得其無病之病焉又返而得其所謂絶再蘇者焉則非佛非祖吾亦以為可矣是諸山者豈不亦以予為罪哉建興廟記遯叟居永陽之二年龍集析木之津日在胃二星聚月重暈丈餘於是建興廟寢成族廬市嬉汎如承平曰將軍之賜也旁來擇棲盤桓樹隂曰將軍之賜也廟有三神劉召在焉厥亦惟曰將軍將軍者著始也將軍梅姓廟上横昔者胡氏望走而歸祀焉意其九江僊隠之子孫歟而亦無所考已提三尺起風雨沒而廟食其土其盛年事業如可想見指其墓處曰萬安邑人者慶元戊午重修廟碑也又八十年矣逢時險艱蕞爾生聚而祠宇益盛庭廡鱗鱗帶江如畫然猶溢而為寢則籲者棘而報者稱也堂而兩楹者五翼以書室像其子孫網疎晝簾古柏凝烟道人宗超老於是役而胡君奎沛然成之君曰衆舉也族地也吾何力之有顧所以揚神之聲威光逺者又他有在過而求記於遯叟遯叟曰久矣夫予之無報也予報也能是環東南數十大祀西則金馬碧雞梓潼射洪武當二聖又西為洞庭吳城旌陽之鐵柱集雲之二龍南則衡嶽祝融南海之神颶風之母其東則婺臺祠山又東錢塘如霆如雷子胥之所旦而奮也方盛時冠冕大者帝號小者王侯其丹雘鉅麗儗於鈞天廣内朝者萬計豈獨十倍百倍於建興草野而已今其故地黯然使人流涕不敢仰視而安邑之丘永陽之墟昧焉以昔時將軍聞者如生獨徬徨顧其鄉曲不忍其餘民如孫曽婦子爾汝而語旦而卜曰毋動已而瀆者如旦已而千百者亦如旦開慶可也乙亥之人何恃而不恐乙亥可也丙子丁丑何恃而不恐舍再舍可也左蓴溪右江口何恃而不恐蓋前國正王公櫸為我言去年禾川騎下之日過舟數百其並岸寸尺不泊而去者如有所麾却吾登閣望舟中遥叩額過廟者無數不知其何見也是夜闔市聞鐵馬鏦錚悄然無一跡蓋神助如此胡氏自五季衣冠盛歴中天已未以至今日將軍與之終始是鄉惟古木同時得不翦拜使人如跂其故國羡其夀俊焉南望太和三十里而警遡江而百有餘里為永新號焉雖吾四境時時有警有墟者而胡氏里以弱見完如予與王公焉依者尚十數子兮瑣尾蹙蹙乎無所可入其不見擯於神幸也於戲其敢忘諸在昔寢廟之作有享歌焉如靈均八九章者豈必閟如王宫大如官府哉直傳之其人書之壁以著意諒如昌黎所過昭丘茅屋者楚俗也矧是鄉是廟又有功徳可紀實甚宜乃歌曰大風起兮故鄉馬渡江兮甲若電光長彗吾劍兮截若横靈祠兮鼓鼓舉旗風兮偃旗雨柳行行兮莫予敢侮孝子兮忠臣孝有鬼兮忠有神過故居兮太息飄頓首兮天門將軍歸兮日晚壺椒漿兮道逺安逺亭記郭公彦髙招討出江西衆知其文武威風中州名士也把酒鷺洲之上公言往在沅湘罙入谿洞南士相與亭其處曰安逺為詩若記惜子不及見也予因顧謂諸生曰馬伏波飛鳶霧潦之嘆計其西南逺者七千餘里耳猶以為逺班定逺酒泉玉闗之感北歸長安三千六百里耳猶以為逺若公鷹揚塞外如酒泉玉闗復不知其幾而又出特磨道収羅殿定白杞服鬼國往往伏波所未嘗到此豈可以書傳横從道里計哉東南危坐舟楫號渉萬里吾黨出門西向如望天上若南行瘴嶺非冒死罪逺徙則無所為往平居旬月之役顧念妻子馬鳴客别僮僕無人色孰知老臣慷慨風霜九折畧地報主功名本志哉公方提師巡行山谷布宣徳意使蒿艾遺黎復見天日昔龔遂為宣帝言海濱遐逺不沾聖化今欲使臣勝之邪將安之也公通古今識大體初至沅時以反狀告者六七公不聽迄無反者問其人類怨家也予著公安逺大畧春草碧波鳥啼樹間予與二三子候公歸騎南門之外襁負之孫更生之子皆欣欣焉則亦西江安逺一亭也公名昻大名府人習溪橋記吾州習溪橋永新下陽湯信叔為之初咸淳癸酉夏水甚橋圮三鐵牛見識曰赤烏二年或曰橋是年五月廿四造牛云水去民病涉予謂太守黄同年鏞曰市橋腰也晝夜雜沓何啻十數萬人褰裳縁木負擔提攜自墜攀髙車覆蹄顛豈三十六萬石為郡而不能復一橋器之曰吾日補前政數十緡折欠且不足安取此子其以美言出衆力大成之郡為倡予曰諾橋疏成久之㑹吏贓沒數十萬余謂郡僚曰此獨不可橋乎亟入白許久之橋成又久之橋屋成其難如此繇癸酉至壬午十年耳迺五月廿四日最大水髙戊辰水又數尺繇南柵門邊長澇之屋漂者如市枝牽牛決抵橋橋壊橋數棟為前驅雖址幸無恙稽其日與鐵牛合殆何數也既數月海舟急工役沸興山林貫輸橋僧以此時丏橋柱湯氏湯顧之曰吾以羈旅脱盜難茍造舟有餘者無不施或曰施寓言耳然不逾月橋成成而壮於舊倍圖經云櫧木橋唐天寶七年縣令吳勵置不知何年改習溪習溪為城南甫六百年自有此溪則有橋而謂天寶始則吳令之云也意者亦必有記也天壤以來為吳令者多矣而相望於無聞無記故也微咸淳鐵牛見則孰知此橋自吴赤烏造哉此赤烏牛耳橋不始此也以蜀三犀證之則橋亦始此耳是三犧却水患濟行役不為縣則為市於今亦六千二百六十四甲子矣贑江南來毎春雨積夏雪翻湖擁西江漲江壅習溪漲漲未有不冒橋退嵗或再至三至不再三至者亦無慮不浩蕩閱千數百水而橋始一壊赤烏始一見何古之作者如此其厚且固也而作者亦無聞焉又何厚也橋於地用龍行以吾所見如吳之垂虹閩之水西泉之洛陽不論揚州金陵錢塘姑蘇又畧彴小者亦不可為數無不葱青闌干雕麗蜿蜒垂楊過雨鞍馬如畫是橋朴陋不當一溝一曲而成之難則郡之壊也久矣以其壊之久成之難而湯氏以一言之信一人之力一月之久間海舟之役俛焉為之而人不知此吾所以記也雖然自吾小年見是橋盛時為社林州祠為官藥肆為旗亭歌鐘列妓長街燈火飲者爭席定場設賈呵道而後能過往往可厭然咸淳新造而旗亭廢矣十年再過而燈火稀車蓋息矣今其棟宇髙堅江山呈露聲銷塵歇未必不勝舊時而市井老人行歌還顧自不能無所感也於乎鷺洲横陳石梁縣瀑亦有孺子蕭然而濯足者乎為我候之信叔復買地橋西又屋以栖守僧又將買田作僧供供佛皆不可以不記橋成壬午十有二月明年九月郡人劉某記核山堂記蓋吾甚有感於核山之為人也澹乎其無求於人黙焉而不見其所長循循然而起亦若無與於人物休戚而人物休戚亦不能外自四郊之外四郊之内橋梁衢道壊而未舉舉而未成者必求其故竭其力盛寒暑不倦不愆於公寸步武如志異端禍福不為動而遇所可捨如委諸路不必其知有已雖憂患困阨之中猶為人所難為畫地而計出人於水火白刃生不望報而物報亦或如之又非自有餘也惟力所不可與不能耳甚儉已而足人其旅於城居不十年而槁壤為髙明東西塾環子姪學焉娶焉復如其故居盛時不衰與之久而益親知益信然知之不為喜不知不為病吾以是敬之為之記核山堂亦曰核山書院核山書院者有意乎義學之為也核山其自號也木生於亥核在木中仁在核中如知其為中則天地之於元氣人之於天地皆核也皆非自外至者也無此則不仁故無不仁之天地亦必無不仁之人人之不如核也則多矣此心害也無心無害非無心之為核迺其所以生者必出於無心也易曰碩果不食食者剥也剥之又剥而後不食者見焉則以剛之不可食也一不食而生不可盡矣是剛者非果也核也天地非此果則不能為於其春春非此核則不能為於其果故言果不如核核者造物之心也雖然核必棄於人者也其為物也剛有棄於人之道焉以其棄於人也而物或望之為無窮此君子之所以為人下而造物之所以為無心也今夫吾之於人也何能為於一核而自喻必仁必不曰不仁其言也大大於天吾媿矣吾媿矣抑獨予媿也哉近世生道有二一種而生者核是也有異本而亦生者非核也接也接雖枝葉有過其本者焉此人巧也而核之為道迂為味寡為力勞矣然而核古意也生道不二本二乃偽也則物之化焉多矣是以媿夫核也抑獨予媿也哉核媿見真故核又有真義玉湖記淦張氏元發號玉湖或曰玉方寸為印方數寸為璽尺以上撱為圭竅為環規為璧周旋為瑚璉彞器大為甗極矣彼玉伊何湖也湖鏡也殆幻也而亦有其理乎予曰有猶之玉山山之有玉猶衆山耳人立而山立人行而山受暎也極西有雪焉望之如玉又西有羅漢石焉望之亦如玉況夫為泉為池為澗為溪深而為淵長而為川茍矜重特達無不可即依附晃耀亦無不可何獨於湖而不然吾不知彼所謂湖者其空明錯落何似汪洋迤邐何似風塵四野白汗交流山之髙也失其所謂蒼蒼者登髙而望𤣥黄霧合而川流林表一目數頃方如鏡而白如月也非玉乎則夜之所見亦猶是矣方月之未出也暮色曖然不必深宻也當其時湖為玉月之既出也光景動摇已而沈沈如席如犀照底當其時亦為玉此皆人所日涉而近得之者非幻也然近矣而未得其趣抑天地有大幻者吾嘗行廬山阻宫亭簸左蠡呼天而無岸前年出山南歳大雪候土目渡避海舟下出夏林驅馬入長江沙四望皓然光霽奪目汗漫迷路問野人何處曰湖也何路之問蓋宫亭左蠡重湖間也嗟乎非夫所謂玉湖者乎恨君不至其處至其處不見是境吾為此記寒雨如氷望二孤叫五老其頭欲白神清魂蕩十不一述焉又不知君之與湖湖之與君與吾所見大幻何似慨然嘆曰觀至此復有進於此者乎無矣余為此記讀者無不洒然想見玉湖塵世之外厥或難曰主人無在余曰玉湖是已今世號焉者多矣非其人如玉且不見稱數尚何記流俗淺浮彼白我白心胸相識能知人語意所屬非神仙大人抑復誰能況此張君幽雅勝士多從游者刻吾記堂上以此曉之非張君意也是嵗端二又書敏齋記敏齋陳清父毎見而有歉予之色曰登至不敏者也而衆相謂曰敏齋殆誘且警之而毁者以為譏也予曰不然人未有非敏者也雖有下愚之人手不能方圓目不識之無及其得於博也彩色電轉狂呼鶻視梟未成而脱諸口如取雖有離婁之目力鈃桑之心計或不能及也今夫負於塗者輕千里趨時日如不及權門并進㨗徑夜行迎意傾前利之所在未有不至也目憐心心憐風雖有跛牂見便則疾亦如盧令逐㕙三周華不注而不止雖力不能及而不可謂無其意也夫如是孰非敏者雖然人未有敏者也或明小而闇大或智前而愚後或知一不知二不論就其能者劉𤣥徳見事而遲顧長康癡黠相半以鼂錯之智至東廂而後悟以楊徳祖之能更有困於三十里而不知也則復有敏於此者乎其敏者亦不可為乎清父曰幸也予不至是予曰不然予欲使君與夸父爭先與慶忌比㨗與惠莊取辯乎則君誠不敏矣抑使君從容而談利害貫穿而通古今得之心而書之紙則彼健者給者有所不能也而過人始逺矣君何謂不敏大器若樸天機貴深豫章七年而知鬬雞三變而木干將埋於不用鷹隼藏於為鳩日之行也緩於步而八駿常後之大也雷霆之蟄也無所知而山石不能禦積也後之敏者皆昔之不敏者也靜近愚晦近魯黙近訥而君有其質矣試使君巧慧便麗猶將惡之況恥其不能而枉以從彼為快或曰敏者敏於學也故有七步而詩成八义而賦就者倚馬磨盾者一揮九制者豈不亦可貴乎而何惡於敏予曰不然此非所以為敏也君子之學不貴是也人毋以敏用敏彼以敏用敏則凡俗吏之健決小夫之趣辦躁人之速化以至老於機而雋於獲者皆亦可以敏矣芷堂記吾同姓自昭居何山近市如陋巷家惟芷一本五十年根浮甕香出屋客至意銷有羡焉欲得之者其家尊曰吾父所植也問自昭曰吾祖所植也無不惻然已惘然去比年馬之過市也如織髙垣重閉丹青草木無得保所素玩矧是美植然睨者不至至者不取亦若有守之者問何道自昭曰吾惟托之無可奈何而亦無與競也問其所以培壅而夀自昭曰自吾見吾父未嘗溉溉亦無所受根而已片蓬芘日雪霜亦於是其得於天者狹今其葉可二尺而花之層出者拔其萃以長比他植最早又後衰吾與之生長更世大變以及乎此願有以記之也蓋自何山百里求予記於荒林之下噫吾城居人也往年闢一室號問不知有方外道人養盆芷廿年舁以好我歳再花而予遷遷而避於方山之下它日過吾居未焚有馬於庭方齕是根以飽予閔然三歎賦之去彼其芳也與予同又養於方外不為淺然一入吾室曽不能芘其足今君之窮也三世而芳如昨雖睠焉愛之而不溉不修自然而已不遷不吝亦自然而已此其有數存乎意者亦君之祖徳有以隂種之也昔之知數者於一花一葉一飲食而占其盛衰況大寒大暑大兵大亂三世五十年之久無所芘賴無敢愛無敢害王之槐魏之紫方陳之荔或更代易姓為人所感歎而君之芷亦異於是詩書容膝子孫繞前花時對客牆沽老瓦近而撫之目睫舊廬舊邑不見喬木此何生在上而芬猶未沫兢兢焉不出户庭若得於天者僥倖至足此其足恃以久也而豈獨此芷之為驗哉予於是媿君矣雖然有患是花也五十年藏於市如隠今君之號芷堂也始著則後之求君者必於芷求芷者必於君君得無累是芷乎夫予之芷已若芷矣又為君記之雖君不累得無予累之乎君曰吾惟懼兹芳之易朽以及此也則為約曰吾為君記耳藏於君藏於君子孫君之芷五十年矣又五十年乃出之先五十年為紹定壬辰靜見堂記以動為見天地之心非知道者也孰非動也待其動而求之曰心在是天地亦人矣人亦天地矣動猶車輪其中空虛必有不動者與之俱動而非軸之謂也隂陽之為化其圓物也故未嘗停以其無可停之理也因其無停也謂之動又必待其少頃而後為靜焉有是哉水動而濁濁而且澄不待其止也蓋清之於濁嘗相受而未嘗相受其性如此水亦安能常止止而不流未必非受濁之所也惟流而不失其止之性則動也未嘗不澄徒一器之水猶若此況大川大壑經營六合而出於六合之外奈何以其往也而罪其不止以其容也而遂謂之不清哉夫大川大壑也猶若此人不能知天地之道自其動而觀之則天地一市也市之所以籍籍者何也動也有大隠焉居於市而無市人之心無市人之心者亦必有孺子之色焉若其起居飲食猶夫人也而中之所存者有不與之俱化者矣夫市也猶若此蟲之化也必異其初者也其初未化而已有其質矣及其蜕也向之為蟲也其死久矣蜕未蜕之間如無知焉人不能知也觀其蜕曰觀化晚矣夫蟲也猶若此鍾君茂甫名居室曰靜見意者亦不以靜見天地之心為非也不以靜見天地之心為非則亦必有見矣而猶以為未之見也質於予嗟夫吾欲使子觀於靜耶則求天地之所謂靜而不可得也復欲使子觀於動耶則動也又未嘗非靜也彼以夜為艮冬為貞者似謂天地閉亦猶蟲已伏市已収水已凝又久之而後能運運而又息耶不知息之為道生亦息也非息而後能生息即生也是之謂復復反復也反復嘘吸也一嘘一吸為一息即嘘即吸常並行而不相待如待其吸而為嘘則一息亦必有間矣雖然理有甚精而亡益於用者吾未嘗言也嘗聽訟趨庭者之於忿莫不自以為直亦莫不有蔽焉吾徒以無心其間也常瞭然如睹而紛紛者猶未喻因是以推勝敗之數即凡戰陳之事皆若此矣故為將之道先自治靜者治治者靜也故曰其轍亂又曰攻其右又曰韓孤顧魏靜者見擾者不見也彼擾矣吾又熾焉從之得不擾且敗耶學静難靜學靜又難必坐忘者亦未必不偶馳也有能舍靜學而得之於動焉其為靜也常靜不然閉門所得投之獄訟軍旅也常䘮嗟乎吾老矣茂甫其幾何不以吾言為怪哉逍遥遊菴記客有以逍遥遊菴大字求記者視之安成故人趙漧也而神貌不可辨矣逝將自此肆志衡茅之下終焉日夕相守若非文字之托無以為此菴者予歎曰人苦不自足耳往時父兄子弟拄杖入市不東家即西里酣嬉傲睨行者避路常少年厭鄉井志遊俠拂衣草屨出門左湖右湘諸公貴人下客飛觴共賦縱觀逺賞猶鬱鬱不自得髙者談邊下者覔舉已得舉復不樂視庸夫髙等同官爭寵科舉外復大有事或從是逺引閉門息跡而諸賢論薦當路踵餽直疑殷生不起名山絶境俗駕交横或間王事攜妓女世未嘗一日無客客未嘗一日不遊然飛揚䟦扈者常有不見知已辭君北去之意由今言之竟何如也吁嗟漧乎本忠厚福禄子孫家食樂善好修見稱瑞世亦何惡於人者一旦變衰而野人獲之以為疑犬羊羈之以為肉語有禁步有誅悴焉不知有生之樂於此時而方行求蓬累如脱桎梏茫洋乎塵垢而嘘吸乎喬松抑微子誰不願此且以今者之遊為志則子之昔者其獨無逍遥者乎其亦逍遥甚矣而莫之知也昔之逍遥甚者猶莫之知則今之遊者其未得為逍遥也吾欲復與子飛蒼走黄左旋右抽狂歌痛哭若無人者其將能乎其之齊之魯之宋之鄭之秦之楚之不可而飄然跨海踞龜殻而食蛤蜊者乎其深根固蔕一龍一橘之不足以逃死則黯然者卒歸之數乎而何地之可菴何菴之足寄於是漧也泫然曰奈何予曰昔之逍遥者不自知其可樂也而今也知之矣長途倦暑憩樹而歎曰清涼境不必美䕃也故曰有杕之杜生於道左如之何以今日為不足焉知後日之苦今不猶吾今之羡昔乎漧憮然曰愈甚矣予曰不然即君之泫然憮然之間而菴具是矣或曰然然則莊子之遊亦若是乎曰遊介菴記屬予初識老彭介菴翁年八十餘健步啖聲如松風夜濤厚重如抱甕負鼎望而知其稟盛志彊然不知其有養於此有年矣相遇不相叩一語别相望百里而逺顧巻巻以介菴二字徵言或曰介堅也故木之介猶甲之介甲之介猶蟲之介確如也其以此自守如石則不以易乎其外也菴是之謂乎彼介之義則然矣然非喻道之言也易曰憂悔吝者存乎介介者其間也物莫不有是間達者藏焉人則顧陷其險甚可悲也吾嘗行田間春泥汩然墊於陷者容足以為天下之險如是而已前而遇絶澗丈餘兢兢縁木之僅濟又以為不殆於墜者幸矣一日避亂山中見塵而走既暗失道聞水聲潺潺或曰此有橋欣然若翼以飛它曰視之廩然莫能復也則向之神者度之矣凡平世之蹶人也甚於淵而立乎是非榮辱之塗也如綫故間者天下之至險也得其間則超然避世而不犯不屬於此亦不屬於彼不為利先而害亦莫之隨也其為介也微雖至微必有介也其為介也微故昧者常蹈乎彼雖至微必有介故物莫能礙而從容者猶足以自處焉邊境有人焉其名為竊人知竊之為盜而不知天地之盜有所不可無也宋鄭之郊曰嵒戈錫陸之吴羊之晉不耕者亦數百里焉利害之交死生之地常若有嵒戈錫數百里者而人不知也然此其曠者也若燕南陲趙北際雖不合者如礪而猶可以避世也而此猶其逺者也楚漢之時商洛之路兵革之衝也而四皓老人嘯傲風塵標然如巴卭之橘此以楚漢之間為介也而此猶其小者也隂陽變化出於開闢之始六合之外而一動一靜至微至危在於一身一息一粟而人莫之知也此以有極無極為介也大寒大暑而不相侵也往古來今而不相涉也是一動一靜之間者也此其為介也至矣不知天地藏於吾身則以吾身塞於天地而有不容焉吕梁之流而遊者狎之中山之燼而入者冒之彼固未嘗無隙也羿之彀中而有中央者焉乃其所以不中也猶拔於吳壁而益知吳壁曲折也是亦未嘗無隙也若不夷不惠非心非物則雖吾亦不能知也彼以其外之介者為介菴非也雖然吾語是菴也逼矣而何以處我山心記羅君斗雷自號山心以書抵余曰昔者吾嘗遊矩堂履齋間未嘗不朝夕見也未嘗不為余記也當其相時則有所不暇也及其歸也則又有所不暇也今以屬之子矣矩堂董丞相槐履齋吳丞相潜也嗟乎二公者非不暇為子之山記也意者亦欲為子之山而不可得也嘗試言之方矩堂為北衙所逐載車匆匆如鼂錯過市其平時非無東山之志而狼跋其胡晼晚至此林慙而磵媿之矣如履齋海上復何可勝道哉比賛皇牢頭之恨雖無窮愁之作而英爽逼人懐之流涕殆夢寐不忘平泉木石也當二公柄國豈其有一日鐘鼎之樂而晚節末路陷世大僇丁沈賈踣江斷國亡而後姑孰之濵敬亭之墅爭二公為重然反其所自生皆不能無老潁之憾則二公之於山也非無心也雖謂之無山可也子亦知之乎子之山也子之樂也此矩堂履齋昔者有之而不能得者也雖然客翹林觀東閣雖無中書考無尺一責然日暮而白雲飛夜中而啼鵑血盛年撫劍浮沉賔主欲隠則不能欲決絶則不可於其時老是鄉也得乎吾今與子莽蒼四顧豈惟矩堂履齋之不作而薇歌不任掩面道窮欲去是山也得乎是山之心不心係乎時之我不我槩謂之無心焉可也雖然山無心今之不可得而疎者即昔之不可得而親者也子隠几而觀之青青者亦有語乎天地之氣百年而一為人數百年而一為公相其為丁為賈也幸而不出乎我而為董為吴者亦幸而不至乎子也則夫山者非今世之貧賤交乎則其莫逆而不可解也決矣雖然佛言過去心不可得今吾欲求子之山之心於今而不可得也子欲語余以其今邪則已屬之過矣夫心是山者山未忘也若身在世間則予忘之矣子以為山一心邪則山之心而非子之心矣蓋山憐心彼以其無心也故憐心嘗試往問之亦必謂吾言然薌林記香者天之輕清氣也故其美也常徹於視聽之表微而感襲而不私其於人也神受之泠然而天與清風俱可以際㑹而不可以把玩蓋貴富自然而非貴富之所能擬比於人為不朽非夫生意磅礴則不足以及此而或者欲以智力勉强雜多品致薫修屑屑焉彷彿諸其形容而不足以易寒葩異蘂之一笑人亦何所不至所貴乎香者無求於人惠然莫得而親疎近於有道後之為香者直溷之而已亦未有識真者焉清江之張氏桂得過江御書薌林二字於向氏寶而藏之曰何所非林亦無時焉而不芳因自號薌林求余記余謂林者囿萬物而物不足以囿之故香意者其出於空虛得之淡漠委蛇乎無何之境而非夫栴檀薝蔔之謂也子亦知夫芳之所在乎未嘗即人而未嘗不即於人藹衆芳以為林芳不在乎其衆蓋千竒萬秀之不足至其遇也得一而已多春夏之交風露之所鍾英烟日之所増態靚者麗者艷且淑者畫有不能為於其工譜有不能盡於其類然通古今而共評香無出於蘭芷其為草也㣲其名世也藉秋霜冬雪何物不枯惟小山與孤山清獨溢乎宇宙吾所謂一者必其出於衆植之上林者得之以為香而非物物之皆香也及其香也雖謂是林也物物皆香可也屈離騷楚兩龔東都嚴陵唐韓杜宋歐蘇極能言之士贊歎之而不足雖復徳位之尊福力之勝名節之髙而風流文采居然有不可得而並者飄飄乎一林一枝一代一人香者未嘗一日絶於世世亦未嘗以其變於昔也而不香雖百年千年之逺所以名當時而誇異代者猶斯人也猶斯人也此所謂品也抑吾有二恨恨或者不知香而立傳彼甲麝朝士蘇合道人知徐庾惠休而已今其人安在凡膏煤木屑皆欲以比生香不知生香者無可比也嘗欲效香傳位花品而無其人一恨恨前輩察於耳而聞香吾山中也曰桂與蘭證之吾山中而已今言楚者曰零陵與八桂諒亦何嘗身至其處佩此劍彼校清濁哉二花殊絶也今為贋二恨張氏志髙潔嗜文獻不以世俗寒暑易尊尚不以物論浮夸眩情識其所種樹如此與吾同好亦不得不與吾同恨且其名桂其為根也月地而天香雖然芳何心於林表而林表得之此知道者之所憂也生乎深林不以無人而不芳然芳之貴重隠約者政以無人焉故也則斯林也得不又深又深於此與
