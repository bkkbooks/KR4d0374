body:
  text: 須溪集卷六宋劉辰翁撰序松聲詩序故嘗笑夫莊子之言聲也之翏翏則翏翏而止耳之調調之刁刁則調調刁刁而止耳而何足以傾於耳寤於意所謂琴瑟之一吾何為聽之聲皆出於自然為籟而有小有大若近若逺或離或合髙下變態磅礴恣肆者未有若夫松之為聲也夫其為聲也疏疏密密多多少亦若多其徐徐而來也如解亦如襲大如驚沛如決勃如變色淘乎其浙江之潮而未嘗絶也混乎其昆陽之戰追奔逼北而不知其所止也隱乎其天瓢之既吸而阿香之已逺也其負重而休也耶其再解再合而勝者敗者皆不可知耶宛兮而似嘯頽兮其欲醉微而語振而舞有匽者軋者沓者騫者柔且縵者如笙鏞者裂萬鼓而餘烏烏者蓋泉也得之山石之間有其雄有其悲有其頓挫而無其韻若竹之為物則非無其韻也則亦如優施學孫叔敖俯仰談笑皆似而疏髯不類則乍聽皆合察之而愈逺也使天地間人才似此則老成峻茂文武威風皆當充塞宇宙詩而似此則天矣豫章熊氏詩號松聲吾為發聲義此非世間長簫短笛一絲一曲比也欲知其詩者求之松聲欲知松聲者求之風風天也非松非風故又發天義長沙李氏詩序陸放翁詩萬首今日入關明日出塞渡河踐華皆如昔人想見狼居胥伊吾北有志無時載馳載驅寱語出狂徒以資今人馬上之一笑然今人馬上萬里復少此此曹氏父子所以英雄冠絶傲睨風塵之表如長沙梅溪李君庶幾登髙能賦使人謂江南才子亦不負山川竒氣者計其所涉歷戰爭興廢不論髙臺壯觀荒丘古冡史傳歌行有不盡記盡記不盡見者如河出崑崙窮所未睹蓋踟蹰往返湛冥濟勝而又有得於父老所聞證異同合新舊或長吟或浩歌音節悲慨不待考其時其傳寫諸懷抱鞭鐙所收無非囊錦盛時混一若獨為行卷開闢書生不出閭巷按圖拊髀豈不可羞沮靡徙哉嘗笑辛稼軒北來志氣如虹獨鍾情數曲止君楚人楚聲又留連燕趙解裝下榻收拾評論少年壯事直託之流漓欵乃苐周旋筆墨間意亦使人興已老無能為役之恨吾聞慶卿之飲於其市歌罷而繼以哭覽此亦然趙仲仁詩序劉後村倣初學記駢儷為書左旋右抽用之不盡至五七言名對亦出於此然終身不敢離尺寸遂欲古詩少許自獻如不可得故知唐宋大家數未易兼善也每賦詩入手必先得一事仗而後起最是一病近年文最少詩最盛計何人不作何日不有趙仲仁自盱來出巨編商略乃古詩十四五可取至五言十可二三七言視五言又難得絶句又難得苐其格價故當獨以古勝非其才不足兼家數異也相過彌月時時與之上下前人律絶務進於古然未嘗及建安以來得失以為佳處已欲無上不足復贊也雖然尚有遺論後村謂文人之詩與詩人之詩不同味其言外似多有所不滿而不知其所乏適在此也吾嘗謂詩至建安五七言始生而長篇反復終有所未達則政以其不足於為文耳文人兼詩詩不兼文也杜雖詩翁散語可見惟韓蘇傾竭變化如雷震河漢可驚可快必無復可憾者蓋以其文人之詩也詩猶文也盡如口語豈不更勝彼一偏一曲自擅詩人詩局局焉靡靡焉無所用其四體而其施於文也亦復恐泥則亦可以眷然而憫哉不平鳴詩序亘古今之不平者無如天人者有所不平則求直於人則求直於有位者則求直於造物能言故也若天之視下也其不平有甚於我有甚於我而不能自言故其極為烈風為迅雷為孛為彗為虹為山崩石裂水涌川竭意皆其鬱積憤怒亡所發泄以至此也退之謂四時之推奪為不平彼四時者各一其所而豈有不平者哉凡天之所不平者皆人事之激也大決所犯傷人必多不如小決使道人之不平所不至於如天者其小決者道也小決之道其惟詩乎故凡歌行曲引大篇小章皆所以自鳴其不平也而其險哀有甚於雷風星變山海潮汐者矣豫章楊氏所為詩是也其自謂不平鳴甚善庸詎知其不平者何故夫余亦天之不能平者也不能言故也故又欲託之楊以鳴趙信之詩序越王之孫有賢公子宅於不土之里而詠無言之詩此非亡是憑虗比也賦秋陽問對可不須此坡公直欲以筆墨俎豆杓之千載非其用意竒崛孰克知此為畤字哉德麟平生文字則可考已嘗笑大年小景為元祐腳自然逺輩畫手宗室故易得名生其時得公重難矣哉羅夀可示豫趙信之詩豫讀之歎曰此自足矣豈待附致藉重使人讀而問又因而想見往往以為可人者顧猶待吾言耶附翼耶本朝有宗衮而無賀白一恨然自南塘兄弟下逮汝茪類以少許勝多多近年崇滋崇澤輩平平爾汝亦欲與紫芝相望惜也代衰道墜誰知其人信之獨能後四靈酬倡播為月帳雖吾老矣望故都鷗社有欣慨焉使在二十年前少年若此豈獨為吾等説項供奉選也嘗記古心説趙忠惠兄弟成就番陽湯料理烏山方皆極用情此二三君子皆以文名天下在其門或未見信之好學意度開美其於李鶴田也如其祖於壽可以其祖於鶴田有之似之云乎光逺而又它有耀者也天末有懷塵昏路斷吾愛公子豈獨如當日德麟而止恨無筆力為賦冬陽信之由礽也歐氏甥植詩序詩無改法生於其心出於其口如童謡如天籟歌哭一耳雖極疏戅朴野至理礙詞褻而識者常有以得其情焉上帝板板下民卒疸其言俚不屬於毛不離於裏其義乖小東大東匪且有且昔育恐育鞠其音鄙其文拙方言如哿猥言如嚏不雅甚如殿屎刪後猶有如此者當自喻也荆軻項羽臨岐決絶之辭出於不擇大風之歌一發有英氣比秋風視草逺矣彼旬煆月煉豈復有當日興趣萬一哉因歐氏甥喜改詩往往不如前為言吾私未可以改罷長吟語害意也植初讀選詩間一二語有古意亦其資近耳賜也宜何歌也古人自量願學如此唐詩雖不難學若下橋失步便可置是然選體復有宜戒如漢火德稱朱光魏稱黃暉或黃祚月不曰月曰朏魄雷雨不曰雷兩曰解作以解作對升長為草木以二鳯為二離譬以雞鳴為括揭凡初仕謂之牽絲手三十謂之既立長夜謂之廣宵又如雖抱中孚爻偶與張邴合莊念昔曽存案無蕭氏牘庭有貢公綦至今亦不知其所指某爻某張某莊某貢某蕭也坡公愛歐公教子姪取古詩中時作對以為與家人語盡情吾為歐氏甥竭言之非好譏評也使巽翁有孫能味吾言吾不負巽翁矣植也未有字字曰性存木雖曲直曲亦必直遂也從大枝視小枝未有不直也是其性也連伯正詩序古之窮詩人稱子美郊島郊島以其命而子美以其時或曰時與命不同耶曰不同也使郊島生開元天寶間計亦豈能鳴國家之盛而寒酸寂寞顧尤工以老則繇其賦分言之亦不為不幸也若子美在開元則及見麗人友八仙在乾元則扈從還京歸鞭左掖其間惟陷鄜數月後來流落田園花栁亦與杜曲無異若石壕新安之睹記彭衙桔柏之﨑嶇則意者造物託之子美以此人間之不免而又適有能言者載而傳之萬年是豈不亦有數哉不然生開元天寶間有是作否故曰時也非命也世變又衰求如子美當時不可得而厄窮過之如故人連伯正乃未嘗與於一命之士而長吟坐嘯淒其千百其時其命如此殆合古今窮者而為一人因為言古之窮者不必如今之甚以寓吾懷傷不可極之思而其詩之苦則伯正自能喻之於言雖覽者未嘗不同其時同其命直不能如其詩之一二則得之口者在彼猶我故雖嗚咽流涕之至亦無不快然稱好云程楚翁詩序王者之迹熄而詩亡詩未嘗亡也而所以為詩者亡矣方其甚也顯譏默刺無往而非怨人見其怨也以為甚也不知所以為厚也猶有望也蓋至於奄奄延延其可譏也以為不足譏其可刺也以為無足刺則昔之怨者日逺日忘雖欲求其復甚焉而不可得而所以為詩者亡矣所以為詩者亡則其熄久矣讀匪風下泉之亂至於誰能烹魚溉之釡灊四國有王郇伯勞之為之喟然嘆曰詩至此亡矣夫其顧曕周道也猶有思也誰能烹魚則茍有食其從之矣冽彼下泉猶以為冷也感無王而待郇伯則道傍凡木之隂或俯而息焉而亦不知其非矣詩未嘗亡也而至此無可為者矣雖謂之亡可也科舉廢士無一人不為詩於是廢科舉十二年矣而詩愈昌前之亡後之昌也士無不為詩矣所以為詩亦有同者乎程楚翁歙人也自歙至閩千里自歙至江西又千數百里而去年入閩訪老謝今年來江西訪豫風霜歲晚貂裘道敝再遇却不振獨皇皇如有求而不悔自親黨諸人未有出此况於未識誦其詩悴然而思深失然而志長非其中有以自處孰能反復三千里若無所為者乎負飯宿舂行不百里不得意而返懲不復出迂而不可回也尼而不能止也其所求於詩者如此則所以為詩者豈不甚厚矣乎東漢之季飄飄遼海者大抵以求師取友為事異乎戰國之客之秦之楚亂人家國者此則孔孟之澤也嗚呼詩未戰國而已亡戰國復至今而未亡未亡也而愈昌王者之迹其有以為未熄也歟哀哉辛稼軒詞序詞至東坡傾蕩磊落如詩如文如天地竒觀豈與羣兒雌聲學語較工拙然猶未至用經用史牽雅頌入鄭衛也自辛稼軒前用一語如此者必且掩口及稼軒橫竪爛漫乃如禪宗棒喝頭頭皆是又如悲笳萬鼓平生不平事并盡巵酒但覺賔主酣暢誤不暇顧詞至此亦足矣然陳同父效之則與左太沖入羣媪相似亦無面而返嗟乎以稼軒為坡公少子豈不痛快靈傑可愛哉而愁髻齲齒作折腰步者閹然笑之敇勒之歌拙矣風吹草低之句與大風起語髙下相應知音者少顧稼軒胸中今古止用資為詞非不能詩不事此耳斯人北來喑嗚鷙悍欲何為者而讒擯銷沮白髮橫生亦如劉越石陷絶失望花時中酒託之陶寫淋漓慷慨此意何可復道而或者以流連光景志業不終恨之豈可向癡人説夢哉為我楚舞吾為若楚歌英雄感愴有在常情之外其難言者未必區區婦人孺子間也世儒不知哀樂善刺人及其自為乃與陳后山等嗟哉偉然二大夫無異吾懷此久矣因宜春張清則取稼軒詞刻之復用吾請清則少遊杭浙有竒志逸氣必能倣佛為此詞者郭兼山沖晦中庸説序吾黨纎悉物理欲如白黑多寡而後能喻至言天人性命之際往往愈析愈離而真實愈不可得此中庸所以有伐柯睨視之歎也舊愛先儒釋中以為一家則堂為中一廳則堂非中而廳自有中矣物理不可謂不極也然嘗小年觀月見其若步相隨人而不知其體之未嘗動也長而遊四方觀於星垣斗極雖極南極北萬里之逺而目前者猶是也由是悟所謂中無不在者又非一處自有一中也是理也嘗言於人而未嘗言於人嘗言於人者無隱乎爾未嘗言於人者日用而不知也新淦尹真定何君示豫以郭兼山父子中庸説將刋布之求序余開卷即得其大者了與人意無異其言曰天地之數起於中合中合之變起於自然而不可推移故民受天地之中以生所謂命也又曰孟子言不失赤子之心此得天命之性者又曰必有事焉則上天之載可以馴致或萌於心或感於事隱而未見眹而未發皆所謂謹獨然則謹獨之道何為哉先儒謂謹其間居之所為非必此也君子豈以耳目聞見為意哉即十目所視十手所指而有不睹不聞者多矣嗟乎此非執柯伐柯者之所能喻也吾雖欲自以為得耶則兼山父子已先得之矣吾言之而有合者何也彼其學於程氏得於面命也非諸生讀語録比也吾嘗疑程録自有精意如鳶飛魚躍章語云與必有事焉而勿正之意相同會得時活潑潑地不會得只是弄精神未必或者不以其禪也略之非郭氏學於伊川則必亦以為禪矣雖然非取節而言之又表而出之則子雲復生未可知也象山常疑太極圖絶於吟風弄月之後以此觀之又未必然送人入燕序往時吾州去行朝千七百里長亭短堠如畫衢信之間華堂逆旅髙屋蓋道憩車擊馬不見晴雨列肆青樓倚門成市行者如織然場屋之老人山林之退士有終身不出丘井聞東上而笑今燕臺萬里而又塵沙暑汗野無流泉苦寒裂膚通薪後爨謁選者羣千百滿年歲固有僥幸非常而流落者尤不少視往時邸都門僕承受坐而得要津近次者難易相萬此宜裹足不敢望分寸顧鄉里小兒起白身徒步如蠅附驥如隔墻取果如維摩臂見異國舉津津焉動其心諒無一人能安分白髮者豈昔之能者皆靜退而今之往者皆英妙耶意者科舉廢而瓦缶鳴官簿非而狗尾續也香林張提舉桂在今朝以當路保舉發身賢勞歷任非鑿空詭遇者比獨家食有年欲一動不可得春半來别謂將北首豫喜其斯行也為言今昔之變以慫恿之以見夫求者不當求而處者不當處也又以見香林時才之選而猶舊人之風也然則入都之日謹母以吾説示人謹母以示同進者須溪云王氏族譜序生物一本今言陳胡者曰舜後未有曰吾瞽出也言司馬歐陽者本禹未有曰吾自鯀也故譜之所傳世之所及必有可稱者耳計其間絶續轉徙陵夷湮沒何可勝數而居然十世百世不亂姑即吾身而論為士者有幾士而不失業而遷者有幾推而上之其無名若字如阿大第五者豈其少哉而阿大第五至今云者亦獨以其仕耳吾鄉金地王氏北來季稚以十八世孫譜宋而上又譜金地而上則推極其本自黃帝而下盛哉雖槐隂與馬糞何别已臯陶庭堅忽諸多矣又南又北得不失姓難士大夫數世忘祖聞遙遙以掩口獨先河後海跋涉不墜又難按王氏有媯姓有姬姓二有外國姓四至晉始分琅琊晉陽不同譜然濟稱恬從兄則二譜又似未嘗不同也季稚一本之帝王似矣禮諸侯不敢祖天子大夫不敢祖諸侯母亦以黃帝而上有未始無始也者而金地稱長者曰始祖亦非也非其有田若祠以存至此後世豈知有長者哉是其存也又不以譜也嘗記賈丞相初牒胄試賈於族微有憾揚言曰天下士夫無它賈求即與牒館中共贊我公廣大得張子西銘意是日適客倡賈都都參有孫祕書者素狎起驚曰將無求牒試耶四坐笑不能忍似道亦笑而沮試言生物一本安處此北韻序字出於聲聲制於氣皆物之自然者所謂天命非意之也蘇老泉以物之懸於空中首髙而尾下於是權衡生焉夫物之初也何莫不然道生於一而縱橫離合長短左右生焉是為字獨嘗疑草書之作起於漢省然狡獪髣佛誰能家至户曉而揣摩習之雖倉頡之初茍非出於形聲情性之所近將如雕戈泉貨國異世異雖今莫能盡識故方言優亞常有聲分之字而無其字者直未制耳譬之日用十三卦之後隨時制器何限而皆有已成之字極猥陋而無不具其物陳之吾前亦無不可識故曰自然者天也及至孫亮為之武氏創之則不旋踵而廢無他意之也凡釋之而倫類不通者皆意之也世道反古橫行倒置蹄迒亥午乃有北韻南來簡便同文又勝昔之韻略函三於一事省物備夫文者不以律次則亦何不可者東平朱簿刻而布之如睹爰厯復滂喜為言其初漢文帝病士大夫應對多不實故􅀢字去口千餘年於此而士口甚願從此省别約三章孝經集注序東陽厲同舍直之來江西留臨川優遊俎豆間有年諸生愛之未嘗有所求於人獨時手寫古孝經集注是正次第如蟲鏤蠶績久之刻成編轉參轉授以售則無不售比年死喪之威至無復解官持服有踰年不訃訃已不奔稻錦樂樂無恙有身為學官風欒棘不去賦茅鴟又不去若此者豈復可以紙上流涕道之哉仁哉君之用心其使豫悲矣親喪固所自盡也哭死而哀非為生者也喪三年以為制亦不能不為生者也今周公以來防範禮教胥淪喪哀哉詩云孝子不匱永錫爾類直之於是不匱矣直之居泗溪上方求豫書泗東書院將歸而聚習於斯焉夫亦何以甚精義為即身體髮膚受之父母不敢毁傷其誰不喻喻即三語足以為經矣不敢毁傷者天地生物之心也心不桀亡豈無為子臯衰者吾言誠過贈周秋陽序吾評周秋陽不獨志行落落難合而文字亦多犯世諱其講義懸合處類與所謂禪學相出入可諱也詩雖流連景物他人以為隨世可樂者未嘗不痛飲大噱而其極嘗有流涕可憐之色讀者神傷可諱也疊是二諱可以長嘯而立於獨矣顧俯仰不能無求嘗往復千里無一遇獨皇皇師友間意得一言自信塵視宇宙何足復語不知淮隂圯上霜朝晚步意象有過此否持此四方行已半世使吾言而有益於飢也不當更求求無益而迂未已殆亦未可解也凡窮達有命至使人罪詩詩又自罪罪之甚至自誣首如坡公烏臺磊落傾倒猶恨不竟豈盡吹求洗索之故哉十數年前按章月課言某人背師説或竄棄不齒終身如負大僇吾嘗欲取諸賢髙處得之佛老形聲俱似骨脈都非者比而陳之可以覽觀有省然且不敢異哉秋陽將舉世非之而不顧者非邪吾遊冶城讀晉元帝廟碑慨然想見清談千載之上劉後村遂用為詩本水心意也皆所謂文章豪傑之士特自有見者也雖然學問何用文章外有事世道若此未可以前非為是以吾説為據以能此為足也後山太虗知已尚願屢警贈倪生謀屋序安成倪方大既見以卜居卜之我數年間求我者衆矣或驗或不驗故厭薄未有以對也偶夜坐風雨中慨然念之孰有以無廬望我而不恤孰有以無廬養母望我而不恤追惟往時屋陋不庇寒暑洎奉親入翹館分東府起江東寓揮塵連春光最後都城借全府别廨皆極華屋而吾母亦見棄於此卒未嘗有家居子舍之樂焉今雖益宅數間然使吾惘惘如逆旅以此方大方行四方吾欲使子卜之通達之中如吾舊耶其亦不可得已如吾晦者亦無及已母亦蚤謀一枝以饘斯粥斯不至如吾舊吾晦也嗚呼孰有以無廬養母而不恤如吾者乎如吾者能言之而已能言吾平生而已贈尹方亨入蜀序往時士大夫入蜀動稱萬里吾鄉如劉茂中以選人罪籍往其弟又以布衣往皆不得已而皆改官以通籍歸如羅子開又以納粟取二千石稱普州使君其後蜀愈壞至朱南山開鄉閫求從遊之士許京削贐萬劵猶有慟哭於江濵如趙仕可者又非瘴煙絶域也其上青天如死地斯世之所以不可為類此近年南北混蜀道通士又無所為往乃有出門西笑如見卭竹杖鑿空而起者幸無罪戾之逃與格法之拘獨以布衣徒手捐妻子棄墳墓以其身輕百丈上瞿塘歷鮓甕如可喜而又無萬劵京削與改官二千石之望往往直以成都如錦青城之上在在如牡丹坪可以悅心目忘鄉井歸而可誇道於衡門檀穀之下耳則喪亂以來比荆湖江浙又不足道也吾於是竒尹方亨矣使異時人人如方亨無以為又耐辛苦輕寒暑舟楫世道亦不至如此今雖如此而又有不樂鄉井不愛京浙名束書逺館獨藉手吾一言若輕舉而初識天地之圓方如方亨者又竒矣吾安能使子局局然一室哉雖自走嶢關出長安秣趙刷燕登黃金臺騎驌驦馬而歸可也贈采詩生序古巷歌故俚采而刪之為風楚非無詩計其所遺若祈招者衆矣此騷辨之所不能平也唐詩宋詩盛而童謡絶猿啼鬼泣里無歌聲今宋又如唐矣嘗疑李杜以來所不泯沒者非其自致於人人豈復有喧衆口誦百寮上者哉而近年感慨之作又甚矣雖新安石壕秦中諸篇何足以盡喻其苦而亦何可以傳回思兒時所誦中冓之言狡童之刺不知其國其人何能自克蓋誅絶之罪也於是宋詩逺矣安成故楚乃有兩生彭丙翁胡復初者起而收拾之自喻采詩將四方岩穴無不有其迹焉甚盛心也浩然質之豫以行余謂采藥名山可計程必得今江湖有幾畏塗滿眼不惟有霜霧之勞而又有虎虺之患裹糧逆旅待見從容或未及見而其人已不可得矣蜜之於蘂日課也海之於珠歲利也若無所利而歲為課者惟采詩乎然使吾不出户庭而坐得所願者兩生力也俱妙年俱作者故所好獨在此而自其邑首塗出此而遇火為之倣徨纍日如有求而不獲余亦不能却也蓋些余魂於焦爛之餘拜而送子勉哉詩之窮已若此贈宋司獄序獄無輕重絶人命江南春病癘秋病暑髙明者或不免况獄户隘繫日重有一宿而斃者有一人斃延一鄉者彼以為輕罪而頌繫之無害而不知其害之至此也吾聞司獄宋子貞每三日即取輕繫者上之催結絶盛哉仁人之用心以余所知其甚難者又不一事焉有仇當路當路於既往妄而執男子之嘗館者意其訐已鞭之甚夜且斃付有司焉子貞受而全之逮旱慮囚白以其非罪久繫請卒脫之不測使衣冠父子復相保者子貞力也有捕盜不獲而更失其卷者既獲盜問焉盜不勝掠則謬曰嘗賄吏盜之實羣案吏使識之最後執其一曰是已吏寃痛誣服然盜亦哀其亡罪則訴於臯陶鬼曰非我也奈何子貞聞之詰盜盜訴如臯陶子貞載其語白郡郡不聽及盜棄市與吏俱子貞力爭不可得緩死久之廉得其案於廢卷千百中然後上下駭服當其時非子貞此吏幾不可贖然此獨職分宜爾其所居巷有老人日不食食酒酒敗幾沒於酒子貞起而調護之厚又適其情老人得不甚病其施恩不報用意於無情類此此余所知也余所不知復不知其幾也子貞不求余知也余疾夫譽人者之過其實也故直以余所知者言之如傳使勸且戒焉而亦非求子貞知也贈李生談星序頗有言近年樵谷星術者問誰氏曰永豐李仁卿子也家故儒識今古其來也因問之曰天不變道亦不變信然耶東都莊遵一夕為客星帝座間暮年黨錮中荀陳相聚五百里內見謂真人東行其一時將相貴人何限天之於隱者獨常目在之如此故吳中髙士恐不得死而戴洋一仰首即知其為我蓋天意重在此不在彼也何代無隱者隱亦有無姓名者其皆可見耶其亦有不見耶九州之外千年之久其皆不見於星象者有之耶無之耶天不見耶其隱者變天亦遂無意隱者耶生無以對因重謂之曰固有妄人得至天上問何地俾就蜀嚴問之彼成都卜知天上則嘗候之矣乃天上亦知有嚴君平耶今天上復有何人其至不至生未必不知會有寄聲問生生奈何隱贈蕭清可序秋風歲起歲甚彼沈沈如山者何恙所欺獨貧士破屋耳自杜詩以來類以秋風茅屋藉口然宇宙千年所遭寧始此直賴子美狂歌發之使子美為千萬間不能而自子美藉口至今則千萬間在此矣蕭同舍清可居虎溪本亦自渠渠足芘寒暑變衰厲濟梁壞成墟皇皇欲求草堂資於人豫謂當時王録事於子美已許寧少靳政似亦擬挂名集賢間子美易嗔小詰墮在計許且微此孰知當時王録事哉然又有仰人栖止徴為名聲者十一二年前過某郡有同舍語我平生無求值新侯業置屋邀我俯仰其間余兩賢之問故人地主乃大不然蓋競也如清可介然冥無幾求者非有求而又託於無求以賢人之賢已實自賢者則求者與者皆其情之不容已也嗟乎吾故人無屋多矣吾為故人屋多矣吾故人為人屋亦多矣復為清可徴子美如新清可貧清可貧贈周儀之入燕序中州人士淵藪比年可兩兩數雖由坐井固陋知聞不廣抑大故有數如麟如鳳理不在多獨恨窮居已老無繇睹所未見誦蘇子由贄韓魏公語泰山黃河之外逺想慨然周簿儀之溪園公子耐軒弟如食前方丈家庭饜飫何所不有然猶有庾家兒慕王逸少意時時見過論議不屑去則其美如此其進亦未易量也今其遊上都觀國必將遍參熟候初見大方故與之言坡公焉方坡公兄弟未出蜀聞人稱韓富范歐陽如天人及至京師見諸老務為寬深不測之量憮然如有不滿其言富公無間之可入也美辭也其如有不滿者亦在乎此也而諸老之厚重可見則亦在乎此也當其時朝廷尊嚴雖以坡老之大未易干説如戰國䇿士之遇今女子小人未得則怨而上之人接之者亦歉焉先有所不滿焉嗟乎此一時也非中州極盛時乎吾嘗論故都一代風流文物造就後進之美皆始於歐公過江乾淳不能及也向微歐公韓富之門不得為多士儀之是行得見如歐公者焉而後知古所謂得士者得其一已多不足多屈也蕭何竒韓信容有可傳此復不傳贈鄭簡卿序濮吳中丞曼卿將為其鄉校禮殿祭器而使江西省掾濮鄭簡卿實來江西郎中馬德昌徴余考之古以堅其信余授意範匠亦再毁而後合既與晦翁所定毫髮無復異惟犧象不能使其中虗四立蹄注如古亦以為無益於泂酌故止然猶有二憾王肅云鑿背為尊又云為牛象全形負尊即鑿且負是也未必所見全牛之非負也而今鴟夷渾脫非尊意一憾古地坐跪酌飲故器小而足凡髙尺幾寸幾分謂自此而凖非如鐘律一黍之不容易故深衣隨人指中節為寸而宣和製器亦有依樣減樣之異最通論也減之可即從是而增增亦可也而殿像尊髙立二獸其下如伏雛二憾吾欲稍充之使負尊峩峩如肅所云理無不可而又力有所未及姑存是説以開來者萬一不為無補而非與古異非與晦翁異也凡禮之起皆猶此也彼分寸者復何自而制哉其深如此即其髙且廣不得不如此也故曰由此而凖也若夫稻粱黍稷之器宜從竹疏如籩豆取其氣四達坫從土築沙土為之從占占去聲有不易其所之義故可以柱爵可以奠圭皆不當鑄爵有柱為其反地也他國君則奠圭於此簡卿委蛇謹審亦欲知禮意者故特為之誦之卿名居敬求所居齋名余謂居敬而行簡以臨其民獨欠行字耳使行之而擾復何足以臨其民敬者先立乎其內也尸居如事帝則出門如見大賔出門如見大賔則使民如承大祭矣非器之謂也感與應一念也至簡至簡而不容吾力行之哉故命之曰行齋附為説贈琴泉陳生序謂能琴能仙人豈信之哉琴亦不得不仙昔之授人以意者必之乎海中無人之境使之荒寒絶壁水鳴空山四顧蕭然將不可以朝居而後萬纍俱捐而後氷雪滿懷而琴亦從是近矣此與送君者自崖而返蓋同一悟入非夫人間世之比余四方聽琴就其能者鏗鏘中音節止雖堂上娛人若不得已至能使孟嘗為之霑襟欲絶則曽不如漁歌鄰笛之去人逺而尤悲非其絃之不合而意不至也臨川陳琴泉有魁然抱南風之興且其江繁浙淡得之自然而無弄琴之色固已默焉出江湖之上余心醉焉因與之言曰女知廢一絃而鼓宫宫動復調一絃而無一絃之不動者乎未有一音而無其君者也君道然矣女知廣陵之所以散者乎或者其有君而無民也不知琴意則已知必審之贈潘景梁序吾陋巷蠻蝸氏之間草樹荒涼國中貴人無為來者日者二客談詩去未逺乃有前驅踵門下馬低徊如將就老兵東偏顧還辟而主人問焉則今之行御史濟南潘君景梁父也坐無俗言惟詩若文傾聽不可得絶余為理二客前語相顧充然若再盡上馬去復求余書語間意余謂文者皆不得已也故傳六經語孟非問答即紀事無作意者下至諸子史或一事反覆或一語酬詰猶未至無謂無謂者獨建安以來耳故東漢皆以西都為妄作班馬視先秦如古人凡沛然成章而每舉不厭者甚不多見也杜詩韓文間以俚語直致而氣始振然夔潮以後之論興而惑者始不可窺較矣今言詩類如子美散文言者唶唶藍田壁記為古異哉必求其有謂與不得已庶幾羌村同谷之音滕王閣後記之體乃與無作之作合夫言雖技也道亦不離於言楚非無周公仲尼之道道亦不待周公仲尼始有而陳良北學者彼殆以日用飲食之外為他有事也今君之所聞於北方者未有非吾之所欲言也所陳乎詩若文者又未有非君之所欲言也夫道如是而已自灑掃應對以達於禮樂則自周孔始耳道不得已為言言不得已亦道繇此雖北宗可也贈三同乳子序丙寅丁卯間余謝郡坐客次民有以三同乳子見者倪侯普撫之如媪既月稟附學待其長又賜帛割奉華其歸亹亹有恩義四座環屬目焉蓋藍氏子也頎然鼎來年既二十八袖贄各楚楚語有佳致念初見童子教且養至此倪侯力也三百年忠厚與天地生意長久士大夫學問識政體德愛流風聲寧獨三子慰人意因骨節記年歲傷老大懷舊俗也阡陌小民夜遽求火常在草不起子厭丁纍及夫知保抱亦有弟而兄啼况駢連二三更哺迭乳置猶弗子濕不可推天吳紫鳳顛倒不給其不弱個難也生兒如虎墮地或不武大家嫡庶弓冶世習蓬麻兼長猶不相如二桃恨而成丘諸葛降為狗此獨何師友修飾臻此其一時競爽又難也抑野人獲麟君子泣之三子以景定元為名次而各綴之以瑞因記是年有以一稃三米獻諸朝者乃改建陽嘉禾使吾州有諂者如建陽則斯子為嘉禾矣何名三瑞何再見之為祥歐公賦蘇梅有云二物非能致太平須時太平然後生吾於是蓋再嘆矣贈韓道録序士患不入官入官邂逅惡弱殘州冷邑如囚寄枯懸奉入不足以塞號啼之憂回思士貴至欲復為屠羊不可得士官廢興如此近年道官比士官則又甚矣廬陵韓道録自臨川來客天慶天慶異時置司兼住持尚不乏釐為甲乙而來者定巢託食殊窘免於削伐僦賃則幸耳吾州寺十百道宫十不當一若與僧頭會百處一稅緡計千處一歐公謂老子數千年才一遇遇必出於時君世主然猶不勝况今世稱道官於不可為之時與寺至多僧至富之處破窗暗雨落葉蕭然師方行吟向壁掃地而坐聞隔院飯鐘悟日已晚飲泉自潔惟北關候貴人驛騎即公事豫嘗哀其窮欲使有力者稍助薪水顧師無求人之色故當雅全之然聞其師自燕歸則慨然故山之興若不可留者獨復捆屨宿舂又逾月不能往豫笑曰猶待蜩翼耶師浩然徑去古云天上多至尊相奉更若人間耳是山中勝天上也人能知山中勝天上即天仙不與易也况道官况吾州道官其歸去來耶其又勝來耶贈徐心易易數序豐城雷宜叔初赴殿之日卜於鄉人胡易鑑遇臀無膚其行次且意殊惡易鑑賀曰魁兆也臀從肉無膚無肉獨殿巍然其上非殿頭何惜其次且在二三間既唱第果然他日又卜癸丑魁得咸之上六曰是在下經第一又上爻也無所與讓二兆人皆能言皆占道所不傳殆意會俄合不可為軌則實變易之妙也其外孫徐心易乃獨得之聽其言有出於先儒之外爻象之表無復魁人魁地故常事而驗驗亦常事耳然可與言易天地間無非易也或得之聲音或求之時日或見於字義故有隨曲射匿云吾嘗葬古心公不克卜之市丘生其卦革丘曰克豫未信也明日而左丞弔焉復克葬豫問丘革改也而不改何也曰是在武侯易革喪車象也視之信因悟古今字説未盡倉頡制字而鬼哭憂無所遁乎其情也鼎無足也而乘舟生焉雷火虗也而為盈為實以之一離日也推十日而知其子其名牛推兩日而知其二夫其名昌神矣深哉心易之變化意者其出於此乎謂余身卦小過之恆昔有筮頥之益以示郭璞曰震銜風仙卦也雷山雷風顛倒適近然余常以仙為妄想殆過贈廉監司序踐官不隊常事若代有言責髙其前聞人如臧孫達諌鼎出棠魚上逺甚君子以為必有後蓋三世而至文仲言猶立盛哉如臧孫有幾而泯焉者多矣古之人古之人猶難之吾乃今得之京兆廉氏廉氏以官賜姓仕至平章尤著凡司徒司空下至倉庾皆氏於其間獨氏廉難也受是姓任是官又難也吾不能知世道何如前時獨聞乃翁古遺直如不可復得吾江西乃得廉監司如瑞雖使各有職每懷靡及而清亦稱已吾江西公論隱然在之殆半古而倍不半古而足也今其為行臺選表身愈髙望愈重其寄國與家愈大祖道諸賢棹風南浦之上倚去舟如登仙廬陵劉某聞其行也喜曰我識范君其持身處女將有為也將有言也固廉氏之遺風不衰今夫將軍介胄之士蒙矢石扼蛟虎雖州縣小吏米鹽錢榖馳驅寒暑排斡山海豈比乘使者車坐行臺察屬部髙簡貴盛哉而視世事浮沉利害若無與瘖相顧憔悴妄發為戒居常疑陽城七年事不知此七年間夙興夜寐何能自處人生幾七年官旦暮不保少年不自愛快朝飽忽失聲已矣何限獨兢兢顧畏名節不可為寧負當年羞萬世尚論解衣赴蹈急病况仁聖在上大度如天吾嘗苦口諭親友教兒子雖亡忤亡益獨聞數年間吐哺某事某事趣銷印趣銷印如不及歎曰真英主也勉之哉語布衣難人臣又難諌人主易諌英主尤易甘定菴文集序去此二十年臨川胡幼謙嘗校文廬陵余為京庠時豐城甘公以幼謙屬我故知幼謙公壻也問公集幼謙以銘請曰方狀公行未就又十六年而行狀不來則幼謙亦已矣乃幼謙之子安詩以公集來求序序有幼謙之作矣余何言念他時再見如夢夢非他人所知他人知不能言乃言之公壬辰徐榜余是年甫生而公以戊午來校文廬陵衆謂去場屋爾久豈復能課士而余尤見迂不入時者公得余論䇿驚置首選殆兩窮自相得也時有省賦魁項教汝明者别持一卷曰余主斯文也宜魁公爭不能勝既相見輒罵叱曰牛項屈子項不能堪甚則取公所發䇿與余對獻之其鄉人戴正言慶炣媚賈相戴得余䇿讀之感動曰有如此䇿耶吾不忍攘其舉獨取公削籍置江州於是公三削矣乙丑紹陵登極古心在政府余為京教白公寃榜朝天門甘某三罪三雪衆歡歎竒事已而古心薦擬得京局余為公擇上日公驚曰見次耶是日謝古心為朝士言余處二人皆以識會孟故其一人夏司門禹錫前吉教也明年余劾去公代公去夏代夏改官日白堂曰豫諱禹錫願去禹諱錫賈相怒曰有自諱諱耶亦汰士窮達命也而余獨著其連蹇者傷吾文之難遇與知已之同時而其與余善者命又特相似非牽連不朽後世復知有吾等哉幼謙贑尉名以遜戊辰第待次丁外艱其校廬陵之二年國亡又十三年幼謙死平生骯髒至為文皆似公文似公復自勝若公文則有幼謙之評在善矣哉余不與易也公名茂榮字榮可其鄉稱之曰定菴先生劉次莊考樂府序余嘗與祭太學見太常樂工類市井倩人被以朱衣及其歌也前者可後者哦羣鴈而起竟亦莫識何語而音節又極俚有何律度而俗儒按之以為曲曰樂章薑堯章至取編鐘朱瑟帙較而字定之然語言無味曽不及其自度香影諸曲之妙乃知栁子厚鐃歌尹師魯皇雅皆蔽於聲質於貌嗚呼吾讀文王清廟何其往來反復愈簡而愈有餘地雖不能知其聲而洋洋者如倡而復歎之不足也故可歌也故知依聲鑄字出於述者之過中無所見則如市人濫吹聞而從之者也劉次莊考古樂府如生其時又與之上下至某代為某歌往往推見次第倣佛大略不失節奏然謂樂府起漢非也古詩皆弦誦如今巷歌樂之始也三侯之章出於烏烏沛中兒童和習之豈必被絃歌而後為樂府哉解題外集古今作或題樂府而詩近律用見賦詩者不必本古題古意而意之所到亦不必求之四聲響切而暢此於解題又最有助吾嘗謂次莊如鍾鼎博古無不可考至其文字與東觀餘論米元章書史兄弟也曽季章家集序詩自小夫賤𨽻興寄深厚後來作者必不能及左傳史漢間記人語言亦不特公卿世家為有典刑雖何物老人至鄙俗不可口者倉卒問對可誦而舉科舉興士能時文而止而時文亦復猥陋不達第尺牘何等塗抹絶倒或繇前名合選大官要職至斫窗丐買金籠擎致又不能得能言本色此雖前輩亦且不免故楊休文以道士代言陳仁玉林光世輩皆以雜儒流修史所謂偽定一時後世誰知子定吾文者豈可一二僂指而道哉豫既為曽同舍季章埋銘而其子麟也舉歐公於聖俞子美江鄰幾例卷俾復序其家集豫謂諸生時文不能如季章故他作不能如時文時文外大有事然亦豈能事事而學政在時文理到而無不通耳使季章而在何所不可為然使季章至今抑何所可為是能使人嗟悼適復在此政恐時有可為亦不過當日為人落落草創而命遭世盡閹焉不自見者所蓄發如是而止徒吾文知已以為身死言立之遇然思諸公貴人不能得如季章而用之者今其人先安在而季章藩溷筆墨驚見之如新幸矣其有今日哉季章名應璋墓志次第可互考送段郁文序郁文段君以東平書生為吾州知事數相過論文説詩氣相同甚善然北來馬上君獨守文飾吏視書如律得不迂滯疏廢吾南士政坐此它日聞某事某事強人意必郁文郁文乃甚剛毅難事之長蒙茸枘鑿鮮不決裂敗意君從容其間能使曲就條理感移變化而人不知亦由其審細不倦而又平心以觀理微言以達意故侃然獨立而弗忤使專政得民不愆于素所為講畫詎止此乎吾平生觸事感憤或急欲語不自達雖消磨至盡終覺激至梗塞故知為郁文者難也吾州事紛糾百它郡語言成市吾間居絶物猶有議其傲病其貞者罪不可諒故知為郁文者難也惜也君去我使我無益友以文過使吾民不得豈弟以遡獨有一於此推此心事上長位宜得輔推此心事君無遂事而諌物之蒙利者當益廣而豫獨不得不闕者然郁文不當獨厚我也嗟乎復有虗心好問如郁文者乎蓋顛倒羅列之餘而皆君所自有也泰和胡氏族譜序先生有小史以奠系世其歸在厚人倫後世反崇華胃自損其實而他冒其名雖華非其所當於其人奚益假如言劉者宗漢不知婁敬之劉得為漢乎言李者宗唐不知徐績之李得為唐乎胡之受姓以來貴且華者莫踰漢太傅廣譜胡者孰不詫廣為冠冕惟泰和胡叔俊獨知廣黃姓而遡其自出之𣲖則本於河東以及於金陵叔俊固知辨名實者其交豫名文可者叔俊族子也其人狷狹多竒尤喜賦新句觀其志要有所樹立不欲茍附借於人豫嘗問其世文可告以叔俊自敘如此豫因詰之曰自宋以來貴且華者又莫踰忠簡公爾不祖太傅然則忠簡公後乎曰吾非其後固其族也已五季時有諱贇者字文美官金陵子三人辟地來吉伯公霸居廬陵仲公真季公陽皆居泰和公真之後有曰衍擢進士為朝奉大夫公陽之後有曰箋為南城縣丞叔俊出衍後而吾出箋𣲖詩禮簮紱炳如也印以楊文節公所為福榮堂記井然不可誣妄雖不忠簡其族固不辱有胡豈可概言隴西而混稱琅琊者哉豫聞其言而益壯泰和胡之世有其人也又復之曰剛簡登第人問忠簡言非其祖卒能以直聲振當世為廬陵異日忠簡况胡本舜之逺胄也希舜之人即舜之徒摳衣於鄒魯門牆者奚必以剛簡忠簡為泰山哉後二年文可續叔俊垂絲圖為流慶圖成偕叔俊子景純過豫求辨一語遂書前言以加諸首吳氏族譜序吾州盛世大族相望屋髙下如畫圖花木成隂羔豚合樂老者顧少者而歎猶有生不及見承平之恨其逼隘喬遷者又别為宗綿瓜蔓葛至不相聞知類以為已業所致八邑惟永新大夫數姓固然一日襄城之慘儒坑鬼餒方知天涵地育未必皆祖有功而宗有德也杵漂焉留獨遜綿者吳氏吳氏有譜楊東山所為引邑燼譜亡宰邑者故紙得之不知何等物也以與蒙菴吳仁叟如棄蒙菴寶之與俱於是亦屢破屢劫復不知僵前仆後間何能自保每相過求豫敘斯譜不置屬豫屢病相愛不敢強又數年蒙菴死死猶筆之舉扶間以為請其子若壻屢道之忍辭則披示舊載而告之曰豫所稱遜綿惟吳氏非獨為是邑言之也蓋其所存者匹夫之業而國不與焉故千百國之會朝不足以易荆蠻之至德而延州來之歸喜見書䇿雖黃池之霸猶一吷焉曰公第一者不必其名也載之令甲而稱君者不必其爵也此非譜之所得而譜也此邑上中院派來自廬山其歸廬山者為咸淳尚書為德祐京尹下者猶監司太守滿門然一名第一辛苦不可望今為庶此譜有科目者表而出之班班自南唐至近年愈甚盛惜也觀止此使科目不廢學不墜皆將有列於上陳如蒙菴者尤吾望焉此則事之可感者也吾故論其綿綿於譜之外科之外者使其萬子孫永永其遜焉則繼此譜者其不益又盛於此也勉之蕭禹道詩序嘗過友人坐間有杜詩一部試開卷第一句云一縣蒲萄熟余問此有意否其人大笑曰一縣蒲萄熟即一縣蒲萄熟耳余曰題為寓目下言苜蓿政謂此二物皆北地所生今滿眼見矣未喻信手復閲一卷指第一句生平鶡冠子舊解曰鶡冠子隱人也其人即不復問揖余坐余因自念此顔駟之嘆也故其下云眼復幾時暗耳從前月聾其厭世自悼如此肯疊鶡冠子對鹿皮翁徒道一隱字哉今人未必知古人而有輕古人之色漫謂尋常語即尋常意試使宿留思之未有不自見而色已如此胡仁叔詩序舊常評某人詩清嫩其人不滿以示羅澗谷澗谷曰過矣審然當唐詩何人共可幾語為足以稱此凡諱嫩欲稱老不知清嫩與淺嫩異政未可少也如輕風淡日時花美女小兒睍睆初語别能令人賞愛有味亦不在多固未可與彼老者同年而語也杜子美轉添愁伴客更覺老隨人儻無起語十字坐盡情事曲折更接以紅入青歸桃栁之句豈不誠愧其嫩耶劉孚齋詩序作詩如作字凡一疑作書齋第一類欲以少許對多多許然氣骨適稱職者蓋深許之桑麻深雨露燕雀半生成以生成對雨露字意政等怨而不傷使皆如青歸栁葉紅入桃花上下語脈無甚慘黯即與村學堂對屬何異後山識此故云功名不朽聊通袖海道無違具一舟幾無一字偶切簡齋識此故云一涼恩到骨四壁事多違此今人所為偏枯失對者安知妙意政在阿堵中作詩如作字橫眉堅鼻所差幾何而清俗相去逺甚嘗與客言老杜親朋盡一哭鞍馬去孤城客言近世戴式之亦云此行堪一哭何日見諸君余笑曰俗矣因又舉誠齋髙安賦云江西個是竒絶處天下幾多虗得名中對著此橫絶氣蓋宇宙客言即某人云天下有樓無此髙余笑曰又俗矣即同言同意愈近愈不近詩至是難言耳陳生詩序詩在灞橋風雪中驢子上非也鳥啼花落籬根小落斜陽牛笛雞聲茅店時時處處妙意皆可拾得然此猶涉假借若平生父子兄弟家人鄰里間意愈近而愈不近著力政難有能率意自道出於孤臣怨女之所不能者隨事紀實足稱名家即名家猶不可得或一二語而止如孟東野慈母手中線歸書但云安極羈旅難言之情如李太白昨夜梨園雪弟寒兄不知小夫賤𨽻誰不能道而學士大夫或愧之矣如陳后山歸近不可忍以為精透亦可以為鄙褻亦可如杜子美問事競挽鬚誰能即嗔喝欲起屢見肘仍嗔問升斗乃并與聲音笑貌仿佛盡之矣又如古人於奴婢猥下寫至孤客親僮僕凄然甚矣又云僮僕生新敬則出處世態隱約可見又云犬因無主善則俯仰猶有不忍言者如陳簡齋平生老赤腳每見生怒嗔揮汗煮我藥見此愧其勤更自風致清真而豈今人不能道哉履豨者每下愈况賦車者載獫歇驕吾評古今甚深密義得之淺易它人不能識乃反笑豫陳宏叟詩序小隱陳君以九日過我因為誦老杜舊摘人頻異徒一頻字而上下二三十年存殁離合之際無不具見但覺去年明年之感未極平生又如衣冠却扈從為還京之喜與先時不及扈從而今扈從道旁觀者之歎班行回首之悲盡在一却字中然此猶以虗字見意如逺愧梁江總還家尚黑頭才一梁字耳舉梁而入陳入隋不勝其愧人知江令之為隋臣而已三誦此語復何必深切著明攘臂而起正色而議哉往往讀者又以實字忽之今人詩五字或贅二字不可以不知也秋風圖序子美草堂四其一在西枝村未成其一在浣花則所謂斷手寶應年者是也其一在瀼西則所謂乾坤一草亭者是也其一在東屯則所謂兼茅屋者是也子知浣花茅屋一為秋風所破不知瀼西東屯與萬里橋西風何似不更卷否風年年同則夫托於通達之中者彼猶此也其堂也裴中丞嚴中丞髙使君為之主既堂也徐卿蕭何韋三明府為之囿其破也王録事王十五司馬弟為之修平生憩息地營葺袒茅屋而大官遺騎鄰里親朋交相如此則拔之者之力不能勝樹之者之衆贈胡聖則序子美平生流落拔足鄜塵丐拾為資起浣花草堂三年而後成成數月為秋風所破不知嘗復完葺與否而飄飄江上避地愈逺從瀼西徙浣花各三宿桑下而去古今過客耳身生太平恨晚生亂離又恨早居今憐子美亦羡子美贈星度郭大觀序故友張居中言泉人某善命視其弟命五星既四正又順段駭曰故都侍從命也然不得科弟問何故曰喪亂主四餘不主五星也豫聳然志其説於是當國有羅孛者哀哉地遷運改將五星廢久憤而復求用於人間耶抑其裂有甚於四餘耶果五星耶今不喪亂耶吾儒有郭大觀得五年前臺厯盡厯之妙以是遊諸公曰觀人盛哉郭少年之用心也吾聞大德得祿位名夀蓋有有祿有位有夀者矣名終不與也龍逢斬比干剖萇宏碧子胥浮伯夷叔齊餓靈均沉皆古之無福人也子識之耶識之取之耶不鄙棄耶而他可取者則多矣題跋題劉玉田選杜詩天下能讀杜詩者幾人而玉笥道人劉玉孫集妙句多悟解如此甚未易得也豫評唐宋諸家類反覆作者深意跋涉何限吾兒獨取其間或一二句可舉者録為興觀集然槩得其散碎簡徑選語若上下極論長篇大意與諸作互見不止此蓋此編與吾所選多出入凡大人語不拘一義亦其通脫透活自然舊見初寮王履道跋坡帖頗病學蘇者橫肆逼人因舉不復知天大空餘見佛尊二語乍見極若有省及尋上句本意則不過樹密天少耳見字亦宜作現音猶言現在佛即見讀如字則空餘見殆何等語矣觀詩各隨所得别自有用因記往年福州登九日山俯城中培塿不復辨倚欄微諷杜句泰山忽破碎涇渭不可求時彗見求言楊平舟棟以為蚩尤旗見謂邪論罷機政偶與古心歎惜我輩如此古翁云適所誦兩言者得之矣同是此語本無交涉而見聞各異但覺問者會意更佳用此可見杜詩之妙亦可為讀杜詩之法從古斷章而賦皆然又未可訾為錯會也題宋同野編杜詩杜子美年四十五自鄜陷賊半年明年自拔取拾遺扈從還京又明年始外補又明年始棄官入秦自是流落輾轉凡三遷所遇識不識相勞苦所居間得故人為地主起家贊戎事斧斤多助種藝果樹廣者四十畝東屯又有稻可收當時朝廷雖亂道路無壅雄藩賔客之盛自若公以三朝遺老負海內詩名遊三川如錦城下洞庭意氣浩然江湖勝境樓臺髙會長歌短賦傾晤賔主避地如此實亦與縱觀何異子美古今窮人而倉卒患難所遇猶若此豫非以其窮為可願所遇為可羡也以子美為可願可羡則所遭又可知也同野宋君避逃兵間手鈔杜詩離亂者百七十餘首為一編古今詩愁亦未有其比然十四五年所作亦豈無開口而笑者晚生後死瞻望慨然題王生學詩詩之妙後世由之而不知老杜衣冠却扈從徒一却字而昔之宜扈從而不扈從與後之欣喜復辟初得見漢官者舍其枯而集其菀者具是有焉文章之髓豈在險艱援據終日呐呐而又不能道豈不亦可笑哉題劉景信詩近年江湖復少就其傳者亦何能一語如二儀清濁分髙下氣槩境致此語在杜集尋常以為至朴者而亦不可及跋白廷玉詩杜子美大篇江河轉怪不測雖太白退之天才罕及至五言七言律微有拙處然時時得風雨鬼神之助不在可解若七言宕麗或更入於古野而不為俚亦惟作者自知雖大家數不能評也此筆絶於世久紛紛一花一葉飾姿弄鬢徒亂人意語羅履泰杜詩不及前人更勿疑遞相祖述竟先誰别裁偽體親風雅轉益多師是女師此杜示後人以學詩之法前二句戒人之愈趨愈下後二句勉後人之學乎其上也蓋謂後人不及前人者以遞相祖述日趨日下也必也區别裁正浮偽之體而上親風雅則諸公之上轉益多師而女師端在是矣評李長吉詩舊看長吉詩固喜其才亦厭其澀落筆細讀方知作者用心料他人觀不到此也是千年長吉猶無知已也以杜牧之鄭重為敘直取二三歌詩而止始知牧亦未嘗讀也即讀亦未知也微一二歌詩將無道長吉者矣謂其理不及騷未也亦未必知騷也騷之荒忽則過之矣更欲僕騷亦非也千年長吉余甫知之耳詩之難讀如此而作者常嘔心何也樊川反復稱道形容非不極至獨惜理不及騷不知賀所長正在理外如惠施堅白特以不近人情而聽者惑焉是為辨若眼前語衆人意則不待長吉能之此長吉所以自成一家與評漢史子房妙處在遺項王書又并遺以齊梁反書使羽事齊而不事漢真得緩急之上䇿矣以泗上亭長視四萬斤金如糞土委之一夫而不疑其志氣直吞羽百倍安得猛士兮守四方古人以為霸心之存非也自韓信死彭越死黔布反同時諸將皆盡於是四顧寂寥有傷心者已語雖壯而意悲自是亦遂病矣或者其悔心之萌乎説經説佛氏之説始於戰國堅白異同之辨其窮極變眩即儒者自為之夷狄之人語言不通安得文義輾轉若合符節如此儒者但見其超然偏袒不惜身命遂疑六合之外有與人異者竭其心思如夢想化人何所不至後之儒者不能知其所自出乃望而尊之雖攻之者亦以其書為似畫鬼神者有造化所不言之巧賦東桂堂賦中州劉君端伯扁其教子讀書之堂曰東桂客有過而問曰東烏指則應之曰脛腪發於仁氣之溫厚事業方乎青春之磨礱物所從始總名曰東豈以出乎震者然後顯發生之鴻蒙然桂烏在堂即桂之宫人即桂之叢善培植根莖葉菁蔥芽荄萬實皆一氣之所充敢問秀氣之所鍾曰吾之桂不待移栽於八盤之絶頂亦豈逺躡乎五嶺之遐蹤其蟠然於清虛之府者乃密隂之所同及其一日而來天闕者乃清芬之所從詠遊其間啓明發聰暮而屬思膽靈肝通朝而運筆活兔生風其花也豈有不攀而挹其香也豈有不薰而濃者乎言未既明輝澄徹乎氷壺之內清影流入乎霞杯之中主人於是指而示客曰人以山河大地者原缺二字婆娑婆娑其出乎必由析木駕蒼龍浴滄海之清潤沐陽谷之和融故其延光舒采薌滿璇穹郤生得其一而為瑞世之詞藻竇氏得其五而為育秀之隂功兹乎萃東堂之四而斯所以為機會之逢是則名之所定也客乃整襟肅容而謝曰君將以主乎生者為東而以根諸心者為桂耳欲梯丹霄乘素魄以潄其芳於二十八宿之心胸君之志誠大已膏之沃者其光炫根之溉者其菡濃君誠益修乎人事兹乃大契乎天工然則斯堂也薰兩間之仁氣會合璧之光重夫既已蜚英騰茂於爾嗣而且流芳垂耀於無窮也猗與盛哉
