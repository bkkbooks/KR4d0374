body:
  text: 須溪集巻十宋劉辰翁撰詞沁園春和槐城自夀六十一翁垂銀帯魚挿四角輪把百箇今朝重排花甲十年前事似舊虀辛骰選功名酒中富貴管取當筵滿勸旬槐知道待二郎做甚父子封申便應際㑹昌辰怕林下相逢未是真看焚芰裂荷起鍾山笑賣田僦馬墮貢生貧後六十年有無窮事是宰官身是報身年來好莫做他宰相便是全人前調再和槐城自夀韻劉子生時當月下弦輸大半輪記孤館望雲朝飢諷午寒爐擁雪歳晚盤辛比似先生兩壬相望豈止參差一二旬明年好筭乞漿得酒酉勝如申吾辰定是雌辰聽窮鬼揶揄數得真但鶴唳華亭貴何似賤珠沉金谷富不如貧明月清風晴春暖日出入千重雲水身吾老矣嘆臣之少也己不如人前調和槐城見夀成佛生天自是兩途任祖生先看二三大老依稀吾榜幾多新進少小齊年紫陌相逢青山獨往倚杖鶴鳴聽布泉百年裏但兒時難得老後依然吾牛已不耕田更雨滑泥深自在鞭歎十年波浪悠悠何補三生石上種種無緣白髮來呵朱顔去也一曲狂歌落酒邊誰似我似官奴出籍散聖安禪前調聞歌十八年間黄公壚下崔九堂前歎人生何似飄花陌上妾身難托賣鏡橋邊隔幔雲深繞梁聲徹不負楊枝舊日傳主人好但留髠一石空惱彭宣不因浩歎明年也不為青衫愴四筵念故人何在舊遊如夢清風明月野草荒田俛仰無情高歌有恨四壁蕭條久絶絃秋江晚但一聲河滿我自􅏰然前調和劉仲簡九日韻九日黃花淵明之後誰當汝儔記龍山昨夜寒泉九井帽輕似葉鬢㦸如虬庾扇西風孔林落照銀海橫波十二樓閒笑道那華亭上蔡再見何由人生似我何求筭惟有高人高處遊笑如今别駕前時方外塵埃半百歳月如流如此連墻經年不見一首猶勝萬户侯偷閒好便明朝有約莫莫休休前調送春春汝歸歟風雨蔽江煙塵暗天况鴈門阨塞龍沙𣺌莽東連吴㑹西至秦川芳草迷津飛花擁道小為蓬壺借百年江南好問夫君何事不少留連江南正自堪憐但滿眼楊花化白氊看兎葵燕麥華清宫裏蜂黃蝶粉凝碧池邊我已無家君歸何里中路徘徊七寳鞭風囬處寄一聲珍重兩地澘然前調笑貢生狂日日彈冠西望王陽待泥封屢下蒲輪不至賣瑯邪産辦舍人裝厚祿故人黃金有術何不分伊肘後方他年老三千里外八十思鄉何如吾夀華堂在丞相東山舊第傍任王人親至不妨高枕吾州盛事更短隣墻我學希夷邀公共坐遊戲壺中日月長山僧道成仙未晚救火須忙法駕導引夀治中棠隂日棠隂日清美近花朝共喜治中持福筆春當霄漢布寛條蘭蕙雪初消和氣滿和氣滿生意到漁樵清徹已傾螺子水黒頭宜著侍中貂天馬擬歸朝前調夀治中蟠桃熟蟠桃熟一熟一千年比似相公年正少朱顔綠鬢錦蟬連肉色更光鮮西江好西江好春雨碧粘天見説内家消息近佳人拜舞夀觴前扶醉起金鞭前調夀劉侯兒童喜兒童喜獻夀摘仙桃篁峒鳴狐成鬼火花村買犢賣蠻刀惟有使君勞燕山桂燕山桂猶帯竇家香月殿一枝金粟滿囊中玉屑擣成霜和露入霞觴前調夀吴䝉庵金莖露金莖露絶勝九霞觴挼碎菊花如玉屑滿盤和月嚥風香不老是丹方六十七六十七七歳見端平記得是秋除目好近年大路到南京楚製起諸生前調夀胡潭東春小小春小小梅漸著些些未必神仙無白髮依然林下有黃花潭影浸流霞冬十十冬十十亥字鴈斜斜不用瑶池偷碧實不須勾漏博丹砂其子新漳浦縣尹隂徳遍人家前調夀城山用夀胡潭束韻臣尚少臣尚少少似此翁些㸃半㸃斑今似雪飛來飛去自如花醉眼看紅霞人間事人間事倒杖拄頥斜冷冷清清氷下水吞吞忍忍飯中砂選到老人家前調天正子天正子亥正較差些床下玉靈頭戴九手中銅葉錦添花乞汝作飛霞城山以石龜為夀銅荷葉盛之遼東鶴遼東鶴無語鶴頭斜塵土不知灰變縞周遭㑹見頂成砂城郭待還家前調夀胡盤居盤之水盤之水清可濯吾纓我與盤仙疎一月黄花滿意繞荒城懷抱向誰傾十之十十之十十十到千齡我與盤仙同一月不占甲子後先晴攜手看昇平前調代夀丹山東風雨東風雨河漢洗蓬萊只見丹山高萬丈不知古驛路傍埃到海幾時囬二月八二月八長見醉桃腮天上玉堂懷舊草面前金鼎又無梅除是老翁來前調夀劉仲簡五月五五月五細雨緑菖蒲早是高花開九節花堪結子節堪扶持此揆初初長命縷長命縷兒女漫區區何似屏星南極裏清如寒露在氷壺一府號僊儒水調歌頭夀詹天鶴㑹正陽後又為此公來向時圯上不似魁梧出塵埃少日河東賦手醉裏新豐對草談笑上金臺太子少靈氣馬客豈僊才紫貂裘駭犀劔鸚鵡盃龍涎沈水是淺薄命有人猜聞說老僊清健想是風姿皓偉天語快行催鳬舄看雙去槐第是親栽前調夀晏雲心五五復五五二八且重重後天先甲如此滿月喜相逢一日須傾三百月小又輸一日不滿九千鍾但願客常滿莫問海尊空賦長篇賡短韻剰談叢亂來風日自美一橘兩衰翁幾見東陵𤓰好又看西鄰葵爛半醉半醒中偶得洞賔像混混起相從前調謝和溪園來夀夫子惠收我謂我古心徙閒居有客無酒有酒又無魚報道犀兵逺墜問訊陳人何似陳似隔年茰天壤亦大矣知有孔融乎白雪歌丹元贊赫蹏書洪崖何自過我便作授經圖溪園號洪崖處士教我天根騎月諺謂廿四為騎月見放翁詩規我扶摇去意餐我白芝符五芝惟白芝名白符從此須溪里更作赤松湖僕故居須山之陽曰須溪山即公行窩故云東陽記有赤松湖云赤松子安期生共博於湖間也前調夀周溪園有序天九積陽月半將望恭惟某官嘉定間氣西江耆英喬木南山為人父為衆父光風霽月有一天有二天固宜十萬户之民同致八千秋之祝某俚歌水調上贊金丹輒陳宗工竊幸微眄先生豈我輩造物乃其徒荷衣自放林壑亦未棄銀魚留得東籬晚節笑倒龍山秃帽一醉挿茱茰天下有大老攜手盍歸乎别頭經三晝夢一編書向之麟者止矣且看老溪圖歴遍後天既未依約明朝三五乾體適當符還以奉公夀不是講鵝湖前調日獻洞賔公像於溪園先生報以堦庭府公耐軒夀容曰是類吾子且三疊前水調以證之於是某得自號為小耐矣雖甚無似不敢當顧公所覽揆如此誼不虛辱輙續之好歌無忘佳話似似不常似似我一生徒畫工自畫龍種忽近海飛魚大笑北宫稱弟北宫子謂西門子曰吾年兄弟也貌兄弟也而貴賤父子也毁譽父子也愛憎父子也遂使西河疑女同氣自椒茰且謂杜公者即是老君乎日給華芎藭本薛羊書馬師真只這是可是躄浮圖大小盧仝馬異天下使君與操但欠虎銅符說甚左眼痣已過洞庭湖前調自龍眠李氏夜過臞仙康氏走筆和其家燈障水調廹暮始歸不成三五夜不放霎時晴長街燈火三兩到此眼方明把似每時庭院傳説箇般障子無路與君行推手復却手都付斷腸聲適有數少年作此者漏通曉燈收市人下棚中山鐵馬何似遺恨杳難平一落操撾聲憤再見大晟舞罷樂事縂傷情便有塵隨馬也任雨霖鈴前調中秋口占明月幾萬里與子共中秋古今良已如此寂寂幾時留何處胡笳三弄尚有南樓餘興風起木颼颼白石四山立玉露下平洲醉青州歌赤壁賦黄樓人間安得十客譚笑發中流看取橫江皓彩猶似沉河白璧光氣徹天浮舉首快哉去燈火見神州前調癸未中秋吉文共馬徳昌泛江羣動各已息在汝夢中遊塵埃大地如水兒女不堪愁寂寂古人安在冉冉吾年如此何處有高樓客有洞簫者淚下不能收庾樓墜秦樓𣺌楚樓休知公所恨何事不是為封侯自有此山此月説甚何年何處重汎木蘭舟起舞酹英魄餘憤海西流前調寂寂復寂寂此月古時明銀河也變成陸灰刼斷槎横歴落英雄孺子滅没龍光牛斗勝敗黯然平玉笛叫空闊終有故人情鴈南飛烏繞樹鶴歸城問君有酒何不鼓瑟更吹笙我飲嗚嗚起舞我舞僛僛白髪顧影可憐生舊日中秋客幾處幾囘晴前調丙申中秋兩道人出示四十年前濯纓樓賞月水調臞仙和意已盡明日又續之此夕酹江月猶記濯纓秋濯纓又去如水安得主人留舊日登樓長笑此日新亭對泣秃鬢冷颼颼木落下極浦漁唱發中洲芙蓉閣鴛鴦閤鳳凰樓夜深白露紛下誰見濕螢流自有此山有客但恨有魚無酒不了一生浮重省看潮處今夕是杭州前調和馬觀復中秋不飲强須飲不飲奈何明也曽劬禿當了依舊滑如氷一吸金波蕩漾再吸瓊樓傾倒吾杓亦長盈試入壺中看只似世間晴飲連江江連月月連城十年離合老矣悲喜得無情想見凄然北望欲說明年何處衣露為君零同此大圓鏡握手認環瀛前調和巽吾觀荷仙掌下馳道清露滴芙蓉無憀似酒初醒身世笑顰中萬朶花燈夜燕一葉扁舟海島寂歴五更風誤賞明粧靚愁思滿青銅陂六六三十六渺何窮江南曲曲煙雨誰是醉施翁但恨才情都老無復風流曽夢縹緲賦驚鴻寄語清净社小飲合相容前調甲午九日牛山作不飲强須飲今日是重陽向來健者安在世事兩茫茫叔子去人逺矣政復何闗人事墮淚忽成行叔子淚自墮湮没使人傷燕何歸鴻欲斷蝶休忙淵明自無可奈冷眼菊花黃看取龍山落日又見騎臺荒草誰弱復誰强酒亦有何好蹔醉得相忘前調辛巳前八月九日夜自黄州步歸蕭英甫以舟汎予艤本覺寺門外夜深未能睡明日為賦此寄之山水無宿約村暗自當還不知有客乗興載我弄滄灣酒吸明河欲盡月落三星在下未放水風閒影轉松起舞扶歩入林間恨無人橫野笛叫闗山知君慷慨何事惜得米陽闗看取大江東去把酒凄然北望說著淚潺湲我飲自須盡君唱有何難前調予初入建府觸官妓於馬上後於酒邊妓自言故賦之雨聲深院裏歌扇小樓中當時飛燕馬上妖豔為誰容嬌顫須扶未穏騕褭輕籠小駐玉女最愁峯掠鬢過車驟回首意忡忡寶釵斜雲鬢亂幾曽逢誰知去三歩逺此痛與君同玉筯殘粧誰見獺髓輕痕妙補粉黛不須濃重見為低訴餘恨更匆匆前調和王槐城自夀未信僊都子曽識老仙翁仙都槐城所領宫觀卿卿少年去後心與道人同揮塵不須九釣開閤苦無長物閒日醉千鍾一笑欠伸起兒戲大槐中時槐城方放妾友彭聃招園綺傲喬松年來多貫世事莫莫惱司空等得三朝好老恰則而今虛左梅信已先通富貴政不免從此學癡聾前調二首百千孫子子八十老翁翁人間天上清福閱世苦難同誰歎東門獵倦誰笑南陽舞罷萬事五更鐘但願人長久聊復進杯中故侯𤓰丞相栢大夫松諸公健者安在春夢轉頭空可笑先生無病病在枕流潄石福至自然通聾者固多笑一笑更治聾我有此客不難作主人翁小年自不相似偶與大年同先生與槐城同月生先後三日見說東廂諸少政擁家君勝㑹二八舞歌鐘亦欲得公重公在畫堂中笑青蒿真小草倚長松典衣欲作湯餅家釀媿缾空公有潭州百斛公有秫田二頃賀客萬錢通小大不相似但可似公聾前調和馬觀復石頭涙寄韻明明隔千里風動帳紋開故人錦字如夢夢轉鴈初来倚遍西山朝爽行過石頭舊渡久别忽經懷不得與之語日夕獨持杯調緑水歌白雪有心哉也知尻髙啄俛無計脱塵埃狗尾貂蟬滿座身帯鵕鸃弄粉一輿一臣臺歳晚不如願誰更忿灰堆前調臘二十一日可逺堂索賦落日半亭榭山影没壺中蒼然欲不可極迢遞未歸鴻錦織佳人何在春寄故人不到寂寞聽疎鐘木末見江去無雪著漁翁詞舂容歌慷慨語玲瓏歳云暮矣相見明日是東風逺想使君臺上攜手與人同樂中夜説元龍世事無足語且看燭花紅前調和彭明叔七夕不見古時月何似漢時秋朱陳村裏新様新婦又騎牛欲説參前氐後别説二星非經星也又失河邊河鼔此㑹没來由何處設𤓰菓謂今日好事香動歕溝寠髙麗謂城為溝寠郭郎者即與運誰為理豈情流人間睡五日五日復何悠吾腹空虛久矣子有滿堂錦繡犢鼻若為酬玉友臨安七夕酒名此時好空負葛巾篘前調天地有中氣第一是中元新秋七七月出河漢斗牛間政是使君初度如見中州河嶽緑鬢又朱顔莖露一杯酒清徹瑞人環大暑退潢潦浄彩雲斑三壬三甲厚重屹不動如山從此五風十雨自可三年一日香寢鎮獅蠻起舞願公夀未可願公還前調陳平章即席賦夜看二星度髙㑹列羣英蒼顔白髪烏㡌風入古槐清客有羽衣來者仍是尋常百姓坐覺孟公驚且勿多酌我未厭我狂醒金甌啓銀信喜衮衣新向來淮浙草木隱隱有餘聲聞説井欄砂語感念石壕村事傾耳發驚霆舉酒奉公夀天意厚蒼生前調和尹存吾造物反乎覆白首困耆英吟風賞月石上一笑再河清一百八盤道路二十四橋歌舞身世夢堪驚獨酌未能醉已醉驀然醒别與老驚相見幾囬新來時燕棲未穏滿耳又蟬聲閒憶錢塘江上兩㸃青山欲白血石起鞭霆此事復安在相對説平生金縷曲代賀丞相有序恭審天開厯甲旦應生申鍾三光五嶽之英五百年生名世處前古當今之㑹千萬世開太平某隃望宫墻伏深賛頌積忱依永奏伎小詞上犯鈞嚴不勝悚恐慶抃之至曉殿龍光起御香濃新詩冩就雲飛相第一自騎箕承帝賚千載君臣魚水端不負當年弧矢赤壁周郎神遊處料羞看故壘斜陽裏今共看更無比尊前苦説平生事歎長江幾番風浪幾人膽碎數載太平豐年瑞三百年間又幾想皇揆初心應喜漸近中秋團團月算人間天上俱清美祝千嵗似甲子前調夀繆守秋老寒香圃自春來桔橰閒了二天尺五陌上路歌來何暮收得黃雲如土但稽首福星初度不是使君人間佛甚今朝欲雨今朝雨持夀酒為公舞虎頭畫手誰堪許寫天人方瞳紅頰共賔笑語衞㦸連營三千士簇簇滿城簫鼓早恐是留公不住飛去翩翩嫌白鷺算年來希姓多登府祝千嵗奉明主前調寄番總管周耐軒生日春入番江雨滿湖山鸎啼燕語前歌後舞聞道行驄行且止却聽譙樓更鼓正未卜隂晴同否老子胷中高小苑這精神堪更開封府新治足舊民苦扁舟浩蕩乘風去看萊衣思賢堂上夀觴朝舉六十二三前度者敢望香山老傅又過了午年端午采采菖蒲三三節寄我公矯矯扶天路重歸衮到相圃前調夀李公謹同知我誤留公住看人間猶是重陽滿城風雨父老棠隂攜孺子記得元宵歌舞但稽首烏烏無語我有桓筝千年恨為謝公目送還雲撫公不樂尚何苦吾儂心事憑誰訴有誰知閉戸窮愁欲從之去聞道明朝生申也滿酌一盃螺浦又知復明年何處天若有情西江者便使君驄馬來當路香瓣起勝金縷前調和同姓草叔曲本胡端逸見夀韻並謝忘却來時路恨蒼蒼寒冰棄我江南閒處世事早知今如此何不老農老圃更種箇梅花深住凍雨前朝浯溪石對蒼苔墮淚憐臣甫山似我兩眉聚嵗云暮矣如何度但多情寂寥相念二三君子越石莫年扶風賦猶解聞鷄起舞恨不减二三十歳一曲相思碧雲合醉馮君為我歌如縷君念我似同祖前調夀陳静山昨醉君家酒便從今萬八千場未疎老友人道水僊標格俊不許梅花殿後但贏得一年年瘦迤邐聚星樓上雪待天風浩蕩重攜手酌君酒獻君夀年前春入燕臺柳看聯翩四輩金鞭長楸承受豈有中朝甌覆久更落閩山海口端自有玉堂金斗我喜明年申又酉但乞漿所得皆醇酎􅂸醉裏送行晝前調夀朱氏老人七十三嵗七十三年矣記小人四百四十五番甲子看到蓬萊水清淺休説樹猶如此但夢夢昨非今是一曲尊前離鸞操撫銅僊清淚如鉛水歌未斷我先醉新來畫得耆英似似㶚橋風雪吟肩水僊梅弟里巷依稀靈光在飛過刼灰如洗笑少伴烏衣餘幾老子平生何曽黙號黙軒暮年詩句句皆成史箇亥字甲申起前調和潭東勸飲夀觴拍甕春醅動洞庭霜壓緑堆黃林苞堪貢况有老人潭邊菊摇落賞心入夢數百歳半來許中俗語中半兒女牽衣團欒處繞公公願獻生申頌公性澀待重風人生一笑何時重奈今朝有客無魚有魚留凍何似尊前斑斕起低唱淺斟齊奉也不待烹龍炰鳳此㑹明年知誰健説邊愁望斷先生宋時宋京議和醒最苦醉聊共前調絶北寒聲動渺黃昏葉滿長安雲迷章貢最苦周公千年後正與莽新同夢五十國紛紛入中摇颺都人歌郿塢問何如昨日崧髙頌臚九錫竟誰風當初共道擎天重奈天教垓下風寒滹沱兵凍寂寞放翁南園記帯得園柑進奉悵囘首何人修鳳寄語權門趨炎者這朝廷不是邦昌宋真與贋可能共前調杜叟陳君風誼動人嵗一介壽我辭華蔚然至謂我黑頭如漆則久不相見故耳為此發歌吾鬢如霜蘂自江南西風塵起倒騎禿尾舊日汾陽中書令何限門生兒子到今也陸沉草昧醉裏不行西州路但斗間看望成龍氣聊寂寞自相慰夫君自是人間瑞歎生兒當如異日孫仲謀耳健筆風雲蛟龍起人物山川形勢猶有封狼居胥意伐木嚶嚶幽幽谷問天之將喪斯文未吾待子望如嵗前調和龔竹卿客中韻何處從頭説但傾尊淋漓醉墨疎疎宻宻看取兩輪東西者也是樊籠中物這光景年來都别白髪道人隆中像壁間有武侯像旅中坐對笑相逢對擁爐邊雪又過了上元節紙牕旋補寒穿穴柳黏牕青青過雨勸君休折睡不成酣酒先醒花㡳東風又别夜復夜吟魂飛越典却西湖東湖住十三年不出今朝出容易得二三月前調賀趙松廬嵗事崢嶸甚是當年爆竹驅儺挿金幡勝忽曉䦨街兒童語不為上元燈近但笑揀梅簪公鬢莫恨青青如今白願年年記取東君信巾未墮笑重整他年不信東風冷鼓連天銀燭花光柳芽催迸漫説沉香亭羯鼓自著錦袍吟凭待吹徹玉簫人醒不帯汝陽天人福便不教百又餘年剰歌此曲休辭飲前調壬午五日葉葉跳珠雨裏湖通十里紅香畫橈齊舉昨夢天風髙黃鵠下俯人間何許但動地潮聲如鼓竹閣樓臺青青草問木綿羇客魂歸否西湖裏湖荷花最盛賈似道建第葛嶺與竹閣為隣裏湖由是禁不往來似道貶死漳州木綿菴盤泣露寺鐘語夢囘酷似靈均苦歎神遊前度都非明朝重五滿眼離騷無人賦忘却君愁弔古任醉裏烏烏縷縷渺渺茂陵安期叟共鄗池夜别還干楚采澗緑久延佇廣州蒲磵寺安期生家也始皇嘗至其家共語三日夜今其地猶産菖蒲十二節生服菖蒲得仙者前調疊韻襟淚泠泠雨料騷魂水解千年依然輕舉還看吴兒胥濤上高出浪花幾許絶倒是東南旗鼓風雨蛟龍爭何事問綵絲香粽猶存否溪女伴采蓮語古人不似今人苦漫追談少日風流三三五五誰似鄱陽鴟夷者相望懐沙終古待喚醒重聽金縷尚有逺遊當年恨恨南公不見秦為楚天又暮黯凝佇前調五日和韻錦岸吴船鼓問沙鷗當日沉湘是何端午長恨青青朱門艾結束腰身似虎空淚落嬋媛嬃女我醉招纍清醒否筭平生清又醒還誤纍笑我醉中語黄頭舞棹臨江處向人間獨競南風叫雲激楚笑倒兩崖人如蟻不管頽波千屨忽驚抱汨羅無柱聞兩日觀渡有溺者欵乃漁歌斜陽外幾書生能辦投湘賦歌此恨淚如縷前調古巖和去年九日約登髙韻再用前韻破帽吹愁去繞郊墟殘灰敗壁冷烟斜雨舞馬夢驚城烏起散作童妖竈語漫説與謝仙一句猶記醉歸西州路問行人望望驪烽誤幾未失喪公屨高高况是興亡處望平沙落日湖光暗淮沉楚寂寞西陵歌又舞疑冡嵯峨新土金人為曹操疑冢増土黯牛笛參差歸路試問文君容賒否待東籬更就黃花浦􅂸酩酊涴藍縷前調丙戌九日風雨東籬晚𣺌人間南北東西平蕪烟逺舊日攜壺吹帽處一色沉㝠何限天不遣魄消腸斷不是苦無看山分料青山也自羞人面秋後瘦老來倦驚囘昨夢青山轉恨一林金粟都空静無人見黙黙黃花明朝有只待挿花尋伴又誰筭今朝蝶怨潦倒玉山休重醉到簪萸忍待人頻勸今又惜幾人健前調九日即事與客攜壺去望高高半山失却滿城風雨何許白衣人邂逅小立東籬共語未怪是催租斷句寂寞午雞啼三四悄老人橋上前期誤卿且去整吾屨空寒舊是題詩處莽雲煙纒蛟舞鳳東吴西楚千古新亭英雄夢淚濕神州塊土歎落日鴻溝無路一片沙場君不去空平生恨恨王夷甫憑半醉付金縷前調登高華蓋嶺和同遊韻攜手登高賦望前山山色如煙煙光如雨少日憑欄峰南北誰料美人遲暮漫囘首殘基冷緒長恨中原無人問到而今縂是經行處書易就鴈難付斜陽日日長亭路倚秋風洞庭一劒故人何許寂寞柴桑寒花外還有白衣來否但哨遍長歌歸去尚有孔明英英者悵孔明自是英英誤歌未斷鬢成縷前調絶江觀桃座間和韻問何年種植獨成蹊穠華爛漫錦開千歩花下老人猶記我不是那囘賞處并吹却道邊謝墅黃四娘家今何在也飄零偎向前村住千萬恨寄紅雨攜壺藉草行歌暮記前宵深盟止酒况堪扶路破手一杯花浮面不覺二三四五更竹裏顛狂崔䕶試語看花諸君子但如今俛仰成前度君不見曲江樹前調聞杜䳌少日都門路聽長亭青山落日不如歸去十八年間來往斷予往來秀城十七八年自己已夏歸又十六年矣白首人間今古又驚絶五更一句道是蜀天流離子甚當初一似吴兒語臣再拜淚如雨畫堂客館真無數記畫橋黄竹歌聲桃花前度風雨斷魂蘇季子春夢家山何處誰不願封侯萬戸寂寞江南輪四角問長安道上無人住啼盡血向誰訴前調古巖取後村如韻示予和韻答之一笑披衣起笑昨宵東風似夢韓張盧李白髮紅雲溪上叟不記兒孫年齒但囘首秦亡漢駛苦苦漁郎留不住約扁舟後日重來此吾已老尚能竢少年未解留人意恍出山紅塵吹斷落花流水天上玉堂人間改漫欵乃聲千里更説似𤣥都君子聞道釀桃堪為酒待釀桃千石成千醉春有盡甕無底前調鄉校張燈賦者廹和勉强趁韻燈共墻檠語記昨朝芒鞋蓑笠冷風斜雨月入宫槐槐影澹化作槐花無數恍不記鰲頭壓處不恨揚州吾不夢恨夢中不醉瓊花露空耿耿弔終古千蜂萬蝶春為主悵何人老憶江南北朝開府看取當年風景在不待花奴催鼓且未説春丁分俎一曲滄浪邀吾和笑先生尚是邯鄲歩如秉檾續殘炬摸魚兒和柳山悟和尚與李同年嘉龍韻漸無多詩朋酒伴東林復幾人許舊時舩子西湖柳付與東風塵土重記否那月月下旬且避何人疏當朝自負甚墮髻愁眉縢韝短後一往似傖父當年事傷心説庾開府人生無百年慮虎頭燕頷人間肉不是蜜翁翁做今又古是楚對凡亡為是凡亡楚朝朝暮暮聽畫角樓頭嗚咽未斷重數五更鼓前調和謝李同年記𤣥都看花君子一生恨奈何許青雲紫陌悠悠者幾箇玉人成土今在否但四海九州屈指從頭疏吾年空負看射虎南山遭逢醉尉何須飲田父神清夢也是堂堂歐府此中無破頭慮種槐不隔鞭蛆惡更祝二郎兒做蒼蒼古漫年又一年老却南公楚池塘春暮笑歩歩鳴蛙看成兩部正似未忘鼓前調三百年人間天上遽如許遽如許落花寒食東風雨漠漠長陵抔土魂歸否怕些不分明又墮人箋疏且無相負記昔與諸賢共談洛下曽識老人父牛衣淚冷落聞鷄東府風塵曽獨深慮子規聲斷長門曉春夢不堪重做千萬古但目極心傷宛轉虞兮楚江東日暮想野草荒田而今何處不待雍門鼓前調和韻道醉鄉無邊無岸一尊到彼殊徑是間轉海人知處尺地不教渠剰尊亦癭問一斗消酲一石猶難信臨風小等記我友醒狂相從有意中路恨𦍑永梅花晚早已雪堆予鬢此花寧復風韻空寒獨倚天為主天又幾時曽定今為晉看秦女山中綠髮垂垂頂百年一瞬歎髙卧北牕閒過五十無説答形影前調辛巳冬和中齋梅詞記歌頭辛壬癸甲烏烏能和誰曉梅花不待元宵好雪月交光獨照愁未老更老似渠鬢冷面迎相笑君詞定峭但减十年前偎桃傍李肯獨為梅好山中好可但一枝春早道邊無限花草米嘉榮共何戡在還憶永新嬌小明年了又喚起流鶯又自愁䳌叫東皇太昊更不是瓊花香無半㸃一笑使人倒前調和巽吾留别韻懶能看海桑世界風花過眼如傳月明昨夜庭流水天色朝來都變塵石爛銖衣壞和衣减盡誰能怨秦亡楚倦但剪燭西牕秋聲入竹㸃㸃已如霰當年事本是泗亭沛縣却教綿蕝成殿暮年八陣那曽用付與江流石轉前楚辯今哨遍是烏烏者燈前勸乾坤較健歎君已歸休吾方俯仰種種未曽見前調春暮渺斜陽村煙酒市獨教王謝如此漁翁夢入江頭絮寂寂平安西子東風起東風起種桃千樹皆流水橋邊萬里甚老子情鍾明朝後日又灑送春淚青過雨歴歴逺山如洗暮雲堪共誰倚諸賢洛下風流散輕薄紛紛餘幾聊爾爾問世事何如自嗅殘花蘂金銅劒履但陌上相逢摩挲一笑鑄此幾時矣前調甲午送春又非他今年晴少海棠也恁空過清羸欲與花同夢不似蝶深深臥春憐我我又自憐伊不見儂賡和已無可奈但愁滿清漳君歸何處無淚與君墮春去也尚欲留春可可問公一醉能頗鍾情剰有詞千百待冩招招招些休阿那阿那看荒荒得似江南麽老夫婆娑問籬下閒花殘紅有在容我更簪朶前調今嵗海棠遲開半月然一夕如雪無啟予者賦此寄恨是他家絳唇翠袖可容卿有功不相思不到胭脂井只隔東林烟柳春去又漫一夜東風吹得花成舊無人舉酒但照影堤流圖他紅淚飄灑到襟袖人間事大半歸謀諸婦不如意十八九敲門夜半窺園李赤脚玉川驚走何處有更炙燭風流看到人歸後休休囘首笑舊日園林佺巢曾園洞中樓名蜀錦平園亭名處處可攜手前調酒邊留同年徐雲屋三首怎知他春歸何處相逢且盡尊酒少年嫋嫋天涯恨長結西湖煙柳休囘首但細雨斷橋憔悴人歸後東風似舊問前度桃花劉郎能記花復認郎否君且住草草留君剪韭前宵正恁時候深盃欲共歌聲滑翻濕春衫半袖空眉皺看白髮尊前已似人人有臨分把手歎一笑論文清狂顧曲此㑹幾時又正何須陽闗腸斷吴姬苦勸人酒中年懷抱縈縈處看取半煙和柳柳摇首笑飛到家山已是酴醿後留連話舊問溪上兒童頗曽見我有此故人否相逢地還憶今宵三韭本語謂廿七也青山只了迎候東風自送歸帆去吹得亂紅霑袖暮雲皺聽杜宇髙髙啼向無何有江花垂手任春色重來江花更好難可少年又大垂手小垂手舞名待欲歸家山未得方知名不如酒丹砂便做金勾漏難遣鬢青似柳試搔首記移竹南塘又是三年後情懐非舊歎少日相如壚邊老去能賦上林否種蘭處贏得青青種韭淵明中路相候何須更待三三徑也自長拖衫袖青袍皺便持當金貂賖取隣家有小兒拍手笑昨醉如泥盟言止酒何事醒來又前調賦雲東樓更比他東湖前度依然一榻如許深深舊是誰家府落日畫梁燕語簾半雨記湖海平生相遇亡賔主䦨珊春暮看城郭參差長空澹澹沙鳥自來去江山好立馬白雲飛處秦川終是吾土登臨笑傲西山笏煙樹高高杜宇君且住况泉甘雙井汲遍茶堪煮歌殘金縷恰黃鶴飛來月明三弄仍是岳陽吕前調守歳是疑他春來儻忽是疑歳别人去古今守歳無言説長似酒䦨情緒堪恨處曽親見都人户户銀花樹星河未曙聽朝馬籠街火城簇仗御筆已題露人間事空憶桃符舊句三茅鐘自朝暮嚴城夜禁故如鬼况敢馮陵大嘑鼕鼕鼓但畫角聲殘已是新人故休思前度歎五十加三明朝領取閒看五星聚前調和中齋端午韻醒復醒行吟澤畔焉能忍此終古招魂過海楓林瞑招得魂歸無處朝又暮但依舊禁街人静鼕鼕鼔畫船沉雨聽欵乃漁歌興亡事逺咽咽未能句君且住能歌吾不如汝悠然鼓枻而去滄洲擥結芳成艾喚作張三李五羌自苦更閒却玉堂端帖多多許無人自語把畫扇鸞邊香羅雲底題作午年午前調贈友人想㓜安遼東歸後自羞年少龍首長安市上壚邊卧枉却快行家走空兩袖染醉墨淋漓把似天香透功名邂逅便六一詞高君謨字偉但見説行晝人間事苦似成舟無候神清苔字如鏤明年六十聞歌後頗記薄醺醺否兒拍手笑馬上葛彊也作家山友煩伊起夀更時復一中毋多酌我疎影共三嗅前調水東桃花下賦也何須晴如那日欣然且過江去𤣥都縱有看花便耿耿自羞前度堪恨處人道是漫山先落坡翁句東風綺語坡海市詩但適意當前來尋須賦此土亦吾圃海山石猶記芙蓉城主彈過飛種成土是間便做僊家杏誰與一栽千樹朝又暮悵二十五年臨路花如故甲子初見人生自苦秖喚渡觀桃侵尋至此世事奈何許前調醉與君狂歌又笑不知當日何調孤山梅下吟魂冷說甚那時蘇小滄波眇奈此島纍纍竟是誰家表皆謂先正葬處也歸歟白鳥看四聖飄杳朱門金榜化化竺飛嶠衰也久舊遊夢翠禽繞坱兮軋皎兮窈相思一夜牕前白誰識予懷嫋嫋殘年了聽畫角悲凉又是霜天曉餘音杳緲歎五十之年我加八九君隔幾科詔前調辛巳自夀年五十是耶非吾年如此更癡更悔今昨狂吟近日疎於酒轉似秋山瘦削渾未覺凭兒子門生前度登高弱情懐又惡歎親友中年不堪離别况復久零落長生藥有分神僊難學人生聊復行樂百年半夢隨流水半在南枝北萼妾命薄但寂寞黄昏時聽城樓角愁無可著且取醉尊前明朝休問昨日已忘却前調夀王城山對尊前簪花騎竹老胡起起能舞春風浩蕩天涯去惟有薫琴自語槐正午看萬戸蜂脾簾幙雙雙乳嬌兒騃女漫學得琵琶依稀馬上總是主恩處凌煙像空倚臨風玉樹升沉事遽如許劉郎慣是瑶池客又醉碧桃三度花下數記三度三千結子多紅雨年年五五共凖擬堦庭叙符獻酒裊裊綴雙虎
