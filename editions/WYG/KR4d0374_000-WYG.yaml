body:
  text: 提要須溪集十巻别集類三宋臣等謹案須溪集十巻宋劉辰翁撰辰翁字㑹孟廬陵人須溪其所居地名也少補太學生景定壬戌廷試入丙第以親老請濓溪書院山長江萬里陳宜中薦居史館除太學博士皆固辭宋亡遂不復出辰翁當賈似道當國對䇿極言濟邸無後可慟忠良殘害可傷風節不競可憾幾為似道所中以此得鯁直名文章亦見重於世其門生王夢應作祭文至稱韓歐後惟先生卓然秦漢巨筆然辰翁論詩評文往往意取尖新太傷佻巧其批㸃如杜甫集世説新語及班馬異同諸書今尚有傳本大率破碎纎仄無裨來學即其所作詩文亦專以竒怪磊落為宗務在艱澁其詞甚或至扵不可句讀尤不免軼於繩墨之外特其蹊徑本是䝉莊故惝恍迷離亦間有意趣不盡堕牛鬼蛇神且其於宗邦淪覆之後睠懐麥秀寄托遥深忠愛之忱往往形諸筆墨其志亦多有可取者固不必概以禮格繩之矣須溪集明人見者甚罕即諸書亦多不載其巻數韓敬選訂晩宋諸家之文嘗以不得辰翁全集為恨聞蘭溪胡應驎遺書中有其名往求之卒弗能獲盖其散失已久世所傳者惟須溪記鈔及須溪四景詩二種僅寥寥數篇今檢永樂大典所録記序雜著詩尚多謹採輯裒次釐為十巻其天下同文集及記鈔所載而不見於永樂大典者亦别為抄補以存其槩至四景詩則原屬單行之本今仍各著於録故不復採入云乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:41c5700242db4faf9a8530c908360fdef280bd87b2bbde2f037b32eac1346c20
