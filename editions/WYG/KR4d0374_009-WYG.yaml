body:
  text: 須溪集巻九宋劉辰翁撰詞漢宫春壬午開爐日戲作雨入輕寒但新篘未試荒了東籬朝來暗驚翠䄂重倚屏幃明窓麗閣為何人冷落多時催重頓粧臺側畔畫堂未怕春遲漫省茸香粉暈記去年醉裏題字傾欹紅爐未深乍暖兒女成圍茶香疎處畫音盡殘灰自説心期容膝好團欒分芋前村夜雪初歸前調歳盡得巽吾寄溪南梅相憶韻疎影横斜似故人安道只在前溪年年望雪待月漫倚吟磯千紅萬紫到春來也是尋思君不見永陽江上殘梅冷雨絲絲有幾情人似我漫騎牛卧笛亂㨂繁枝市門索笑憔悴便作新知城樓畵角又無花只落空悲但傳説壽陽一片何曾迎面㸔飛洞仙歌壽中甫也曽海上啖如𤓰大棗海上歸來相公老畫堂深滿引明月清風家山好一笑塵生蓬島六年春易過贏得清陰到處持盃藉芳草看明年此日人在黄金臺上早整頓乾坤事了但細數齊年幾人存更宰相髙年幾人能到前調器之髙誼取前月青山洞仙歌華予重壽走筆謝之有客從余不計余無酒袖有蟠桃為君壽歎此桃再熟也須年後甚辦得轉盼箇偷桃手菊潭三十斛月又月添天賦先生日更久但黄楊長寸閏年倒寸似恁得到梧宫甚時候客又道竒特是陽生後七日相看入春風栁齊天樂端午日韻枝頭雨是青梅淚翻作一江春水魚腹魂消龍舟叫徹不了湖亭張戲滿庭芳芷正艾日髙髙葛風細細試比陳人人間除我更誰似浮沉君共我里記薰廊待對聞雞蹴起昨日蟾蜍明朝蠅虎身與渠衰更悴老夫病已任采緑采苓為師為帝但有昌陽倩酤扶路醉前調節庵和示中齋端午齊天樂詞有懷其弟海山之夢昨亦嘗和中齋此韻感節庵此意復不能自已儻見中齋及之海枯泣盡天吳淚又漲經天河水猶有淚成河經天復東注杜子美懷弟妹語也萬古魚龍雷收電巻宇宙刹那間戲沉蘭墜芷想重整荷衣頓驚腰細尚有干將衝牛射斗定何似成都橋動萬里歎何時重見䳌啼人起孤竹雙清紫荆半落到此吟枯神瘁對牀永已但夢繞青神塵昏白帝重反離騷衆醒吾獨醉前調戊寅登髙即席和秋崖韻蔣陵故是簪花路風煙奈何秋暑候館凋梧宫墻斷栁誰識當年倦旅予懷何許想上馬人扶翠眉愁聚舊日方回而今能賦斷腸語登髙能賦最苦歎髙髙難問欲望迷處蝶繞東籬鴻飜上苑那更畫梁辭主來今往古漫湛輩同來逺公回去是日共二僧登華蓋我醉安歸黄花扶路舞江城梅花引辛巳洪都上元幾年城中無看燈夜三更月空明野廟殘梅村鼓自春聲長笑兒童忙踏舞何曾見宣徳棚不夜城去年今年又傷心去年晴去年曾不似今年閒坐處却不曾行憶去年人彈燭淚縱横想見西窓忩下月窓下月是無情是有情前調相思無處著春寒傍䦨干濕䦨干似我情懷處處憶臨安想見夜深村鼓靜燈暈碧為旁人説上元是花是雪無意看雨摧殘雨摧殘探春未還到春還似不如閒感恨千般憔悴做花難不惜與君同一醉君不見銅雀臺望老瞞時隣居聲伎有物化之感蘭陵王丁丑感懷和彭明叔韻雁歸北𣺌𣺌茫茫似客春湖裏曾見去帆誰遣江頭絮風息千年記當日難得寛閒抱膝興亡事馬上飛花看取殘陽照亭驛哀拍願歸骨悵氊帳何匹湩酪何食相思青塜頭應白想荒墳酹酒過車囬首香魂携手抱相泣但青草無色語絶更愁極漫一畨上聲青青一畨陳跡瑶池黄竹哀離席約八駿猶到露桃重摘金銅知道忍去國忍去國前調丙子送春送春去春去人間無路鞦韆外芳草連天誰遣風沙暗南浦依依甚意緒漫憶海門飛絮亂鴉過斗轉城荒不見來時試燈處春去最誰苦但箭雁沉邊梁燕無主杜鵑聲裏長門暮想玉樹凋土淚盤如露咸陽送客屢囬顧斜日未能度春去尚來否正江令恨别庾信愁賦二人皆北去蘇堤盡日風和雨歎神逰故國花記前度人生流落顧孺子共夜語𤨏忩寒和巽吾聞鶯嫩緑如新嬌鶯似舊今吾非故空山過雨睍睆留春春去似尊前曲曲陽闗行人回首江南處漫停雲依黯征衫憔悴酒痕猶汚欲語渾未住記匹馬輕行風林煙樹家山何在想見緑窓啼霧又何堪滿目凄凉故園夢裏能歸否但數聲驚覺行雲重省佳期誤歸朝歡最是一人稱好處昨日小春留得住梅花信信望東風須待公歸香滿路年時今已度長是巴山深夜雨宣又召凱還簇簇要見壽觴舉掃盡窩蜂閒繡斧疊鼓春聲歡歲暮燕臺劍履趣鋒車銀信低低傳好語紫貂裘脱與肘印纍纍映三組但重省西來斗水忘却愛卿取大聖樂傷春有序予嘗愛古詞云休眉鏁問朱顔去也還更來麽音韻低黯辭情跌宕庶幾哀而不怨有益於幽憂憔悴者然二語外率鄙俚因依聲彷彿反之和之此曲少有作者流為善歌則或數十疊其聲皆不可考今特以意髙下未必盡合本調聊以紓思志感云爾芳草如雲飛紅似雨賣花聲過况囬首洗馬塍荒更寒食宫人斜閉煙雨銅駞提葫蘆何所得酒泥滑滑行不得也哥哥傷心處斜陽巷陌人唱西河天下事不如意十常八九無奈何論兵忍事對客稱好面皺如鞾廣武噫嘻東陵反覆歡樂少兮哀怨多休眉鏁問朱顔去也還更來麽寳鼎現春月紅粧春騎踏月花影牙旗穿市望不盡樓臺歌舞習習香塵蓮步底簫聲斷約彩鸞歸去未怕金吾呵醉甚輦路喧闐且止聽得念奴歌起父老猶記宣和事抱銅仙清淚如水還轉盼沙河多麗滉漾明光連邸第簾影凍散紅光成綺月浸葡萄十里看往來神仙才子肯把菱花撲碎膓斷竹馬兒童空見説三千樂指等多時春不歸來到春時欲睡又説向燈前擁髻暗滴鮫珠墜便當日親見霓裳天上人間夢裏祝英臺近水後昨朝晴今朝雨𣺌莽遽如許厭聽兒童總是漲江語是誰力挽天河誤他僊客并失却乘槎來路斷腸苦剪燭深夜巴山酒醒聽如故勃窣荷衣墮淚少乾土從初錯鑄鴟夷不如歸去到今此欲歸何處前調席間詠繡毬看師師成蝶蝶蹙盡不成疊欲試搔頭花重乍堪捻是誰抛過東墻今無赤鳳夢得似那人身㨗年時臘曾笑梅梢和月蠶豆忽如莢便向龍門無復釧金接待教開到瓊林閬僊重見又誰念昆明前劫憶舊逰和巽吾相憶寄韻𣺌山城故苑煙横綠野林勝青油甚相思只在華清泉側凝碧池頭故人念我何處墮淚水西流念寒食如君江南似我花絮悠悠不知身南北對斷煙禁火蹇六年留恨聽鸎不見到而今又恨睍睆成愁去年相攜流落回首隔芳洲但行去行來春風春水無過舟唐多令丙子中秋前聞歌此詞者即席借蘆葉滿汀洲韻明月滿滄洲長江一意流更何人横笛危樓天地不知興廢事三十萬八千秋落葉女墻頭銅駞無恙不看青山白骨堆愁除却月宫花樹下塵坱莽欲何逰前調風露小瀛洲斜河到海流人間塵不到瓊樓錯向五陵陵上望幾回月幾回秋落日大湖頭垂虹今是不醉尊前往往成愁便有扁舟西子在無汗漫與君逰前調寒雁下荒洲寒聲帶影流便寄書不到紅樓如此月明如此酒無一事但悲秋萬弩落潮頭靈胥還怒不滿湖山猶是春愁欲向湧金門外去煙共草不堪逰前調日落紫霞洲蘭舟穩放流玉虹仙如在黄樓何必錦袍吹玉笛聽欵乃數聲秋赤壁舞濤頭周郎還到不倚西風嫋嫋予愁喚起横江飛道士來伴我月中逰前調龍洲曲已八九和復為中齋勉强夜和中有數語醉枕忘之零露下長洲雲翻海倒流素娥深不到西樓忽覺斷潮歸去也飲不盡一輪秋城外土饅頭人能飲恨不古人不見使吾愁莫有横江孤鶴過來伴我醉中逰前調丙申中秋明月滿河洲星河帶月流料素娥獨倚瓊樓竟是何年何藥誤魂夢冷不禁秋少日夢龍頭知君猶夢不筭虛名不了閒愁便有鵠袍三萬萬應不是舊京逰前調殘日下瓜洲平安火似流月髙髙掛古城樓回首少年真可笑無一事又悲秋天在海邊頭天風有意不結桂枝嫋嫋余愁不是銀河無去路先不去後難逰前調癸未上元午晴春雨滿江城汀洲春水生更愁人雨似春酲猶有一般天富貴夜來雨早來晴年少總看燈老來猶故情便無燈也自盈盈説著春情誰不愛今夜月有人行虞美人咏牡丹空明一朶揚州白紅紫銷無色是誰喚作水晶毬惹起髙燒銀燭上元愁去年一捧飛來雪不似渠千葉狂風一蹴過秋千憔悴玉人和淚望嬋娟水晶毬天香國色辭脂粉肯愛紅衫嫩翛然自取玉為衣似是銀河水皺織成機寒欺薄薄春無力月浸霓裳濕一窩香雪世間稀可惜不教留到賜衣時白叠羅壽安樓子重重蘂少見如魚尾向來染得渭脂紅又自細摇花浪動春風赬鱗似是人誰信但向殘紅認若教隨水去悠然為報沙頭玉鷺莫貪鮮魚尾壽安花心定有何人捻暈暈如嬌靨一痕眉月老春宵政似酥胷潮臉不曾銷當年掌上開元寳半是楊妃爪若教此掐到癡人任是髙墻無路蝶飜身一捻紅前調詠海棠無花敢與姚黄比對對鴛鴦起䜟他金帶萬釘垂誰向麒麟揎裏缷猴緋潛溪以上難為説自是君恩别後來西子避無鹽又道君王捉鼻有何嫌公服紫魏家品是君王后豈比昭容袖風吹滿院繡囊香誰賜大師師號退昭陽飛霞一落無根蒂空墮重華淚離披正午盛時休閒為思王重賦洛神愁御愛紫猶疑緑萼花微甚難與青蓮並青蓮朶朶是天人又向天人想見洛陽春多情素質塵生步况被潘妃汚此花仍是色微頳却是嬌波波外兩眉青青蓮萼前調客中送春樓臺烟雨朱門悄喬木芳雲杪半窓天曉又聞鶯比似當年春盡最闗情客中自被啼鵑惱况落春歸道滿懷憔悴有誰知猶記湧金門外送人時前調城山堂試燈黄柑擘破傳香霧新酒如清露城中也是幾分燈自愛城山堂上兩三星枝頭未便風和雨寂寞無歌舞天公肯放上元晴自是六街三市少人行前調揚州賣鏡上元事也用前韻徐家破鏡昏如霧半面雲間露等閒相約是看燈誰料人間天上似流星朱門簾影深深雨憔悴新人舞天涯海角賞新晴惟有橋邊賣鏡是閒行黄簾緑幕窓垂霧表立如承露夕郎偷看御街燈歸奔河邊殘㸃亂如星時余坐爐亭六日禮數内同舎誘余竊出觀燈亟歸開園蔣李二宦者逰春雨蛺蝶穿人舞如今煙草鏁春晴併與蘇堤葛嶺不堪行前調大紅桃花鞓紅乾色無光霽須是鮮鮮翠翛然一㸃繫裙腰不著人間金屋恐難消英英肯似焉支貴漫脱紅霞帔落時且勿涴塵泥留向天台洞口泛吾詩前調壬午中秋雨後不見月濕雲待向三更吐更似沉沉雨眼前兒女意堪憐不説明朝後日説明年今年十七望當年知道晴三鼔便似佳期誤笑他拜月不曾圎只是今朝北望也凄然前調用李後主韻二首梅銷臘盡春歸了畢竟春寒少亂山殘燭雪和風猶勝陰山海上窖羣中年光老去才情在惟有華風改醉中幸自不曾愁誰唱春花秋葉淚偷流情知是夢無憑了好夢依然少單于吹盡五更風誰見梅花如淚不言中兒童問我今何在煙雨樓臺改江山畫出古今愁人與落花何處水空流前調春晚輕衫倚望春晴穩雨壓青梅損皺綃池影泛紅蔫看取斷雲來去似爐煙愁春來暮仍愁暮受却寒無數年來無地買花栽向道明年花信莫須來前調花品娟娟二八清明了猶説淮陽早錢歐陸譜徧花光紅到壽陽也不説淮陽此花地望元非薄回首傷流落洛陽間歲斷春風怎不當時道是洛陽紅前調中秋對月秋陰團扇如人老漸近中秋好新凉還憶小樓邊自在一窓明月傍人眠多情誰到星河曉只道圎時少他年幾處與君看長是成愁成恨不成歡戀繡衾宫中吹簫燕脂不浣紫玉簫認宫中銀字未消但鳯去臺空古比落花無第二朝天涯流落哀聲在聽烏烏不似内嬌漫身似商人婦泣孤舟長夜寂寥前調或送肉色牡丹同賦困如宿酒猶未消滿華堂羞見目招忽折向西隣去教旁人看上馬嬌肉色似花難可得但花如肉色妖嬈誰説漢宫飛燕到而今猶帶臉潮前調己卯燈夕留城中獨坐憶當塗買燈姑蘇夜舞再集賦此當年三五舞太平醉歸來花影滿庭辦永夜重開宴笑姑蘇萬眼未明萬眼羅最精最貴然最暗而今繞市歌兒馬客黄昏細雨滿城十年事去如水想家人村廟看燈花犯舊催雪詞苦不甚佳因復作此海山昏寒雲欲下低低壓吹帽平沙浩浩想闗塞無煙時動衰草蘇郎卧處愁難掃江南春不到但悵望雪花夜白人間憔悴好誰知廣寒夢亡憀丁寜白玉鍊不闗懷抱看清淺桑田外塵生熱惱待説與天公知道期臘盡春來事宜早更幾日銀河信斷梅花容易老前調再和中甫甚天花紛紛墜也偏偏著余帽乾坤清皓任海角荒荒都變瑶草落梅天上無人掃角吹吹不到想特為東皇開燕瓊林依舊好看兒貪耍不知寒須塑就玉獅置兒懷抱奈轉眼驚何在淚痕成惱白髪翁翁向兒道那曲巷袁安愛晴早便把似一年春看惜花花自老酹江月北客用坡韻改賦訪梅氷肌玉骨笑嫣然總是風塵中物誰掃一枝流落到絶域髙臺素壁匹馬南來千山萬水為訪林間雪淵明愛菊不知誰是花傑陶詩謂菊為霜下傑憔悴夢斷吳山有何人報我前村夜發蠟屐霜泥煙步外轉入波光明滅雪後風前水邊竹外歲晚華予髪帶花人去江妃空弄明月前調趙氏席間即事再用坡韻四無誰語待推窓初見江南風物索笑廵簷無奈處悄隔東鄉一壁有酒如船招呼滿載只欠枝頭雪疎花冷眼坐中都是詞傑堪恨幾日西郊尋消問息肯向吟邊發著意相看又恐是六出幻成還滅懊恨兒童攀翻頂戴不到先生髪明朝重省初三知屬誰月前調和朱約山自壽曲時壽八十四五朝壽俊筭生年占得淳熈四四三萬六千三萬了剩有一千饒底三百年間和風麗日幾箇能消此約山山笑先生不負山矣今歳甲子重陽待重數五百十三甲子吟萬首詩更自和歲歲壽詩自喜若比潞公如今年紀猶是平章事先生撫掌問他閒日能幾前調同舎延平材府教製新詞祝我初度依聲依韻還祝當家西湖處士例一枝團月咸平印印千古詩宗傳不絶至竟被渠道盡雪返香魂霜吹曉怨肯受東君聘羅浮夢轉兔環知是誰孕未説煙雨江南垂垂青子須要調金鼎愁絶溪山明秀處依舊鶴南飛影我白君𤣥君詞我和各自為長慶後來桃李遥遥别是花信前調五日和尹存吾時北人競鷺洲渡棹歌齊發江雲暮吹得湘愁成雨小酌千年知他是阿那年時沉午日落長沙風回極浦黯不堪延佇吳頭楚尾非闗四面為楚幾度喚起醒纍淋漓痛飲不學愁予句踏鯉從黿胥濤上怎不化成龍去越女呉船燕歌趙舞世事悠悠許明朝寂寂雙雙飛下鳴鷺前調怪梅一枝為北客載酒移寘盆中偉然歲寒相命算人間除了梅花無物窺宋三年又不是草草東隣鑿壁偃蹇風前沉吟竹外直待天驕雪白家人至一枝横出終傑寂寞小小踈籬探花使斷知復何時發北驛不來春又逺只向窓前埋滅好在冰葩著些風篠怎不清余髪補之去後墨梅又有明月北人著小竹花間更好前調漫興遥憐兒女未解憶長安十年前月徙倚桂枝空延佇無物同心堪結冷落江湖蕭條門巷猶著西樓客李舎人班舊節齋吳客嘗言賞中秋之盛恨無鐵笛一聲吹裂山石休説起舞登樓那人已先我渡江横楫圎缺不銷青塜恨漠漠風沙如雪西母長生素娥好在何皓當時髪山河如此月中定是何物前調中秋彭明叔别去赴永陽夜集團團桂影怕人道大地山河裏許舊日影娥池未缺驚斷霓裳歌舞雪白長城金明古驛盡是乗槎路少年白髪自無八駿能去猶記流落荒濵故人相遇共吹簫前度無酒無魚空此客昨夜留之不住睡起披衣行吟坐對又有重圎處不知今夕那人有甚佳句前調中秋待月城中十萬有何人和我烏烏鳴瑟對影姮娥成三處誰料尊中無月剪紙吹成長梯摘取兒戲都堪惜洞庭夜白一聲聊破空濶休説二十四橋便一分無賴有誰曾識一枕秋衾南北夢好好娟娟成雪舊日少逰錦袍玉笛醉卧藤陰石蕭然今夕無魚無酒無客滿江紅海棠下歌後村詞共和淡淡燕支似褪向景陽鴛石依然是睡春未足捧心猶癖籍甚不禁君再顧嫣然却記渠初拆黯銷魂欲盡更堪憐終難得猶幸是卿卿惜空復見誰誰摘但當時一笑也成陳迹我嬾花殘都已往詩朋酒伴猶相覔聽連宵又雨又還晴鳩鳴寂前調古岩以馬觀復遣舟約予與中齋和後村海棠韻復寄述懷何許相求且不是南溫北石也欲學絶交髙論自陳余癖萬里魚書長記憶十年波浪傷離拆筭此舟不是剡溪舟空回得非出處何須惜非瑕纇何須摘看雪銷鴻去有何留跡安石豈無同樂意𤣥真不是朝廷覔但眼前真率蹔相違歌聲寂前調鶯語依然但春去人間無約誰念我吟情憔悴醉魂落魄盡日只將行巻續有時自整殘棋著向黄昏細雨悶無寥青梅落南又北相思錯朝異暮人情薄漫躊躇在目奢華如昨海底月沉天上兎遼東人化揚州鶴記龍雲波浪豈能平天難託平聲滿江紅壽某翁十歲兒童看騎竹花陰滿城與新第桐鄉孫子髙下齊生欹枕不尋柯下夢舉頭自愛橘中名但有時米價問如何公助平東西塾聽書聲長短巻和詩成總神仙清福前輩家庭試問凌煙圗相國何如洛寺寫耆英甚天公屬意富民侯銀信青八聲甘州和汪士安海棠下先歸前是觀桃水東至其鄉真常觀問海棠花下又何如𤣥都觀中逰歎佺巢蜀錦常時不數前度何稠誰見宣華故事歌舞簇遨頭共是西江水不解西流在處繁華如夢夢占人年少生死堪羞任傾城傾國風雨一春休醉逢君何須有約醉留君繫不住扁舟空又失花前一笑綠盡芳洲前調和鄧中甫中秋看團團一物大如杯時復幾何秋俯天涯海角今來古往人物如流想見霓裳歌罷無物與澆愁惟有當時樹香滿瓊樓誰念南樓老子倚西風塵滿心事悠悠便班姬袖裏明月一時休歎年年吹簫有約又一番鶴夢雪堂舟池上久滿身風露還索衣裘前調賀詞記前朝鶴㑹又重來攀飜第三桃看雲華授䇿麻姑擘脯嬴女吹簫尋思曲江舊事宫錦勝龍標奏罷清華夢獨立春宵不數相州錦様是調羮御手重解金貂但今年此日疎了醉葡萄聞老僊衣冠皓偉又丁寜天語著兒招都人望回班賜第赤舄飛朝前調和蕭汝道感秋但秋風年又一年深不禁長年悲自景陽鐘斷館娃宫閉冷落心知千樹西湖楊栁更管别人離看取茂陵客一去無歸都是舊時行樂漫煙銷日出水遶山圍看人情荏苒不似鷓鴣飛聽砧聲遥連塞外問三衢道上去人稀銷凝久殘陽短笛似我歔欷前調送春韻看飄颻萬里去東流道伊去如風便錦纜危潮青山御宿煙雨啼紅愁是明朝酒醒聽著返魂鐘留得春如故了不闗儂春亦去人逺矣是别情何薄歸興何濃但江南心好未便到芙蓉念今夜初程何處有何人垂袖舞行宫青青栁留君如此如此匆匆前調春雪竒麗未能賦也因右巖韻志喜甚花間兒女笑盈盈又添雪獅成任踏青無路凌波有地歩歩光塵招得梅妃魂也好似去年春栁亦何曾絮都是雲英休道東皇誕漫退之語到茶煙歇後誰濁誰清賴謝娘好語端勝解圍兵看昨朝天公雨粟定大家快活社翁平春晴好溶溶雨盡聽賣花聲水龍吟寓興和巽吾韻何須銀燭紅粧菜花總是曾留處流觴事逺繞梁歌斷題紅人去繞蝶東墻啼鶯修竹疎蟬髙栁歎一春風雨歸來抱膝懷往昔自凄楚遥望東門栁下夢參差欲歸幽路斷紅芳草連空積水憑髙墜霧雨洗銅駞天清華表昇平重遇但相如老去江淹才盡有何人賦前調壽周耐軒多年袖瓣心香重新拈出為公壽喚起老龍如今政是欠伸時候弱語聞鶯輕陰轉栁絃薫未透信江南自有真儒未用須待見衮和繡聞説鋒車在道更四輩傳宣來驟蟠胷何限天門夜對春宫晨奏梅子陰濃菖蒲花老桔橰閒後但北闗下澤遺民社在賀公歸晝前調看人削樹成槎布颿海上秋風浪白頭坡老知津水手倚桄榔杖九㸃齊州半生髀肉煙塵莽蒼但北窓夢轉青陰滿眼撫陳迹玩新漲世事艱難已徧笑而今不堪重想龍筋虎骨根深伏兎擎空千丈禮樂文章終須夢卜南人為相問凌煙生面他時髣髴似何人像前調和清江李侯士𢎞來壽閒思十八年前依稀正是公年紀銅駝陌上烏衣巷口臣清如水是處風箏滿城晝錦兒郎偉偉但幅巾藜杖低垂白鬢甪與綺問何里最憶他年甘㫖也曾經三仕三已至今結習餘年未了業多生綺安得滕㕓移將劉棹長薫晉鄙望福星炯炯西江千里待公來祉前調和南劍林同舎元甲逺寄壽韻多年綠幕黄簾瓶花黯黯無誰主荀陳跡逺燕吳路斷何人星聚四聖樓臺水僊華表冷煙和雨但裴徊夢想美人不見空猶記鐵爐歩過盡凉風天未墮華箋行行飛翥一端翠織錦鯨茅屋天吳驚舞時林寄被纈為禮念我何辰涸陰氷子生憐金虎恨兒癡不了山川悠緬共君黌宇前調巽吾賦溪南海棠花下有相憶之句讀之不可為懷和韻並述江東旅行征衫春雨縱横何曾濕得飛花透知君念我溪南徙倚誰家紅袖藉草成眠簪花倚醉狂歌扶手歎故人何處聞䳌墮淚春去也到家否説與東風情事怕東風似人眉皺亂山華屋殘隣廢里不堪回首寒食江村牛羊丘壠茅簷酤酒笑周秦來往與誰同夢説開元舊前調和中甫九日孤煙澹澹無情角聲正送層城暮傷懷絶似龍山罷後騎臺沉處珠履三千金人十二五陵無樹歎岐王宅裏黄公壚下空鼎鼎記前度幾許英雄文武酒不到故人墳土平生破帽幾番摇落受西風侮昨日如今明年此㑹俛然懷古便東籬甲子花開花謝不堪重數燕春臺壽周耐軒五十三年韶華剛度今年夏五十三瑞鶴朝來待公彌月重探人生貴壽多男看斕斑室添箇荷衫亭亭八面醉倚紅酣承平故事暇日清談雲龍風虎塞北江南午橋午枕羲皇白日如惔手種蟠桃明年看取實大如柑奈何堪天妬人睡美趣趂朝參掃花逰和秋厓見壽秋厓時謁選留詞去春臺路古想店月潭雲雞鳴闗候巾車爾久記湘纍降日留詞勸酒不是行邊待與持盃論斗筭吾壽已待得河清萬古晴晝京國事轉手漫宫粉堆黄髻粧啼舊瑶池在否自劉郎去後宴期重負解事天公道是全無又有浯溪友笑浯溪至今聱叟憶江南二月十八日臞仙約客因問晏氏海棠開未即攜具至其下已盛甚花幾許已報八分催却問主人何處去且容老子箇中來花外主人回年時客如今安在哉政喜錦官城爛漫忽驚花鳥使摧頽世事只添杯時有稱宣使折花者蓋託也託以肆陵慢也梅花引壽槐城酒熟未梅開未去年遲待重來醉笑當筵舞當筵惟有今年八十是開年參差野袂成歸鶴石鼎未開容剥啄歳開尊歲添孫孫又開尊福曜萃髙門蝶戀花感興過雨新荷生水氣髙影參差無謂思量睡夢裏不知輕别意醒來竟是誰先起去路夕陽芳草際不論䦨干處處情懷似記得分明羞擲蘂自知不是天僊子前調壽李侯八九十翁嬉入市把菊簪茰共説新篘美何以祝公千歲歲壽潭自酌花間水白鷺沉沉飛復起杜老江頭不恨秋風裏欲種蟠根天上李三千年看青青子霓裳中序第一石瑶林作霓裳中序第一詠温泉疑其未嘗親見語不甚切予所見廬山一兩池初不可近漸入頗覺竒賞因用其聲用其韻試為之銀河下若木暖漲一川春霧綠白鳯徘徊清淑似沉水無煙礜湯千斛柔肌暗粟想臨流嬌噴輕觸空恨恨何人熱惱却憶冷泉掬酥玉未諳湯沐深又淺蕩摇心目雲蒸雨漬飜覆泛影浮紅飄飄自相逐裳衣還未欲驀自怪野鴛雙浴華清逺寒猿夜繞落月可能漉瑞龍吟和王聖與壽韻老人語曽見昨日開爐墜天花否生年不合荒荒枯根薄命嬋娟余誤那知許女樂如煙㸃㸃江南處處何時重到湖船淋漓載酒依稀弔古終待臙脂露掌弄鷗招鶴憑君畫取萬栁漫堤一絲一淚垂雨濛濛絮裏又送金銅去漫腸斷王孫望帝嘔心囊句市隱今成趣袖回地狹天吳鳯舞莫是青州譜怎不早翩翩向青州住回頭蜃海已沉花霧滿庭芳和鄉帥自壽千騎家山一觴父老前有韓魏公來青原上已纔見壽筵開歐公雲間還見憶相州更自遲回公知否福星分野飛騎不須排留春亭下草雪霜過了依舊春荄待留春千歲日醉千杯却怕催歸丹詔棟明堂須要雄材趨朝去西風便面隻手障浮埃前調草窓老仙歌滿庭芳壽予勉次原韻空谷無花新篘有酒去年窮勝今年蛩吟蛩和且省費蠻牋聞説先生去也江南岸縛草為船依然在山棲寒食路斷却歸㕓老人三又兩清風作供晴日生煙但髙髙杜宇不辦行纒幾度披衣教我二升内煑石燒鉛休重道玉龍無孔夜夜叫穿天木蘭花慢别雲屋席間賦午橋清夜飲花露重燭光寒約處處行歌朝朝買酒典却朝衫尊前自堪一醉但落紅枝上不堪安歸去栁陰行月酒醒畫角聲殘王官難得似君閒閒我見君難記李陌看花光陰冉冉風雨番番相逢故人又别送春歸叙日萬重山江上愁思滿目離離芳草平䦨前調和中甫李參政席上韻自崆峒麥熟耕犢滿桔橰閒笑吾黨清談長衣櫑具更進賢冠倉皇庇公宇下便秋風江上不驚寒雪夜入三城易槐陰䕶一家難東山零雨幾時還領客竹林間看滿座空尊輕裘緩帶緑鬢朱顔風流一笑余事定碑金無恙庾家完又賦南烹初食明朝飡玉何山永遇樂予自乙亥上元誦李易安永遇樂為之涕下今三年矣每聞此詞輙不自堪遂依其聲又托之易安自喻雖辭情不及而悲苦過之璧月初晴黛雲逺澹春事誰主禁苑嬌寒湖堤倦暖前度遽如許香塵暗陌華燈明晝長是嬾攜手去誰知道斷煙禁夜滿城似愁風雨宣和舊日臨安南渡芳景猶自如故緗帙流離風鬟三五能賦詞最苦江南無路鄜州今夜此苦又誰知否空相對殘缸無寐滿村社鼓前調予方痛海上元夕之事鄧中甫適和易安詞至遂以其事弔之燈舫華星崖山矴口官軍圍處璧月輝圎銀花熖短春事遽如許麟洲清淺鰲山流播愁似汨羅夜雨還知道良辰美景當時鄴下僊侶而今無奈元正元夕把似月朝十五小廟看燈團街轉鼓總似添惻楚傳柑袖冷吹藜漏盡又見歲來歲去空猶記弓彎一句似虞兮語内家嬌壽王城山結客少年塲攜髙李聞笛賦㳺梁看漢水淮山髙樓共卧融尊鄭驛飛蓋相望春風裏種他紅與白笑我嬾中忙供奉後來𤣥都桃改佳人好在庾嶺梅香何處最難忘㑹稽歸鬢晚空帶吳霜贏得黄冠野服笑傲羲皇看花外小車出長生洞橘中二老鬬智瓊黄稱壽堂添十字孫認三房六州歌頭乙亥二月賈平章似道督師至太平州魯港未見敵鳴鑼而潰後半月聞報賦此向來人道真箇勝周公燕然眇浯溪小萬世功再建隆十五年宇宙宫中贗堂中伴飜虎䑕摶鸇雀覆虵龍鶴髪龎眉憔悴空山久來上東封便一朝符瑞四十萬人同説甚東風怕西風都人竊議者稱西頭甚邊塵起漁陽慘霓裳斷廣寒宫青樓杳都城籍妓皆𨽻歌舞無敢犯朱門悄鏡湖空裏湖通葛嶺瞰裏湖無敢過大纛髙牙去人不見港重重斜陽外芳草碧落花紅抛盡黄金無計方知道前此和戎但千年傳説夜半一聲銅何面江東六醜春感和彭明叔韻看東風海底送落日飛空如擲醉逰暮歸怕西州墮䇿歸路偏失記上元時節千門立馬望金坡殘雪素娥推下團圞轍塞草驚塵河氷渡楫悠悠雨絲風拂但相隨斷雁時度荒澤回頭紫陌夢歸歸未得憔悴江南秋風舊客去年説著今日漫故人相命玳筵鳴瑟愁汗漫全林杯窄况飄泊相遇當時老叟棃園歌籍髙歌為我幾回闋似子規落月啼聲悄傍人淚滴百字令李雲岩先生逺記初度手寫去年赤壁歌歳晚寄之少賤不敢當也匆匆和韻寄長鬚去儻以可教則教之少微星小撫劍氣横空隱見林杪夜來宋都如雨更安得竒哉懰皎佛以四月八生見明星悟道曰竒哉即左傳星隕如雨之夕也予女三齡覽余初度一語占先兆暮年喜見甲申聚五星照堪歎亡國餘民老人孺子爾汝霜橋曉騎馬聽雞朝寂寞夢入南枝三繞洛社耆英行窩真率著我真堪笑與公試數開禧嘉定寳紹公開禧丁卯生僕生紹定之六年壬辰相望二十六歳云前調壽陳靜山少吾一歲洞房停燭似新歲數到上元時節一醆屠蘇千歲酒添得新人羅列昨日迎長今朝獻壽賞團團佳月永和春好用之不竭嘉客聞其新造酒永和鎮百石見説海上歸来有如𤓰大棗無人分得六十二三劉夢得輸與香山樂色菱谷二綃楊枝春草歌舞琵琶笛秖愁元日玉龍催上金驛鸎啼序感懷匆匆何須驚覺喚草廬人起筭成敗利鈍非臣逆睹至死後已又何似采桑八百看蠶夜織小窓裏漫二升自苦教人弔卧龍里别有佳人追桃恨李擁凝香繡被爭知道壯士悲歌蕭蕭政度寒水問荆卿田横古墓更誰載酒為君酹過霜橋落月老人不見遺履置之勿道逝者如斯甚矣衰久矣君其為吾歸計為耕計但問某所泉甘何鄉魚美此生不願多才藝功名馬上兠鍪出莫書生誤盡了人間事昔年種栁江潭攀枝折條噫嘻樹猶如此登髙一笑把菊東籬且復聊爾耳試囬首龍山路斷走馬臺荒渭水秋風沙河夜市休休莫莫毋多酌我我在最喜髙歌去但髙歌不是畨腔底此時對影成三呼蛾起舞為何人喜前調悶如愁紅著雨巻地吹不起便故人𣺌𣺌相逢前事欲語還已凝望久荒城落日五湖四海煙浪裏問而今何處寄聲舊時隣里閒説那回海上蘇李雲深夜如被想攜手漢天不語叫叫不應疑水待河梁一尊落月生非死别君如酹望故人閣上依稀長劍方履古人已矣垂名青史謂當如此又誰料浮沉自得魚計賞心樂事良辰景美撞鐘舞女朱門大第雕鞍駿馬畨裝笠笑虛名何與身前事區區相望餓死西山懸目東門人生何樂為此古人已矣天下英雄使君與操耳聽喔喔雞鳴早起屢舞徘徊痛飲髙樓狂歌過市蒼蒼萬古羲農周孔文章事業星辰上到而今枯見銀河底笑他黄紙除君紅旗報我為君助喜前調趙宜可以余譏其韻苦心改為之復和之愁人更堪秋日長似歲難度相攜去晼晚登髙髙極政犯愁處常是恨古人無計看今人癡絶如許但東籬半醉殘燈自修菊譜歸去來兮怨調又苦有寒螿予賦湖山外風笛䦨干胡床夜月誰據恨當時青雲跌蕩天路斷險艱如許便橋邊賣鏡重圎斷腸無數是誰玉斧驚墮團團失上界樓宇甚天誤嬋娟予誤悔却初念不合夢他霓裳楚楚而今安在楓林闗塞回頭憶著神仙處漫斷魂飛過湖江去時時説與地上羣兒青瑣瑶臺閬風縣圃琵琶往往凭鞍勸酒千載能胡語歎自古宫花薄命漢月無情戰地難青故人成土江南憔悴荒村流落傷心似失梨園部𣺌空江淚隔蘆花雨相逢司馬風流濕盡青山欲歸無路
