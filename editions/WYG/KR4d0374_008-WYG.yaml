body:
  text: 須溪集巻八宋劉辰翁撰詞望江南晩晴朝朝暮雲雨定何如花日穿牕梅小小雪風灑雨柳疎疎人唱晩晴初前調元宵春悄悄春雨不須晴天上未知燈有禁人間轉似月無情村市學簫聲前調秋日即景梧桐子㸔到月西樓醋釅橙黄分蟹殻麝香荷葉剥雞頭人在御街遊梧桐子人在御街逰鳯宿雲綃金縷帶龍池翠帳玉香毬宫女後庭秋雙調望江南賦所見長欲語欲語又蹉跎已是厭聽夷甫頌不堪重省越人歌辜負水雲多羞拂拂懊惱自摩挱殘燭不教人徑去斷雲時有涙相和恨恨欲如何前調夀謝夀朋前之夕織女渡河邊天上一朝元五日人間小住亦千年相合降神僊當富貴掩鼻正髙眠欲語㑹稽仍小待不知文舉更堪憐蔗境在頑堅前調夀趙松廬添一嵗減一嵗愁眉苦待一生婚嫁了更須采藥十年遲婚嫁已随時東家者俎豆伴兒嬉幸自少年場屋了誰能掬淅數還炊千嵗是靈龜前調胡􅋥居生日盤之所春蝶舞晴萱溪傍野梅根種玉墻圍脩竹筍生鞭深院待囬僊嘉熙好四十二年前猶記五星丁夘聚更遲㡬嵗甲申連快活共千年丁酉生奎其名前調夀王秋水齊眉舉綵侍紫霞巵天上九朝鳬冉冉尊前一笑玉差差人唱自家詞籬下菊醉把一枝枝花水乞君三十斛秋風記我一聫詩留看晚香時前調夀張粹翁七日後重會是星前二月之間渾似此餘年何止萬三千日擬醉華筵歌白雪除是雪兒傳看取長生瓢屢倒眼前橘栗木何𤣥自唱鵲橋仙南鄉子乙酉九日髙處畧從容華水華山自不同舊日諸賢携手恨匆匆只説明年甚處重㡬嵗避遼東茅竹秋風一併空欲望遼東何處是濛濛也似秦樓一夢中前調木犀花下因憶永陽宣溪與故鄉族子門逕之盛而其人皆適在此感歎復賦香雪碎團團便合枝頭帶露餐笑倒那人和玉屑金丹不在僊人掌上盤千樹碧闌干山崦朱門夢裏殘花下主人都在此誰看天上人間一様寒前調即席紀逰去似賞花移處處開尊亦不辭棃栗又空醅又盡方知舊日驪駒勸客歸歸路月相随兒子門生箇箇遲坐久不知無可待堪疑向道兒癡直是癡浪淘沙秋夜感懐無葉著秋聲凉鬢堪驚滿城明月半忩横惟有老人心似醉未曉偏醒起舞故無成此恨難平正襟危坐二三更除卻故人曹孟徳更與誰爭前調大風作捲海海翻杯傾動蓬萊似嫌到處馬頭埃雨洗御街流到我吹向潮回寒似雪天梅安石榴開繡衾重煖笑爐灰料想東風還憶我昨夜歸来前調有感無謂兩睂攢風雨春寒池塘小小水漫漫只為栁花無一㸃忘了臨安何許牡丹殘客倚屏看小樓面面是春山日暮不知春去路一帶欄干如夢令題四美人畫比似尋芳嬌困不是弓彎拍衮無物倚春慵三寸襪㾗新𦂳羞褪羞褪忽忽心情未穏褪履寂歴栁風斜倚錯莫夢雲難記花影為誰重一握鮫人絲涙何事何事歴歴臉潮羞起托腮睡眼青隂欲午當户小風輕暑倦近碧欄干斜影却扶人去無緒無緒落落一襟輕舉欠伸落葉西風滿地獨宿瓊樓丹桂孤影抱蟾寒寄與月明千里休寄休寄粟粟蘂珠心碎折桂江城子西湖感懐湧金門外上船場湖山堂衆賢堂到處凄凉城角夜吹霜誰識兩峯相對語天慘慘水茫茫月移疎影傍人墻怕昏黄又昏黄舊日朱門四望暗飄香驛使不來春又老南共北斷人腸前調春興一年春事㡬何空杏花紅海棠紅看取枝頭無語怨天公幸自一晴晴太暖三日雨五更風山中長是憶城中到城中望水東説盡閒情無日不匆匆昨日也同花下飲終有恨不曽濃前調和黙軒初度韻書題拂拂洞庭香孕雲黄粲珠光喚謫仙人除是賀知章未老得閒閒到老無一事和詩忙是中曽著老人雙送千觴樂誰妨世上輸贏不似爛柯長晚入耆英年最少空結客少年場前調海棠花下燒燭詞紅欹醉袖殢闌干夜將闌去難􅂸燒蜜調蜂重照錦團欒春到洞房深處煖方知道月宫寒枝枝紅涙不曾乾背人彈語羞檀欲睡心情一似夢驚殘政自朦朧花下好銀燭裏㡬人看㸃絳唇瓶梅小閣横忩倩誰畫得梅梢逺那回半面曽向屏間見風雪空山懐抱無荀倩春堪戀自羞片片更逐東風轉前調和訪梅一雪蹉跎蹇驢不載吟鞭去夜聽春雨踏雪差無苦待得花晴總是逰人處梅應許小橋延佇蜂蝶先成路前調寄情醉裏懵騰昨宵不記歸時候自疑中酒耿耿還依舊恨不能言只是天相負天知否卷中人瘦一似章臺栁前調和鄧中甫晚春燕子池塘亂紅過盡鞦韆晚絮飛欲倦正是簾初捲睡起無情猶到天涯逺羞勻面乍驚紅淺夢自無人見前調題畫韝指春寒隴禽一片飛來雪無言可説暗啄相思結隻影年深也作闗山别翻成拙落花時節倩子規聲絶虹玉横簫纎纎指按新聲作參差重約昨夜梁伊錯㡬許閒愁品字都忘却沈吟覺一聲哀角滿院殘花落浣溪沙三月三日髙卧何須説打乖小籬過雨翠長街緗桃定有踏青鞵晴日又思花處所東風絶是栁情懐人間安得酒如淮前調壬午九日身是去年人尚健心知十日事如常眼前杯酒是重陽破帽簮萸携素手長歌藉草慰寒香兒童怪我老來狂前調虎溪春日春日春風掠鬢鬚亂山相對擁寒爐綵鞭金勝一時無自縷青絲成細栁更堆殘雪當凝酥兒童且莫唱皇都前調夀陳敬之推官身是髙人欲寢氷引年可待進豨苓無憂無患也身輕雪裏放囚天亦喜平安騎鶴到家庭今年春早為長生前調闕題十日千機可復諧郭郎感運豈仙才人間自是少行媒直上扶搖須九萬滿前星斗共昭回又傳賈客向曽來前調暮暮相望夕甫諧針樓巧巧似身材下頭無數老人媒昨夜竹林那得見朝來乾鵲是空回人間五日後能來攤破浣溪沙潭上夜歸醉裏微寒著面醒天風不展帽欹傾行過溪深松雪下夜三更白白野田鋪似月鏦鏦沙路踏如氷不見剡溪三百曲一舟横前調淡淡臙脂淺著梅温柔不上避風臺若比杏桃真未識奪銀胎汗面拭來慵傅粉酒香濃後暗潮腮嬌嫩不應醒似醉倩誰猜霜天曉角初春即事栁梢欲雪十里烟明滅曲曲欄干轉影教人憶夜來月家人相對説燈花還又結凍雨村村鼓鼓終不似上元節前調中秋對月烏雲汗漫濁浪翻河漢過盡千重魔障堂堂地一輪滿秋光還又半簷聲初漏斷不管滿身花露已辦著二更看前調中和齊九日騎臺千騎有菊知何世想見登髙無處淮以北是平地老來無復味老來無復涙多謝白衣迢逓吾病矣不能醉前調樓下梅一株經冬無一花春半忽開一萼梢頭出萬紅中因賦之經年寂寞已負花前約忽向紅梅側畔開㸃雪有人覺不開何似莫百梢纔一萼却問夀陽宫額兩三蘂怎能著前調夀吳䝉庵臞然如竹自是天仙福小小畫堂錦様聽人唱鶴飛曲橙橘黄又綠蟹到新篘熟便做月三十斛飲不盡菊潭菊前調夀陳敬之朝來微雪又近長生節造就一枝清絶梅與雪怎分别兩年心似月除是天知得手種春風千樹一顆顆待兒摘前調夀張古岩明年七十歌彩橋僊夕見説嚴君平道年年是月初一同時同里宻後今今又昔便做伏生年紀也未到蹇吃吃前調賀賈教良宵七七又近中元日橋上老人有約後五日重來覔嬋姢銀海出木犀新雨濕惟有延平劍氣箕斗外廣寒逼前調夀蕭靜安時歸永新歸来把菊春甕今朝熟苦苦留君不得携孺子到汾曲廬山真面目氷清還映玉長笑歐公老嬾君且住飲螺綠其子昏燕氏前調夀康臞仙問春來未也似辛壬癸如此男兒五十又過卻孔融二畫堂孫子子新桃如故壘不管明朝後日春滿眼是千嵗卜算子元宵不是重看燈重見河邊女長是蛾兒作隊行路轉風吹去十載廢元宵滿耳畨腔鼓欲識尊前太守誰起向尊前舞前調夀郡守蚤已是三年父老依依借願與天公借㡬年保我鷄豚社治中心似佛治中心似日人祝治中千嵗似翁福似翁徳菩薩蠻秋興芭蕉葉上三更雨人生只合随他去便不到天涯天涯也是家屏山三五疊處處飛蝴蝶正是菊堪看東籬獨自寒前調湖南道中黄鷄喔喔催人起困不成眠忩似水清露不曽寒朝來起自難家人當睡美又憶歸程㡬不管濕闌干芙蓉花自看前調春曉畫梁語透簾櫳曉折桐風送楊花老細雨綠隂寒羅襟只似單青門三里道箇箇逰芳草比似嫁來看踏青難更難前調春日山行江波何似西湖曲村烟相對峯南北何處不青青青青是漢塋長亭芳草路寒食誰家墓舊日厭殘紅人行九里松前調丁丑送春殷勤欲送春歸去白首題將斷腸句春去自依依欲歸無處歸天涯同是寓握手留春住小住碧桃枝桃根不屬誰前調題醉道人圖八仙名姓當時少汙尊牛飲同傾倒惟有我公榮旁人笑獨醒多年村落走泥飲無升斗入了玉門闗人生一醉難好事近中齊恵念賜詞俾夀不勝嵗寒兄弟之意後百年間𤣥度自傷來暮打破虛空無礙共乗龍飛去更㕘末後句如何此事未能付前遇小橋風雪是君詩成處謁金門風乍起約㢲吾同賦海棠嬌㸃㸃困倚春光欲軟滴盡守宫難可染濃欺紅燭艷寂寂露珠啼臉翠袖不禁風颭芳徑相逢驚笑靨日長初睡轉前調和㢲吾重賦海棠花露濕紅淚裛成珠粒比似朝陽思未得睡來添醉色一笑嬌波滴滴再顧羞潮拂拂恨血千年明的礫千年人共憶前調和㢲吾海棠韻遊賞競看取落紅陳陳花睡不成嬌似病春寒空受盡舊日不知繁盛欲飲如今無興恨滿東風無綠鬢東風還自恨長相思喜晴日上元晴上元晴待得晴時坐觸屏山禽三兩聲欲歸城未歸城見説城中處處燈明年處處行憶秦娥中齋上元客感舊賦秦娥見屬一讀凄然随韻寄情不覺悲甚燒燈節朝京道上風和雪風和雪江山如舊朝京人絶百年短短興亡别與君猶對當時月當時月照人燭淚照人梅髪前調昨和次又作収燈節未遣早見古巖四疊又得中齊别梅遂并冩寄驚雷節梅花冉冉消成雪消成雪一年一度為君腸絶古人長恨中年别餘年又過新正月新正月不堪臨鏡不堪垂髪梅花節白頭卧起餐氊雪餐氊雪上林鴈斷上林書絶傷心最是河梁别無人共拜天邊月天邊月一尊對影一編殘髪収燈節霖鈴又似鰲山雪鰲山雪今宵清絶今宵愁絶老人似少終然别癡癡更望春三月春三月花如人面自羞余髪前調為曽氏燕脂閣歎春如昨曉風吹透燕脂閣燕脂閣滿園芳草冷烟城郭青山淚盡樓頭角佳人夢斷花間約花間約黄昏細雨一枝零落西江月新秋寫興天上低昻似舊人間兒女成狂夜來處處試新粧却是人間天上不覺新凉似水相思兩鬢如霜夢從海底跨枯桑閲盡銀河風浪前調憶仙曽與回翁把手自宜老子如龍懐胎不敢問春冬等待鞭鸞笞鳯昨夜又遲黄石今朝重叩鴻濛碧桃花下醉相逢説盡鵬逰蝶夢前調石竒儀嘗授吾竒門式局以為兵法至要日持扇圜自衞玉帳傳心如鏡青龍繞指成輪塵中多少白頭人乾裏尋壬難認世事説來都了鬼神見也須嗔迷槎問我是何津向道先生書困清平樂石榴深紅半面一似墻頭見草樹池塘青一片獨倚闌干㡬遍更誰絳袖朱脣火雲相對英英笑殺牡丹正午離披不任看承前調夀某翁君詞為夀絶妙孫辛婦但恨盃無露添酒空等待梅花久喜君白首還𤣥人間合信天緣如此相從至此我亦何倦餘年歸國遙暮春遣興初雨歇照水綠腰裙帶熱楊花不做人情雪風流欲過前村蝶羞成别囬頭卻恨春三月昭君怨玩月月出東山之上長憶御街人唱恨我不能琴有琴心徙倚秋波平瑩漸久玉肌清冷待更下闌干起來看浣溪沙春日即事逺逺遊蜂不記家數行新栁自啼鴉尋思舊事即天涯睡起有情和畫捲燕歸無語傍人斜晚風吹落小瓶花前調感别㸃㸃疎林欲雪天竹籬斜閉自清研為伊憔悴得人憐欲與那人携素手粉香和涙落君前相逢恨恨總無言減字木蘭花玩月答䝉庵和詞何須剪紙依舊一團圓照水莫倚空寒栁下池邊也只般君何忽忽宇宙人生都是客月在雲端人自愁人不解看䝉庵詞有忽忽早睡語併及之前調甲午九日牛山作舊逰山路落在秋隂最深處風雨重陽無蝶無花更斷腸天知老矣莫累門生與兒子不用登髙髙䖏風吹帽不牢前調有感東風似客醉裏落花南又北客似東風携手斜陽一笑中佳人怨我不寄江南春一朶我怨佳人憔悴江南不似春前調望初晴月佳甚有上元花栁意不能忘情臘銷三五月向雪山雲外吐烟水黄昏梅栁依稀笛斷魂今宵豫賞便作香塵随步想莫待元宵燈火零星雨寂寥前調乙亥上元無燈可看雨水從教正月半探蠒推盤探得千秋字字看銅駝故老説著宣和似天寳五百年前曽向杭州看上元前調庚辰送春送春待曉春是五更先去了我醉方知春正憐伊怕别伊留君不可歸到海邊方憶我做盡花歸欲贈君時少一枝前調尚學林己丑夀旦適歸廬陵其先世相州人居永和今家臨川相州錦好待到相州人已老潁水歸田白鷺驚猜己十年太師尚父晚遇明時方用武大笑相逢把酒家鄉是客中前調自述不能管得欲雨能教天地黒待得開晴不用吾言也自行一杯亦醉萬事無能吾欲睡舊亦能詩説舊時詩問是誰前調再用韻戲古岩出妾清歡昨日十事不如人六七試數從前素素相從得㡬年子兮子兮再楝一枝何處起翠釡峯駝客好其如良夜何前調夀詞脾神喜樂夀酒一杯勝服藥過却明朝頭上新霜也合銷小春三日便覺春暄梅影出醉把梅看比似茱萸更耐寒山花子春暮東風解手即天涯曲曲青山不可遮如此蒼茫君莫怪是歸家閶闔相迎悲㝡苦英雄知道鬢先華更欲徘徊春尚肯己無花此處情懐欲問天相期相就復何年行過章江三十里涙依然早宿半程芳草路猶寒欲雨暮春天小小桃花三兩處得人憐栁梢青春感鐡馬䝉氊銀花灑涙春入愁城笛裏畨腔街頭戲鼓不是歡聲那堪獨坐青燈想故國髙臺月明輦下風光山中嵗月海上心情南歌子搔困麻仙爪含暄忍客衣夜長牕月露成幃不説明朝風雨自當歸篘熟雙投美香飄一縷絲霜前鴈到蟹螯持自試小牕醉墨作新詩朝中措勸酒鍊花為露玉為瓶佳客為頻傾耐得風霜滿鬢此身合是金莖墻頭竹外洞房初就畫閣新成嚼得梅花透骨何愁不㑹長生太常引和香巖上元韻便晴也似不曽晴不怕金吾禁行風雨動鄉情夢燈火揚州化城少年跌宕誰家嬌小繞帶到天明昨夜月還生但驚破霓裳數聲時夜月蝕前調夀李同知此公去暑似新秋吏毒毒一勾勾行縣勝監州覺随車甘雨應求鷺清為酒螺清為夀起舞祝君侯急召也須留廿四考中書到頭玉樓春侯仲澤約飲螺山靈泉寺余與鄧中甫候久欲暮歸歸而侯至寺相失霜風不動晴明好探梅有約城東道橋邊失卻老仙期城門落日人歸早野田一望迷衰草除是騰空君後到立馬三周黛佛頭參差中路令人老前調乙酉九日龍山歌舞無人道只説先生狂落帽秋風亦是可憐人要令天意知人老菊花不為重陽早自受古人詩句惱與君鄭重説殘年殘年惟有重陽好烏夜啼初夏猶疑薰透簾櫳是東風不分榴花更縢一春紅新雨過綠連空蝶飛慵閒過綠隂深院小花濃前調中秋素娥醉語曽留又中秋待得重圎誰妬兩悠悠向愁旱今愁水沒中洲看取明朝晴去不須愁前調何年似永和年記湖船如此晴天無處望新煙江南女裙四尺合鞦韆北粧短後露骭秋千合面並起昨日老人曽見久澘然行香子和北客問梅白氏長安人雪履無痕溪影傳神著坡詩請自清温松風亭韻朝朝不去惜惜空勤似夢中雲雲外雪雪中春四野昏昏匹馬廵廵揀一枝寄與芳尊更誰興到於我情真是白家賓江南路隴頭人前調次草牕憶古心公韻玉立風塵光動黄銀便談文也到夜分無人燭下壁上傳神記老婆心寒士語道人身極意形容下語難親更萬分無一分真醉翁去後往往愁人願滴山泉銜丘塜化龍雲前調疊韻海水成塵河水無銀恨幽明我與公分青山獨往囬首傷神歎魏闕心磻石魄汨羅身除却相思四海無親識風流還賀季真而今天上笑謫仙人但病傷春愁厭雨淚看雲公嘗謂余仙風道骨不特文字為然故屢著之不敢忘草忩其族子也前調探梅月露吾痕雪得吾神更荒寒不傍人温山人去後車馬來勤但夢朝雲愁暮雨怨陽春説著東昏記著南廵涙盈盈檀板金尊憐君素素念我真真歎古來言新様客舊時人品令聞鶯滿庭芳草更昨日落紅如掃緑隂政似人懐抱一聲睍睆春色何曽老幸自不須人起早寂寞如相惱舊時聞處青門道禁烟時候栁下人家好鵲橋仙題陳敬之扇乗鸞著色癡蠅誤拂不及羲之醉墨偶然入手送東陽便看取薰時清適清風去暑閒題當日宰相紗籠誰識封丘門外定何人這一㸃瞞他不得前調夀臞仙母看人擲果看人罷織難得團圞七夕蟠桃只在屋東頭慶西母年開八袠去年今日今年今日添箇曽孫抱膝人間樂事有多般算此樂人間第一前調自夀二首輕風澹月年年去路誰識小年初度橋邊曽弄碧蓮花悄不記人間今古吹簫江上霑衣微露依約凌波曽步寒機何意待人歸但寂歴小忩斜雨天香吹下煙霏成路颯颯神光暗度橋邊猶記泛槎人看赤岸苔痕如古長空皓月小風斜露寂寞江頭獨步人間何處得飄然歸夢入梨花春雨一剪梅和人催雪萬事如花不可期花不堪持酒不堪持江天雪意使人迷剪一枝枝歌一枝枝歌者不來今㡬時姜影無詞張影無詞不歌不醉不成詩歌也遲遲雪也遲遲前調和敖秋厓為小孫三載夀謝人生總受業風吹三嵗兒兒八十兒兒深閨空谷把還持啼看人知啼怕人知客中自種緑猗猗月下横枝雪下横枝尊前百嵗且開睂今嵗今時前嵗今時夜飛鵲七夕何曽見飛渡年又年癡今古相望猶疑朱顔一去似流水斷橋魂夢參差何堪更嗟遲暮聽旁人説與此夕佳期深深代籍盼悠悠北地臙脂誰寄揚州破鏡遍海角天涯空待人歸自小秦樓望巧吳機逥錦歌舞為誰星萍耿耿算歡娛未省流離但秋衾夢淺雲間曲逺薄命同時疎影催雪香篝素被聽花犯低低瑤花開未長記那時熾炭圍爐瘦妻換酒行試黨家人在銷金帳約莫是打圍歸際又誰知别憶烹茶冷落故家愁思聞道滕驕㢲懶今朝待檄與飜雲須易白白不成又不教晴做盡黄昏情味銀河本是氷氷底怎忍向東風成水待滿城玉宇瓊樓却報卧廬人起摘紅英賦花朝月晴花朝月朦朧别朦朧也勝簷聲咽親曽説令人悅落花情緒上墳時節花隂雪花隂滅栁風一似千秋掣晴未决晴還缺一畨寒食滿村啼鴂千秋嵗和尚學林夀筵即席新篘熟也借問誰家早梅影裏蜂兒繞三更殘月上一夜霜天曉溪橋小春風有意年年到當年青鳥去落葉無人掃銅柱仄瑤池老殘鐘長樂樹墜馬咸陽道空囬首御街人賣南京棗捉拍醜奴兒辛已除夕送嵗可無詩得團欒忍不開睂不記去年今夕夢江東懐抱江西信息舍北妻兒五十扊扅炊待五十富貴成癡百年苦樂乗除看今年一半明年一半更似兒時前調有感世事莫尋思待説來天也應悲百年己是中年後西州垂涕東山携手㡬个斜暉也莫苦吟詩苦吟詩待有誰知多少不是無才氣文時不遇武時不遇更説今時㝡髙樓夀秋水銀河水洗得世間清山色雨餘青老子綸巾棊别墅人家鼾睡折秋城定誰勞定誰福定誰能常恨著景升兒不似又恨著景升牛小耳空相望愧平生我欲臨風扶玉樹自攀承露酌金莖㸔昆明鱗石長海桑晴前調壬辰夀王城山八十朱頂字八十正平頭添作八千休無能也自収郿塢到今恨不貶潮州看㡬人炎又冷老還羞也不學太公忙把火也不學申公輪轉磨休莫莫莫休休小遲授業何曽吃更遲食乳不須愁且從容某水釣某丘逰前調和詠雪非是雪祇是玉樓成屑不盡雲英東邊老樹頽然折西頭穉栁爆然聲試平安松丈丈竹兄兄有誰向金船呼小玉又誰憐紙帳夢飛瓊怪疎影墜娉婷喚起老張寒䔩䔩好歌白雪與君聽但黨家人笑道太麄生前調再和花上雪信手捻來成屑不就瓊英昨朝己見詩成巻今朝又試曲成聲更催催莫不做水僊兄終須待晴時攜斗酒更須待老夫吟數首休更疊疊娉婷已無翠鳥傳花信又無羯鼓與花聽更催催遲數日是春生桂枝香寄揚州馬觀復時新舊侯交惡甚思去年中秋泛月感恨雜言吹簫人去但桂影徘徊荒杯承露東望芙蓉縹緲寒光如注去年夜半横江夢倚危檣參差曽賦茫茫角動回舟盡興未驚鷗鷺情知道明年何處漫待客黄樓塵波前度二十四橋頗有杜書記否二三子者今如此㸔使君角巾東路人間俯仰悲歡何限團圎如故臨江僊代賀丞相兩國夫人生日並序甲子之秋九月吉日大丞相國公夀母兩國太夫人初度謹上小詞用獻為王母三千年之曲丞相衮衣朝戲綵年年慶事如新尊前一笑共兒孫人間傳夀酒天上送麒麟縹緲祥烟連北闕天顔有喜生春蓬萊清淺海光平今年初甲子重試碧桃根前調夀劉教聞道城東鶴會欣然一笑乗風不知一鶴在墻東神仙人不識未始出吾宗弟子有年於此先生之道如龍碧桃花子落壺中化為三五粒元是北邊松前調壬午七夕天際何分南與北五更縱又成横夜來拾得斷河星化為一片石持去問君平老大㸔天一笑兒童問我須應向來牛女本無名要知天上事亦似謗先生前調将孫生日賦二十年前此日女兄慶我生兒簮萱弄綵聽孫啼典衣沽美酒數待冠婚時亂後飄零獨在紫荆墓棘風吹尊前萬事莫尋思兒童看有子白髪故應衰前調賀黙軒舊日詩腸論斗酒風流懐抱如傾㡬年不聽渭城聲尊前無賀老巻裏少彌明聞説語言都好便應步履全輕長生第一是風僧額前書八十能説又能行前調訪梅西曲罥衣迷去路雪銷斷岸無痕尋花不擬到前村暖風初轉袖小徑忽開門却憶臨塘橋下馬古心舊居暗香不是黄昏人生南北與誰論嶺梅花樹下閒聽蜜蜂喧前調謝友人老去尚呼張丈醉中自惜熊兒越王臺上鷓鴣啼三朝臣不遇無復好文時情緒幽幽似結鬢絲索索禁吹病來魂不到相思散人腰已散倚杖嘆吾衰時苦腰滯前調曉晴海日輕紅通似臉小忩明麗新晴滿懐著甚是真情不知春睡美為愛曉寒輕説似吳山樓萬疊雪銷未盡宫城湖邊栁色漸啼鶯纔聽朝馬動一巷賣花聲前調有感過鴈天邊信息兩宫池上心情沈思海角憤難平山風欺客夢耿耿到天明幸自不爭名利閒愁夜夜如驚明朝鬢白兩三莖世人都不念似汝復何成睡過花隂一丈愁深酒力千鍾夢魂不得似逰蜂瓶花無宻約到處自神通天上西湖似錦人間嬌馬如龍今年不與去年同飄零終不恨難與故人逢前調端午幸自不須端帖子閒中一句如無愛他午日午時書惟應三五字便是辟兵符久雨石鯨未沒小風紈扇相疎邀朋一笑共菖蒲去年初禁酒今日漫提壺適滿城無酒酤去年此日初賣官酒前調坐悟我去就他甚易他來認我良難悟時到處是壺天古詩尋一句危坐看香烟金玉滿堂不守菁華嵗月空遷從今飽飯更安眠丹經都不看閒坐一千年前調辛已端午和陳簡齊韻舊日采蓮羞半面至今囬首匆匆夢穿斜日水雲紅癡心猶獨自等待鄭公風海上頽雲潮不返側身空堕遼東人間天上㡬時同宫衣元不遇無語醉醒中前調閒居感舊昔走都門終夜雨明朝泥淖堪驚疎疎㸃㸃忽雞鳴數峯青似染快活早來晴十五年間春夢斷亂山寒食清明無人挑菜踏青行青鳩啼雨外閒聽寺中聲鷓鴣天九日白白江南一信霜過都字不到衡陽老嘉破帽并吹却未省西風似此狂攀北斗酌天漿月香滿似菊花黄神仙暗度龍山刼鷄犬人間百戰場前調夀康教白髪平津起褎然燕飛定逺望生還世間㝡有團欒樂又是平平過一年銀信近玉鞭先東來西去爵銜鱣人生有命遲遲好且喜稱觴夀母前前調夀趙松廬占得春風五日先至今住處是開元寫真若遇丹元子只著當時宫錦船松戴雪自蒼然八公花下少如前㸔來天上多辛苦且住人間五百年前調和謝胡盤居貺橘為夀自入孤山分外香南枝不改舊時粧為曽盤裏承青眼一見溪頭道勝常商山樂又相羊上方不復記傳觴橘中箇箇盤深窈依倚東風局意長前調迎春去年太嵗田間土明日香烟壁下塵馬上新人紅又紫眼前歌妓送還迎釵頭燕勝金紃燕歌趙舞動南人遺民植杖唐巾起閒伴兒童看立春前調立春後即事舊日桃符管送迎燈毬爆竹鬬先贏鹿門亂走團欒久纔到城門有鼔聲梅弄雪栁窺晴殘年猶自冷如氷欲知春色招人醉須是元宵與踏青前調贈妓暖逼疎枝漸漸融雙飛誰識蝶雌雄歌聲己逐行雲去花片偏來酒琖中睂月冷畫樓空酒闌猶未見情鍾直須把燭穿花幛方見佳人玉面紅青玉案微晴渡觀桃非復前日彌望之盛獨可十數樹耳蓋以此間人摘實之苦自伐去也歸途悄然念之作此以示同行稠塘舊是花千樹曽泛入溪深誤前渡劉郎重喚渡漫山寂寂年時花下往往無尋處一年一度相思苦恨不抛人過江去及至來時春未暮兔葵燕麥冷風斜雨長恨稠塘路前調用辛稼軒元夕韻雪消未盡殘梅樹又風送黄昏雨長記小紅樓畔路杵歌串串鼓聲疊疊豫賞元宵舞天涯客鬢愁成縷海上傳柑夢中去今夜上元何處度亂山茅屋寒爐敗壁漁火青熒處前調夀老登八十六嵗戊午六月十七日里中上大人誰大人上大仁難作八十六翁閒處坐小生懶惰近來髙臥忘却今朝賀甲申還是連珠麽剰有老人星一箇白髪朱顔堪婆娑靈光殿火昆明刼過甪綺園黄我前調暮春旅懐無腸可斷聽花雨沈沈己是三更許如此殘紅那得住一春情緒半生羈旅寂寞空山語霖鈴不是相思阻四十平分猶過五漸逺不知何杜宇不如歸去不如歸去人在江南路踏莎行雨中觀海棠命薄佳人情鍾我輩海棠開後心如碎斜風細雨不曽晴倚闌滴盡胭脂涙恨不能開開時又背春寒只了房櫳閉待他晴後得君來無言掩帳羞憔悴前調上元月明無燈明日霰雨屢作璧彩籠塵金吾掠路海風吹斷樓臺霧無人知是上元時一夜月明無著處早是禁烟朝來凍雨東風自放銀花樹雪晴須有踏青時不成也待明年去前調九日牛山作日月跳丸光隂脱兔登臨不用深懐古向來吹帽挿花人盡随殘照西風去老矣征衫飄然客路炊烟三兩人家住欲携斗酒荅秋光山深無覔黄花處北望蝶山西迷鳯苑匆匆醉裏題詩滿黄花只似去年黄去年人去黄花逺謂周秋陽同登雲騰雨壓城荒丘園路斷却暗又恨公來晚依稀自唱古人詩明年此㑹知誰健前調松偃成隂荷香去暑過溪似是東林路不知宿昔有誰來寺門同聽催詩雨北馬依風凉蟬咽暮城門半帶東陵圃江南不是米元暉無人更盡滄洲趣前調櫻桃詞珠靨相於燕脂同傅樊家更共誰家語梢頭結取一春愁玉簫不㑹雙雙侣風送流鶯前歌後舞並桃欲吐含來住雙飛燕子自相銜㑹教唇舌調鸚鵡李商隠詩流鶯猶故在爭得諱含來燭影搖紅嘲王槐城獨賞無月老子婆娑那囬也上南樓去素娥有恨隠雲屏元是嬌癡故鸞扇徘徊未許耿多情為誰堪訴使君愁絶獨倚闌干後期無據有酒如船片雲掃盡霓裳露他時與客更携魚猶記臨臯路余前夜船酒觴客月明槐城登樓余不及赴月暗殊敗興因念南羈北旅醉烏烏憑君楚舞問君不見璧月詞成樓西沈處前調丙子中秋泛月明月如氷亂雲飛下斜河去旋呼艇子載簫聲風景還如故嫋嫋予懐何許聽尊前嗚嗚似訴近年潮信萬里隂晴和天無據有客秋風去時留下金盤露少年終夜奏胡笳誰料無歸路同是江南倦旅對嬋姢君歌我舞醉中休問明月明年人在何處前調立春日雪和秋崖韻春日江郊素娥吹下銀幡舞東風㸃㸃亂茶烟留到明朝否掩袖凝寒不語漫粘酥枝枝縷縷斷腸何似飛絮多時落梅深處仙掌擎來翠眉斂半看成露驚沙馬上面簾輕誰貴氈廬主多少髙陽伴侣到如今沈冥㡬許乗槎相問萬里銀河欲歸無路念奴嬌槐城賦以自夀又和韻見夀三和謝之先生自夀擁衾寒重賦凌雲逰意我有大兒孔文舉弱冠駸駸暮齒桃己三偷樹猶如此前度花開㡬蓬萊可塞還童却老無計為此援筆翩翩大江東去好似歌頭起寄與兩家孫又子長看以文為戲某所某公同年同月誰剪招魂紙前三例好不須舉後三例槐城廿一日生枯寒生晚復何似張緒少年時意薄命不逢何至此滿眼啼粧齲齒城是城非年來年去萬八千能㡬半癡半了更癡兒計孫計囬首仕己半生仕何如己己矣羞拈起幸有橘丸丸日大且復從公圍戲若論彈文更書謗箧吾厯無餘紙多年致仕大都有甚恩例吾年如此更夢裏猶作狼居胥意千首新詩千斛酒管甚何侯侯齒貟嶠波翻瀛洲塵敗吾屐能消㡬經丘尋壑是他早計遲計猶記辰已嗟嗟故人賀我且勉呼君起五十不來來過二方悟人言都戲以我情懐借公篇韻恨不天為紙餘生一笑不須邴曼容例前調和臞仙用槐城韻見夀滄洲一葉徒借君囬我爐亭春意突兀靈光無立壁八面江風寒齒響屐廊深籠門檻赤數月今纔㡬千年未論豈無數十年計我本髙卧墻東何知人事推枕為君起憔悴庚寅何足記不覺聫翩賓戲白雪陽春黄鷄唱日絶少澄心紙我歌草草和章有例還例前調酬王城山兩丸日月細看來也是樊籠中物㸃㸃山河經過了㧞幟㡬畨殘壁白是沙堤蒼然吳楚一片成氊雪此時把酒舊詞還是坡傑歌罷公瑾當年天長地久栁與梅都發㡬許閒愁斜照裏掌上漚生漚滅滄海桑枯東陵𤓰逺總不闗渠髪簮花起舞可憐今夕無月乳燕飛王朋益僉事夜坐文江之上屢稱赤壁之逰樂酒餘索賦因取坐間語㕘差述之赤壁之逰樂但古今風清月白更無坡作矯首中州公何許共我横江孤鶴把手笑孫劉寂寞頗有使君如今否看青山似我多前卻㡬見我伴清酌江心舊豈非城郭撫千年桑田海水神逰非昨對影三人成六客皆坐間語更倚歸舟夜泊尚聽得江城愁角渺渺美人兮南浦耿余懐感淚傷離索天正北繞飛鵲前調夀周耐軒曽授茅山記共當年二百七十又三甲子昨上雲臺占雲物占得景風南至又恰是封侯千嵗行遍神州河洛外早歸來庭下槐隂翠春萬戸共生意溪翁圖是參同契想金丹圓成功行活人相似顧我尊前歌赤壁生子當如此耳笑華髪東坡年㡬弟不如人今老矣看龍頭霄漢雌龍尾呼白石為公起前調飲海棠花下説放翁記劍南宣華園日報開及㡬分聞五分亟往因美放翁記此足為後人開遊賞之趣葢花開三日色變五日則後半開者盛先半開者落矣歌述此意使觀者有省遇雨城西路看輕雲弄日花開微寒如霧誰是宣華門守者報我十分開五便痛飲能消㡬度寄語後來看花客待看花莫待開成樹成樹也半為土佺巢蜀錦今何許記西湖聚景村庄韓􅇑胄村庄今名聚景王亭謝墅冷落柯丘二三子更問何園韓圃悄一笑回車竹所東坡自柯丘賞海棠復過何氏韓氏詩云竹間老人不讀書留我閉門誰教汝蓋市人好事者也適過某氏園園閉因記義之嘗造竹主人主人避不見其子獻之肩輿入人園復為驅出囬車竹所併記其父子賓主一笑㸃㸃守宫包紅淚縱傾城一顧傾城顧家國事政何與瑞鶴仙夀翁丹山正丹翁初度對此滿江城曉鶯欲語崆峒在何處漸雨過農郊勸耕問路州人爭覷問坡老重來是否把看燈傳説風流八境畫圖新句如許老子文章揮毫立馬脱鞾嫌汙太平易作聽父老歌襦袴願使君小住五風十雨重見一粰三黍又天邊飛詔殷勤説相將去髙陽臺和㢲吾韻雨枕鶯啼露班燭散御街人賣花窠過眼無情而今魂夢年多百錢曳杖橋邊去問㡬時重到明河便人間無了東風此恨難磨落紅㸃㸃入頽波任歸春到海海又成渦江上兒童抱茅笑我重過蓬萊不漲枯魚泪但荒村敗壁懸梭對殘陽往往無成似我蹉跎聲聲慢九日泛湖逰夀樂園賞菊時海棠花開即席命賦西風墜緑唤起春嬌嫣然困倚脩竹落帽人來花艷乍驚郎目相思尚帶舊子甚凄涼未忺粧束吟鬢㡳伴寒香一朶並簮黄菊却待金􅋥華屋園林静多情怎禁幽獨蛱蝶應愁紅日落紅難觸那堪鴈霜漸重怕黄昏欲睡未足翠袖冷且莫辭花下秉燭
