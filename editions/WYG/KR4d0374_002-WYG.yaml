body:
  text: 須溪集巻二宋劉辰翁撰記長沙亷訪司題名記春正月而歳新人情改飾脩潔必無肯復仍其舊者重天道也故湖南肅政亷訪司之題名始此肅政亷訪司者至元二十有八年以按察司玩廢更其名首選當世人望有風力者為之觀聽竦然如霆行空必將有所滌蕩震厲至之日列城肅然湖南帶嶺嶠隔江漢地大去天逺地大故難治去天逺故不盡聞今其民安俗便不待愬而救貪夫逺利如恥雖欲假一二以徇而厥罪無繇又如秋之為令行於草木已而惟見天高而氣清潦霧俱盡自亦不知其所以然者於是亷司之建逾年矣伻求文於廬陵以為之記重新制也按春秋未筆削前楚有檮杌專記人之惡夫子以春秋易之而義主於秋湖南故楚貪吏之昔也如杌而諸君子之肅也亦如夫子之為秋恭惟聖天子之命則有辭矣且按察猶亷訪也而必易之寜惟易之而肇揆之曰肅如加冠彌尊豈貴名哉顧諟之矣按察者日求人之過而肅政者先正已而已矣漢萬石君家不言而令行小不釋意子弟至無所容措况立乎百官庶民之上不見其形視其影所謂不怒而民威於鈇鉞者豈可以旦暮致哉意必有出於擊斷斬伐之外矣方諸君子之來也湖南之人相與聞而喜曰是嘗為某官者在事之諸賢又必有聞而興者曰是嘗以玉雪稱者則亦不待褰帷正色攬轡揚聲而不仁者逺矣此其想見風采隱然在題名之先者也他日之奏事而歸也都人士聚而觀者不又曰是嘗為湖南亷訪者夫使天下移風易俗囘心而鄉道者其在斯人乎其在斯人乎此其屬饜厚望藹然在題名之後者也吾江西人也昔者得之徐公子方焉曰是嘗為湖南按察者是嘗為湖南按察而肅者是碑之立鏘然與子方前後聨裾疊佩鳴玉相應不知其亦萬一有能為江西來者乎獨後我乎葢願言不獲如見其人節齋記節葢論其大者則天地四時豈謂一事之信一物之嗇一小忍之頃哉人生亦如四時有三大節少之時學問事親既壯則欲忠孝著於事業老則全歸以見地下終令譽以遺子孫安大都不過百年每以三十年為一節而及百者少其不及百者多則壯者之歳月有不自知其浸尋已入于日昃而猶以方中為可恃未闇為可待也多行可悔常過惮改不知來日之不足而悔且改無及矣可不哀哉吾夫子大聖人猶不敢以生知廢學於其間兢兢焉每十年必一自省吾果可以有進於前十年與否而十五以前之日已不復得矣七十而後之逺者又未可知也計其逍遥退老周公不夢則環轍者直三四十年也以三四十年之仕而司冦者數月止後之學者何如聖人而十年間世路際㑹俛仰赫然者為不可及車馬輕裘有不足道而昔之人為無能矣其用於今日如此則其傳於後世者當何如也是可喜也固無論其逺者試以十年自省由初至此血氣智慮其有異於少之所為者幾吾今之體力尚得為壯乎其猶未得為壯乎其過矣乎用此思之而六七十如不逺矣人能常以旣老為心則日用飲食亦可以寡過也矣節無大小方一介之不當取也則一介為大他時繫千駟受天下猶一介也當洒掃應對則洒掃應對為大他時雖使四方臨戰陳守宗廟社稷與今日洒掃應對一也視小節猶大則視大節猶細彼謂觀大節必於其細者觀人者之見也節無大小以能守為大江西省掾保慶李元剛號節齋求記余謂言大者而小者無不具焉或曰節之為象取於易曷不言易余拱手曰未學愚齋記龍眠李公圖其山莊又自為賦句字清麗殆安仁閒居之本色摩詰輞川之别幅也再傳而家廬陵襲紫聨纓羣從清華高下朱門連城映圃望如亭池盛時平園公徃還就觀其家帖厨畫比年零落亂䘮割為墻東平翁居之客主容膝而車轍巷隘有益公嘉泰龍須碣數尺至無所處則壁之穾隅上規天光下矗盆卉森然亦不啻足平翁起階庭易短後劒書史鞭塵埃混於吽牙託於娵隅先日而出後日而歸間休沐輙㑹親友閭里觴詠歌呼不知天地間何者為美何者為惡何者為貴何者為賤或愚之曰固當如是愚之者疑之以問劉子劉子曰於魚得計於羊棄意蓋物莫不自得而為人所愚為平翁者得矣東家西里愁其身以虞明日常忽焉不免則暮為窶人而降臣皁身腊漆而無聲墓鬼飢而靡徙欲如平翁得乎葢屋如是華有餘世如是樂亦足矣於是又有以其人為智者而吾亦不能辯也太秀洞天買田記太秀江西洞天而山田不滿三百其為宫觀不知幾何年簪盍第増環山十里古以至今無人焉居之比年遊山者禱祠者暮投宿者日常數人食而田不加多世亂恭奉幣者益少涂紹禹之為道司也獨寸寸而節歳收歳廣復市田七百餘石附舊籍於山間耆老共祈乎一言以為記凡方外以嘘吸為喬松而世亦以餐花絶粒者望之故其業視給孤乞食為寡合雖有飢色必將忍之焉千年空山甫及千斛將來者笑人無能則昔之居此者為已多矣謂非才且賢者不及此也當庚桑子之來草根木實澹然至足徒遺後人以其處而代興賜焉望走施焉雖然有隱有顯是山以杜真顯而又有法樂天王為鬼神司命幽明證信人物歸徃而上不及閤皁中不及承天比於隠者徒以貧無求素無欲今其辛勤積累視他山能幾然井田之世上農夫數百人之食百金之費中人十家之産此蓽門圭竇之士所為廬居而竊嘆而金堂石室之地顧猶以蜀薑為未足也繼自今其儉其勤其益思其始計其終于諸仙之過化為不享于叔季之所䝉為僥倖毋以給足傲蘋薦毋以積實廢飯芻由百致千難由千取百易繼自今其儉其勤其十百乎其初則吾言為陋矣夫吾言且過矣夫陋且過不論吾又自有感也士大夫無擔石負米而起熈熈然家如嬰兒一日而置二頃則身後有争焉者矣政煩賦重阡陌儗封君念子若孫有願為窶焉而不可得者矣而惟世外之人皆宛然閱世而無患非其能足以致此所以致此者其道蓋是也嗚呼大道之行與三代之英吾黨未之見也見素抱樸少私寡欲道其道者尚亦毋悔乎其言南劒雙峯書院記將孫客授南劒而順昌之諸生以雙峯書院介吾兒以請曰邑之有寥氏猶楚申戴也自紹興中丞公剛以諫顯至慶元間運使公義剛為朱文公高第又百有餘年而其孫邦傑持鄉節過之乃以運使公配中丞公祀為雙峯書院養生徒於是兩公皆得諡為文靖矣於是龜山楊文靖公豫章羅文靖公延平李文靖公五公矣代變風移有北來寄公屋書院舊基而家有之迺郡府判某過為睠而贖之以吾俸不可㑹亷使汴梁李公果力主某請歸贖今而後乃得復為雙峰書院屋雖舊禮殿新諸君子之業勤矣願有記將孫又言劒學之重新延平之修理龜山雙峰之克復皆府判力也余聞而説之為雙峰言曰師友之際難言也夫子於堯舜祖述之師也顔子於夫子父事之師也子貢於顔子兄事之師也若文公之所祖述之所嚴事之所陶鑄如服衰緦心所自盡也豈後人可擬而議哉文章之於性天道末矣而或謂其參天地之運關盛衰之數有諸賢不可得而與者若生同鄉學同門倡明斯道上接河洛為世之大宗其後討論從祀後先揆一則自周公以來未時有若此郡三先生文靖之為諡者也其於天地之運不知磅礴幾千百年而後一合乎此若夏商以前飂叔安之後廖以國氏又數千年其間生才名世豈皆魁竒迷溺如衡山師而必待中丞公而後顯又必待運使公而後合二剛節惠儼然與三先生壹則㣲文公之澤不及此建為東南洙泗及門之士星連吳蜀孰非語録而躋為先賢疏為封公翼為書院墜而復振而又有臺若府共光復之以有寜宇遡觀前代其不謂之盛耶不謂之數耶劒視建為小然道統之傳發於延平則延平為大順昌在延平小雙峰尤小然一姓两公最稱世嫡則雙峰為順昌大嗚呼予論師友祖孫之際不勝其慨然也太史公言林之先豈有天禄哉何廖氏之文歴異代而尤盛也竹坡記自歐公記相錦以來鄉郡雖宰執侍從罕至而開慶巳未吾鄉平林蕭公以王人起家兼江閫豈惟一時家國異數兹亦宇宙不多見也於是飛渡迫矣環城清野合村墟鎮市生聚可數十萬悍將之烽火一起惟公以家口保之今蜂房蟻丘四望烟綿孰非公之遺愛而公之孫元永復以至元貳卿興歴帥海瓊是家喬木將葉葉焉其如初繇是南北之人稱公之孫竹坡如平林迺竹坡自叙慊然曰斯竹也吾祖之林之一也不殖且落何以示子孫子曰物之為林者衆矣雖受命如松栢亦當身而止惟竹也乃以孫特聞非以逺且多耶是坡坦迤三徑蒼然試㳺目乎區中其西則金谷之園盛時花木連堤接壤避車葢者無路今荒苔斷礎容有存焉者乎稍東為烏衣又東緑野青隂華屋塵空燕徙不論幸而存者館墟而廏飾幽遷蓬集入汚出奴過者奈何也葢夫昔之為林也芳者葩者蔓者條者翠而葱者風霜一旦凄兮摇落亦其遺後者早巳就植物而論東南之美惟此君獨高而况是坡是竹愈厚徳以培之勤學問以漑之中虛外直確然當以其節顯庇其宇者猶慨然如有立灑然如執熱而濯也兹非淇澳之猗猗者耶何其閲世暑寒復其初過其祖以及其子也則夫竹之為孫也有不為當世用者耶而又可勝慨耶且吾嘗笑夫晉人之高興也子敬子猷皆以愛竹欵門而或為人所閉或不為人所禮孰如家有清風逍遥其下披襟永日嘯歌命客而俗物亦莫能至焉樂哉歳寒市而隠以此雖然又有去而為相而憂其竹之不平安者竹豈有不平安者哉毋亦饞者甘其萌削者􅜩其根子孫不賢者則又引山王以為重植千户以自封又不然者為郫筒湑之肆大嚼慁之雖非戕賊而有一於此則愀然日有不安者矣君起家用世其疎濶恐不免予為記此以是傳之子子孫孫即或出或處雖千萬里外其平安如一日君起而謝曰噫子孫之幸也先祖有焉小斜川記新昌羅思敬為我言所居山水之勝翰苑臺折桂峰皆邑望而洪覺範吾鄰也溪流一葉洪以其類斜川也釣遊樂之予為亭其處以詔子孫待賔客庶幾有能賦者焉願夫子大書而名之以存洪拊洪賁洪余既名為小斜川又繫之曰覺範者豫章公之無本鉢盂後之王何也今亦豈易得哉使吾及此老與之夜話證寂音續僧史豈非山間世外之一快而俗子隨聲取自標重其於名謗皆若此使人秉塞世方招邀高尚祈望八百彼為釋氏傳之其徒則佛之可也派之祖之亦可也爾乃能索之西家爾乃能納之畏壘爾乃能遜蓋公以招其與騖高慕外跡其人不相接之逺與躬為後學圖示四方者用意豈不蹇陋疏甚而人棄我取雅近自然鄰好新矣為此亭賦者其亦思一僧出處詩詞末伎存江山以不朽則夫大之為文章學問功名節義所以樹當年而風百世者而獨可以已哉秀野堂記昔者坡公之賦獨樂也曰花竹秀而野妙語天然豈無名園盛麗於此者而不足以當之矣長沙趙公以二十年閒居建第烏衣麄疎種植計今晝錦之堂豈能如前時湖南第一羣山囿之甲乙乃取温公獨樂園詩語名堂秀野而移書廬陵記之余得書而嘆曰憂樂時也謂温公之樂樂耶孰知其憂以慶厯嘉祐之民為青苖保役之世安土之流移永樂之耗敗當其居洛孰非幽憂憔悴之日深衣而起曠然與天下為元祐而一馬二童之不返是斯園五畆未嘗識公一日太平之樂也意其花竹猶有遺憾也若公之秀野豈非真所謂獨樂者哉公之新第幾時矣楊栁菀其成隂蕙蘭芳而如水四時變態鳴聲朝暮紛倡酬以盈巻撫童稚則已長然而兵出塞吾不知朝燕坐吾弗與每曉露觀花晚風迎月回思徃時鞭塵汗血烽堠夜驚蹈海之危蹤過河之枯淚顧疎籬寒碧道傍老樹無不可愛欲憩焉息焉而不可得今北牕晝倦雪深起晚時時氈騎過門羽書如電世之事吾不得為吾之事非世所慕不知鄉社之耆英山林之仙隱其風流興寄何如也則今秀野其不樂於昔之秀野者耶而又欲為彼耶雖先代大賢理無相勝吾獨悲温公之時之志而又以慶此堂此日遂初之不可及者以其生無事之世而當無用之時也即公之父祖可知已彼宅成秉燭日驛平安雖賢愚相逺然以憂患之長途易功名之不朽後之君子有閔焉於此者吾聞此堂日用修香譜理琴事如不及區區栖遲相望約公逰嶽且十年而不徃則以逆旅之不如昔也逺承授簡誦兒童君實語為花竹憂幸公筮遯與世相忘余雖衰晚倦逰㑹當乗興清時登堂聽琴得句長歌歌獨樂樂大隱堂記人隱天天隱道天於人如魚水人日處其中而不自知或曰人處天中則聞之矣天何處曰天亦處人中耳莫大於天而莫知此大之所隱止在目前是為道道故隱凡大隱倣此鐵柱黄石厓隱鐵柱堂名大隱石厓自朝至暮引接士大夫不倦人物之至其室也如肆與市俱興入夜而後息見者皆以其擾擾若此豈隱者乎余謂此其所以為石厓也今聞百里數百里間有木食澗飲如猿鹿者則跂跂然而喜或徒歩徃從之亦必無不得者今吾日與之處豈惟彼忘我我亦忘吾而誰何者逺矣謂大隱必於朝市亦非也吾生於是長於是耳豈必變氏名哉或曰彼庸也或曰吾東家也而索我於方之外者亦有所不足索矣雖然為石厓易欲不為石厓難勞其身以為人而人安之故曰為石厓易一日關門静坐而人有窺之者矣故不為石厓難昔魏鄭公李鄴侯輩皆逃儒而入於老故混若以老為老已不得謂之隱矣介子曰身將隱焉用文今名堂曰隱已不得謂之隱矣惟不為木鶴不為鷴客不為金門待詔不為五將軍佩印斯堂斯日必無是事而是事亦必不以及我即所謂大隱者如是而隱矣凡市門隱非庸人非方外故能識某屠某傭甚至知其國兵符所在與美人意中事如指師材不辨狡獪此事亦姑置獨有一事為大隱過計遇祈孔賔呼勿去眇道士來勿失回道人共住勿怪朝陽書堂記同年資中張君夀父尉吾州永豐攝永豐最後攝永新用之隱然如當路甚乃以此得竒禍不悔其後又官武昌城破為諸生灌園而諸生起從之逰與之言性命道徳至久而南北共杓之為之植屋數間於黄鵠山中學宫之後東面日出君夀於是榜之曰朝陽書堂而馳書於廬陵求記朝陽者天地之仁氣也自或者以鳯為鳴陽而詩人之意失彼其鳴也高岡也非有取乎朝陽也若梧者感仁氣而生而亦興耳今之名堂者又非取於梧也非鳯非梧吾且指朝陽而言之子以為今之扶桑者即昨日之西山者乎非也日雖久照若其淪於倒景也則亦魄耳故有聲如雷既夜半而陽生焉其得諸陽也如鼎葢五合六聚而後出於人間世為升其升也至再三焉而如舂孰知天地之為此也有甚於為人者乎而觀海於東南者足以識之矣彼以地下如人間晝者非也陽之為盛未有盛於人間者也故其道文明人初生若日初出今吾與子蓬蓬然而日入於槁其又有補於東隅者乎其亦頽焉竢焉而歸少休乎彼也則人之所為其不能與天相似也亦在乎此矣凡人之不能忘者在宿念生道日進而日新其昨日者予忘之矣雖豐功盛徳大有造於其時者亦忘之矣士方少年起書生渉州縣閲當國人物事之成敗懷惘惘而如夢其可為悔悼可為噫笑亦復何限今夫日之照也徧天下歴萬古偶爾塵霧晻靄光景薄蝕寜能復以為意及其興於平旦之氣也皦然赫然其如初則求日於昨日者不知其非矣是謂常清常明是謂性體彼其洗我也如此使吾八九十則已老使吾鷄鳴為舜不更少乎而齎咨而涕洟而鼓缶而歌曰曰昃之離歎吾老而悲吾衰則其對朝陽也如愧之矣朝陽者日日之春而日日之古也凡過而不能改者吝也而不能忘者亦吝也予今之日非昨之日矣故湯之盤銘曰茍日新日日新又日新予也城巷之幽居人也晏而起大如車輪非東方既明者耶而已不得謂之朝陽矣斯堂左鳯凰山右鸚鵡洲蜀江浩然推峯而上雖視吾所見不丈五而早而已不得謂之朝陽矣欲觀日也觀於山欲觀日之生也觀於海海者地之至下者也而少陽生焉諸陽聚焉人人有是海而不知朝陽者日之可愛者也過是則杲杲矣以陽事陽也朝為近抑放勲曰寅賔出日日之賔也我為主必有事焉曰敬敬已而已矣是則朝陽者未嘗不日在乎此而不必待乎彼也茶陵陳公俊汲古堂記茶陵陳公俊之曾祖商霖為書堂於所居快閣之後其鄉人段左藏名之曰汲古記之他日艮齋謝公又記之繇淳熈至紹定築茶陵堂廢後五十年庚辰而公俊始改居城西復汲古堂存二記慨然曰吾恨欲裹糧挾册一至於廬陵不能也有長沙之介曹氏儻得一言如淳熈二記者子孫如有聞也敢請予笑曰若稽古若稽古逺矣請以今喻予居鄉望焉有意乎後進之士也每屨二及門無問識不識得其風神小異間或悉其氏名所業欣然客之其必有以啟我然寒温時事而退甚乃不及時事既出門初意失然予又懲前客病予訥為之津津然援徃昔聞見雜以近事已作萬一其郢質我横從我然弱者唯唯彊者語他謂初見然爾後相見復然至甚相得謬稱門人復然問猶汲也常言曰學問學之道問為急雖有冽泉非誠心渴則其泂也如棄棄非泉病也渴者病矣渴有至有不至不至可忍至不可忍也愈知味則愈至子貢於兵食樊遲於仁知陳亢於詩禮問則至不問不至也汲之為道也愈足而愈不足汲有不足道無逺陳良北學中國邴根矩舍東家至安丘歴陳留潁川汝南涿郡趙景真起孺子遯二親為􅄞叔夜走山陽古之人古之人其渴名士也如此吾可以望之閭巷之諸君也哉近年每過使客聘予講予謂講者非自陳已也使諸生各以其疑問必有疑也反覆從予得之不得不措也是為講然而問者嗇矣何以待問者渴而問者嗇也有得少而自謂已多者以時文談經經者給時文止飲河者驕若不可復進也又有求之之過者惑道聽而哀晉都守成書而信燕説浚恒者必求深彼恒也本不深也茍不知其汨陳則汲亦病不汲亦病故吾之於古有不然不然於衆之所然而衆亦謂予不然至淺者記問也有泥且食以為不易者焉典故是也至深者義理也有穿穴旁通而當道塞焉傳注是也夫予亦何自言之非夫逺者之為汲則予狂不至於此凡古事無所不有得其情者或寡陸羽知水無味有味無味者味味乃至也今人不知水自羽發之勉之哉古者腐也汲生泉善堂記自幸絃易佩以來有志於改塗易轍者即美言尊行無不用其取於他山之石者則又驚世絶俗至乃使人不敢稱楊侯克恭獨以善名其堂初若無所謂者然概乎其無所不包語焉而不可勝既豈不廣大矣易直矣純粹精矣侯以予粗知字義謂予一言予葢敬之愛之為之言曰天地之道可一言而盡繼之者必善也茍於其繼之者不深識其所以然則必漠然而無所可守矣始為仁義禮知者誰歟求之性初性初無是也善而已求之畫前畫前無是也善而已善者念之動也雖天地之分亦念之動也方其動也我且不自知其為誰亦猶未動之先天且不自知其為道天即道也道所以為天也而吾為道之子所為繼也繼猶春也春之於物其何所不至而豈有不善哉人見其無所不生也不能無善不善而不知其不得不生者皆善也而豈獨私於人哉而豈獨私厚於我哉吾於此見天地之量於此見命之流行自然如不得已於此見性之於人本皆如此而横論為惡調停為混者皆未嘗返諸其初也泉初出猶雲初興豈下流之謂哉必有察夫動之惟微而後知其為中也雖不離乎喜怒哀樂亦未至於喜怒哀樂故仁義禮知皆不足以形容之此則善之為善也善者道之所生也吾赤子之心也亦猶人生未有名字所知者其父母而已則其去父母特末逺也字之又字之其號名殊而所生不可知矣今之言性者皆字也心言仁仁言愛愛言覺覺言公徳言常常言端端言幾幾又轉而元而通而復則字之字也向之員者猶有以為方也而清者不可以為和矣父止慈交止信非不足以為為善之所止而謂善之為善止於此則不可葢有止於此而不足以為善者矣故家有嚴君而大人者不必信嗚呼不眀乎善則雖執中猶執一而况愈支愈離愈辯愈惑今世之所稱者以并包為善而又以巽懦為為善之人則殆於認惡以為善不知舜之善也有若决江河之勇樂正子之善也優於天下則善之氣象為何如也侯於學問既得於念動之初有以達性命之藴而又有服膺固執之力不得志獨行其道屢空而不悶昔者荀息之言曰人之為善誰不如我范孟博謂其子曰吾欲使汝為善則我不為惡後之君子無不有感於斯焉楊氏自四世三公為蜀聞家侯青神人中和堂記河東李士𢎞剛果好義人也其來東南徧參歴試充然如有所得然余有所不能知也書來語我中和之堂曰堂吾家也所在而揭焉有一言而可以變氣質之偏者不敢忘也惟吾子之留意焉抑中和之義𢎞父何不知也余豈敢以諸賢之衍義復出之乎然自讀中庸以來有疑於朱子曰致中和於一身則天下雖亂而吾身之天地萬物不害為泰身者天地之一物豈復有天地萬物在所謂天下之外而獨寄於匹夫一人之身者哉葢勉而學道學而有得而後悟天地非吾身外物也天地之物備於吾身而心之經綸又有天地所不能為者就其所不能為者則亦猶一物耳不知吾之所以物天地者安在而自淪於一物則不知性之罪也今夫隂陽寒暑雷霆風雨以致於沸騰壓溺之變何所不有而不足以易吾性之所存是謂彼亂而我治由其治則雖天地待我而正萬物待我而生故在舜為璣衡在夫子為春秋璣衡在我春秋亦在我非外物也民受天地之中不知天地亦行乎此中而不自知一隂一陽之謂道道即中也天地何所依依於中彼非中不立吾以此身為天地中是其所謂道者亦依於我耳莫妙於隂陽動静莫神於隂陽動静之間動静之間其間無物猶五常之信四時之土中者天地之土也寂然不動者也動而無動者也喜怒哀樂猶家國天下其未發也正心誠意而已吾能正心誠意耳而家自齊國自治天下自平知此則喜怒哀樂亦非吾之所能為也順此而已今人知喜與樂之為和而不知當怒而怒怒亦和也非怒之為和而和者未嘗不在也猶當哀而哀必哀盡而後無餘憾也然此豈動心與忍性之謂哉知其未嘗動則亦有所不必忍也故夫大寒大暑烈風雷雨人知其過不知其和彼其宣導湮鬰開闢變化不若是不足以有為故在當日為過在一歳言之亦適和耳凡吾所言非傳與疏也道不可須臾離也而亦未嘗離也吾嘗言之云爾復為𢎞也誦之彼忖為過不及以為中又以其勉强不妄發者為和不惟不知性亦不知道德熟堂記俗儒泥古敗誤事容可救若俗醫不通變存者立斃然不悟吾豈敢勸人服聖散子哉亦身所嘗試而驗自不能不為故舊誦之云爾余苶然受峻劑苦滋補無甚效殆弱甚非藥罪去冬偶失血賴三建旋愈自是雜茸附以為常顧愈弱惟蕭堯則戴兼濟脉之健疑熱乃少用寒苦耳根痛微腫忽痒掉寒甚意亦風熱常證耳然視聽憒憒中兼濟進凉藥屢以盌初不謂其大黄與芒硝也既屢下熱退而體逾健問補藥雖參术不用直健飯而已吾平生燥脾而食不進復少睡眠至是甫進食知睡味耳兼濟辨證審不盡言堯則兼言其理以為抱補藥非治也莝積去而榮衛昌不補猶補也古法惟汗吐下三安有不吐不下奉恫錮滯而以為中此固瘧痢痞膈蠱瘵之媒也彼初病有此哉今人輕用巴毒而壹不知調胃與承氣之何説余因其言證之經論良是由是復間御凉劑以為常而日者又足膝冷且疼甚幾悔豈不弱證明甚兼濟乃復曰敢不凛之僥倖不可再也然少下即寛一下一寛而諸證失余前病熱或雜補所致今病豈補罪哉徃徃南北混而地氣遷復有病如予者復有病甚如予者無不以下故蘇而兼濟損益復自有理此余所身試而目睹者也非身試與目睹亦不敢為他人道也於是戴氏之為徳熟矣徳戴氏者幾人矣徳熟者予取坡詩名其堂者也凡試人病初愈如徳色非徳色也亦自喜也試愈多及愈衆則向之徳者愈忘之矣殆不勝其徳矣此如輕車舊路入手如絲又如合久知心不問已悉其熟矣斷可識矣雖然亦必有未盡識者日謹一日如初不害其精也熟愈精也熟而忽焉非也熟猶果也始種而有欲果之心不可果成矣必遲之遲之何也熟故有味也熟矣而不盡取不盡取何也多故也已不取而人取之則亦喜何喜也喜其傳也有東方生者三竊之而樹不知多故也吾為子記使得其説而通變用之者人人如東方生焉要亦子之果也致樂堂記致樂堂者濟南潘氏事親之堂也景梁之言曰昔者吾父之依依膝下也先生長者喜而名之迄今吾兄弟四人委質南北雖歳時望親舍即相聚拜家慶愈逺獨斯堂也常在予目願夫子道吾志且開後人余曰是樂也人常有之而莫能致也其致此天也孰能得此於天天固予之天固予之而恃此以為長忽之以為常人人有可致之樂而莫能致也則亦未有深長反復言之者也今夫人生有不及見父母者有見其老而不及飬飬而無救於其衰且病幸而無病有貧不能仕仕而不能待者又幸而能待則有身為親憂或中夭而遂棄之以陷於不孝皆物理之常然情痛之必至天命之所不可知而人事之無所奈何也人其有不知此者哉知故樂也抑是樂也人能知之人能知之而亦莫能致也有愁苦澹薄而莫能致者人亦孰不欲儉非儉親也以曽元家學降而徹不請與彼身為君子至終身不忍挾纊後之聞者傷心焉雖其志誠不得已而可憾同也有憂患隔絶而不能致者幸不幸天也而亦有人事焉長沙之望長安也徒願焉一見其土栁子厚於劉播州至矣復不知誰念子厚者則所樹立使然也有愛憎相倚而不能致者弟兄孺子之愛豈人所能知哉思李令伯願為人兄之語復有不得已而屬之其弟如范孟博周伯仁者此其可言者也而亦有不可言者焉余為人子言務極其所不能致使登堂者不惟有無涯之懽而亦隱然有不盡之懼夫余也凄凉天地之間者也蓋子路之悲臯魚之恨頴封人之感誠喟然不釋乎吾心而一以微詞發之則幸其未至於此者其欣喜滿足當何如也昔者孟子之言以為雖王天下之樂不與考古人倫誼至家國猶可憾意亦外物之為累也夫致自致也自致者内盡於心而力無不足今人所以奉其身自宮室妻妾慮無不極分願豈父母之樂不及此樂則樂矣獨言致則未也故詩人諷道又必至於兄弟室家之際而夫子復因而警切之曰父母其順矣乎夫欲樂其樂者亦必家人婦子交盡其愛也致者推極之謂也無不可以思焉彭希吕亦樂堂記客之出於安成者曰彭希吕好客何其聲之藉也希吕復為堂曰亦樂余曰豈非樂逺方來者乎希吕曰余安能有餘以及客哉顧塗窮僕痡何有何亡連床聽雨行吾素履干戈息跡來者斷鴈吾呻吟牕下周旋故我又未嘗不友古人而屬明月也吾何客之有亦欲狂歌痛飲芳時暇日而北阮貧南杜絶蕭然滿目余亦兢兢保鄉閭奉遺體之不釋蓋無食邑於槐宮無征西於墓上而驃騎者莫余加醉尉者莫余呵則又未嘗不自以為樂也余聞而壯之曰樂哉斯人若然者獨亦樂窮亦樂憂亦樂今人亦安能知客之樂哉故有辭左元放出者有逐王大令去者不樂有客則必樂其為獨矣而未見其樂也蓋觀書無味而欲睡則棄書睡耳若夫窮乃憂也未有不憂其窮者又未有能自憂其憂者如顔氏之子衆之所憂乃其所自樂也有石季倫者見其畫猶惡其窮也曰士當身名俱泰不知金谷滿盈俄而為墟身名謂何亦悔焉而知愧否千載之下有畫季倫者否貧果憂耶必以衆之所樂為吾所不樂亦非也衆之所樂吾亦樂之顧其道亡繇耳則古人之餘樂也古人之所自樂者既終其身矣我乃得古人之樂樂之是亦古人也非歟凡有待於外而樂有不樂者焉意亦非今人之所能知也雖然窮者無余如也本余樂也君亦樂是使余何樂也或曰君嘗教萍鄉今又掌表諸生蓋達者非窮者後隆堂記後隆堂者永興劉氏丞相楚公之大父所興也方叛據從横中立保境曰吾免二國交兵活人多矣子孫當有隆者葢一再世而楚公生後二百餘年而永新有負芻之禍衣冠殱焉井邑墟焉又十有餘年而丞相之逺孫振竒復建其堂於故基曰後隆有老人者感而嘆之曰未可知也其相門復生相乎後之為隆者未有復隆於為相者也雖然何必相隆者非必人爵之貴也使公如卿卿如長亦足矣不然武子之施已没而巫臣之美始生於是振竒瞿然曰吾何徳以及此亦惟是前人之名堂者不可失且詔後人今吾匹夫何能有一介之積如度浮蟻而可必吾後之更隆哉老人曰又不然也處今之世公相可能也長不可能也人亦何必為人長即窮居内省不設一念一念度衆生度其福徳乃亦與活千人等彼所謂公相日所為事無非取於人者取於人者是養人者害人也夫如是故禄盡道窮未有興者而詩書白屋如歳方春如日方升彼豈嘗有意於為善哉能無過而已且夫人常有幸人之心不妬則望使吾日活一人不能而幸夫人之不活者每每如是未有不自知也亦未為不損物也是寡過亦未易能也曹大家有言天命祐善灾惡非有差也然其道廣大雖父子百葉猶若一體也今子生於晝行錦繡之鄉而立乎兵役荆棘之墅然獨饘於斯粥於斯身為遺民代守墳墓固非昔所謂隆者也而亦豈有絶哉子亦思之乎全范陽者范陽百姓也救外黄者外黄小兒也彼百姓小兒猶若此而豈有不能者哉徐秦皆祖栢翳而遜者特綿則後之更事者言之有不願於隆者矣余聞老人言始而驚中而悲且懼因盤桓反覆自國初至此重為振竒也記之玉笥山清音堂記余初入玉磵見其山田曲折草樹依微歎曰使此泉生閩浙石壁間皆當琮琤洗人耳矣既至承天如萬石公冡高明臚分門巷周迴乃若與山不相接者使人曳行所至如見叔夜水邊栁下而去徃徃未離人間意也末至清音堂問木魚道人已出廖南山在焉觀其樹立顯敞蘓塊丙舍稍渉屏後則山石蒼寒竹樹層隂有天竺呼猿雪後之趣時主人理茶事獨二客從余坐久悄無餘聲客曰宜琴恨不令壁間琴語也余熟視壁間耳目蕭然方悟無絃之妙以不聞聞殆又勝於聞也此日此堂初見此山後二年木魚以其師請記曰堂後書堂峰梁昭明誦左太冲詩處也余笑曰山水不如是也即山水有清音五字亦世間常有此語直托之太冲能道耳是雖可誦何必聞乎其聲凡音之起由人心生也惟得之天然者可以意㑹而不可以言傳醉翁之聽泉聲也如操而沈遵之譜琴操也如泉政使高下壹如泉聲而醉翁之醉逺矣又不知翁之於是操也如當時所聞否山間石上盡日無人鳥啼花落之外屬有泉聲冷然若衆音㑹其斷其續猶之無可奈何而山之為助也多矣不知者以為湘靈之環珮耶抑㸃爾之鼓而希鏗而舍也一入乎耳神情灑然但覺餘音之皆贅復有雍門悲彈華亭清唳亦不願聽之矣此豈可以尋聲而譜累句而作哉吾嘗謂陶𢎞景卧聽松風比於浩然之氣為有悟入松風徃矣而曲肱者猶從之也此其在覺夢之間也葢若浮若遊而不知其誰我松耶風耶其亦出於山水之間耶於是木魚躍然而起曰未嘗聞未嘗不可聞也歸而刻之堂上静逸堂記逸者自遺於人間而人亦遺之如子房學禮於滄海君得力士扁鵲受藥於長桑君飲以上池之水夷門隱者能知魏王兵符所在與如姬所甚恨不言之志此人皆察於世變達於情偽勉强成就出於偶然不為險􅇖變化高尚竒節而人謀鬼謀賢於蓍蔡逺甚彼其初皆有以自善其身不知老之將至平生倐忽困窮邂逅不知其所從來旣疑前此未必有此人又疑今者未必無此人也吾嘗謂虞翻解印去官鴟夷身泛西子其感慨憂患與人同而長徃輕舉與人異以其人為必不死者豪傑之見也而亦莫知其所終也然猶未入於方伎也不知何許老父哭龔生八十而夭自是隱者如有術而術者亦隱至聞山林龍徳皆如燕齊海上怪迂之士使有道者噫笑而不平好竒者想望而不及故樊英見列於高藝焦先得附於耆英呼祁孔賔者如神人事陶𢎞景者為别館不者亦欿焉俛焉若無足稱焉嗟乎此中庸所以不可能也胡氏稱静逸者如其字其言静逸劾鬼神致雷雨前有某事某事籍何甚也及與之遇澹如常人正平平耳問其所以能無能也静而已法亦無法也静而已視其貌如其心夷然塵芥物我出入光景為樂使在十年前見之兵間可與合好解紛亦若無意於人事者然皇皇求丹學道或疑静逸未見其逸余笑曰此其所以逸也古有行山如夢人至聞其鼾睡聲者晋人有言是中故難得睡處放懷宇内悟則皆道此所謂顛沛造次者今人學静更覺静之為煩因其伎進於道樂以所自得者記之夫静逸則自遺於人矣未必人亦遺之也以其有無用之用也其亦必不免於用也二樂齋記趙氏自常菴來言行為諸君子所知其子孟儕取孟子二樂名其齋志意復如常菴葢望而知其人也或曰為爾亦有何樂敝衣曳履泊如旅人慮而後語不自得一笑終身行乎憂患凛焉窘拘而不知免之何日藉是可以為樂乎則區區者不樂於此矣余笑曰是樂也非人所能知也猶其愧其怍亦非人所能知之直自知之耳惟不知愧怍則自以為不愧不怍及欲其愧怍亦且不可得耳立乎衣狐貉者之側敝緼袍而不自覺者必其所自得者有在緼袍之外也吾何幸斯人之不愧怍吾惟懼斯人之不得樂其樂也樂莫樂於無愧怍而王天下不與焉故人悦之好色富貴無足以解憂而行一不義殺一不辜雖得之猶憾今人可欲心動見便則奪逰乎扼亢之塗而立於射羿之府自以為能者之所必取十百之所不如然寤驚神泣芒負形穢逮其運衰智失鬼責人誅洫然如大澤之天亡江東之不可復渡也其於樂不樂何如哉雖然待悔而知者夫人也必天知人知而後俯仰無所容者亦夫人也天猶人也人猶已也則不仰俯而知吾事吾心而已天與人且安在哉人能知不愧怍之為樂則視世之所樂乃皆愧怍耳奈何以愧怍為樂復以吾為不樂哉昔有為王獻之禱者欲其自陳獻之云不覺有餘事管㓜安過海幾覆舟獨以為一朝科頭三晨晏起之報吾嘗謂此二人者庶幾為寡過耳此非人所能知也嗟乎人之所樂吾亦樂之退而有不能堪者焉故不樂也吾視近年有傳稱長樂自以為天獨厚之者有車騎誇人侈然而謂門户方興者其不羞不惡極矣而由君子視之跡其所以云爾者不能不自飾也其良心也未有無愧怍者也人能知其所樂之自不能無愧與怍則吾之不樂者樂矣夫欲為吾之無愧怍矣而又欲為彼之樂可兼得耶節庵記不言而躬行者死節其至也當是時也無蓍龜可决無婦子可謀無身後榮諡可願無君父簡書可畏無子孫後望可期直仰天俯地自行吾意而已而萬世而下猶屑屑焉議之然不然盡未盡蓋寥廓藪澤之間可以一笑亦不足辯也昔者吾嘗恨川洛諸賢之嶺海也其後老奸豎孽託夢天人享有太平之福者終其身其後播遷絶漠自李侍郎外無一人死者以此羞當年而輕中國使黨錮猶存理不至此若近年蹈海之禍則名士大夫無數如金堂賈純孝闔門陷殁乃與其祖西和府君死節相望於是可以張吾軍矣其視全軀保妻子者非夫不言而躬行者耶豈惟賈氏芳抑東都光按賈氏祖承議公當紹定辛夘倅西和西和陷朝服與家人死者十二口事定慰其父京秩而録其孤賛有忠孝之褒故二賈以昌忠純孝名俱第而孝以麻鞋見海上填崖山是年己卯上距辛卯四十有九年使坡公復起賦賈梁道當不恨於無孫矣悲夫盛哉昌忠為吾州教號節庵出諸公所為記述初得見其弟名此在他時宜有榮諡後望者顧吾黨不得不公道傳之而北方之能言者尤極歎仰比之趙池州夘發李長沙芾三數公焉此則公論在晉乗之外者也嗚呼吾著君單閼之歳曰西州忠孝賈氏亦以雪西頭亡國之恥其自狐射姑以下實寵嘉之節庵勉焉意樂記歐陽經叔自英英埸屋已學葬書嗜山水如舉業嘗應擇地科累舉如志當其時學歩者欲得其還盼不可科廢度無足用吾學繇是登臨縱觀旁午歴試凡親若友有徃助後罷者必經經叔而後無餘憾焉間持一扇求予書意樂且記問何意曰吾家醉翁山水意也余逃空谷久聞足音如墜倦且厭甚矣聞君言落落特未喻經叔曰不然山之在天地間一高一下如馳如伏非無為者而未有知其所為者何在而吾能知之玩其成形如規輪得鐻或穴不得處如敗棊取勝更妙一樂也吾無所用於世則已矣獨環視國中冨者如傾而莫之止存者如阬而莫之救誠悲傷憤歎幸吾術見信不謬而能使朽者殖絶者續敗者興寜惟吾世而止將五世十世無窮之思亦無窮之潤二樂也夫行吟澤畔而無益也登華傷生而無聞也孰與放懷壙埌游乎趙文子之所觀與黄帝之所休葢得吾波者為龍得吾佩者為仙吾聞其言亦洋洋然動心焉遂欲布韈青纒其間日從之以忘年而濟勝之具不進復且焉止君長余一歳已具老態屬行田間見其履榛莽遺寒暑如獵得雋夫非意樂不至此余於是得所以為君記矣抑吾黨相與言必有益於逺者吾嘗使人視天台賈氏墓見其葬蛇形湴田中者黑如霧其族無敢拜拜輙禍殆政得其毒處也而吾鄉永新孽劉之祖適似之甚哉或以毒天下毒其邑今君之用心誠溥矣其事誠足樂矣若此者亦願之耶深山大澤何世無之竅混沌者如有悔矣舊過武夷所謂仁智堂者得山水佳處吾欲全君樂以附於其所謂仁智者故竭亹亹焉吾言如苦非經叔莫能喻非經叔亦莫能用吾言也西山雲壑記道録歐陽士鼎言祖師淳熈左右街道録太一宮主皇甫居中以道行升聞入内主醮事對揚太平䕶國天尊聖號聲振簾幃大見寵遇御書雲壑二字又賜以詩今百有餘年墨色如新宣押奏紙尚幅十餘故在藏閣昭囘西山夜光而未有記敢請蓋諾矣而未及作有問者曰此皇甫亦有何異徒以音聲動寤而天聽沛然如有得於此何也某對曰此大聖人之所以異非可以聞而識也李鄴侯讀書衡山中聞高處嬾殘誦經聲前悽愴而後快樂驚曰此必謫墮人也將去矣亟就之得爐中半芋人天哀樂何與於經巻而察之至此此豈師曠六律五音之審子期高山流水之知而已哉惟鄴侯知此僧惟此僧知鄴侯而非蘄乎知也孝宗天人也其必有所感矣明衣濫竽前喁後于空中遺音何足回首深宫蠖濩龍見雷聲其徹重雲而摇閶闔耶帝亦俯然而聽之矣而謂聖人不知耶則是師之精神氣志有出於聲前者矣魯君之呼而門者知之彼微者之知君况君之知微者乎此固不足深論獨前代英君有愚於求神仙而荒於頌功徳者其究則甚於聲色而國命隨之天豈離於人而欲昇山何求於人而欲禪下不可以語童子而高可以感帝王惟我孝宗與諸老為師友其於道心執中知其一貫故時時接於方外足證自然而所遇所求亦不過如所聞而止其不蔽不淫不彼不此可以貫徹宇宙為萬世法若從是而合儒者知耳入心通之妙則物無不該仙者知盡性知命之同則理無不在以此想見乾淳之際如孔老孟莊同時雖深山之中道家者流猶有皇甫高士而人不知觀其正大所感豈肯如化人幻世以亡國之音為月宫之樂欺天輔亂雖其事至微而意亦可識無不足以為鑒於是問者稱人天師而退退命士鼎書之
